<style>

.feature-box {

.left-panel, .right-panel {

.form-top label {

.form-top input {

.dropdown-wrapper {

.dropdown-list {

.table-box {

.table-head.rate {

.table-row > div {

.table-row > div:last-child {

.table-row .center {

.table-row input,

.tool-btn {

    background: #ea7ce8;

.right-panel.display-mode input,

}

.action-row {

    gap: 6px;
}

.btn {
    min-width: 92px;
    padding: 3px 8px;
    height: 26px;

    font-weight: 700;

}

.btn:hover { filter: brightness(0.98); }

.btn.primary, .btn.danger {

@media (max-width: 1100px) {

<script>
let allParties = [];
let allProducts = [];
let allSetups = [];
let activePartyId = null;
let currentMode = "display";
let preEditPartyId = null;
let dropIndex = -1;

let currentRateRows = [];
let currentPackRows = [];
let activeRateRowIndex = 0;
let activePackRowIndex = 0;
const rateTypeOptions = [
    { value: "PERCENT", label: "%" },
    { value: "MANUAL", label: "Manual" },
    { value: "PACK", label: "Pack" },
    { value: "QUINTAL", label: "Quintal" }
];

const filterInput = document.getElementById("filterInput");
const setupList = document.getElementById("setupList");
const modeTag = document.getElementById("modeTag");
const rightPanel = document.querySelector(".right-panel");
const displayButtons = document.getElementById("displayButtons");
const addModeButtons = document.getElementById("addModeButtons");
const partySearch = document.getElementById("partySearch");
const partyIdInput = document.getElementById("party_id");
const partyDropdown = document.getElementById("partyDropdown");
const rateBody = document.getElementById("rateBody");
const packBody = document.getElementById("packBody");
const partyError = document.getElementById("partyError");
const dupNotice = document.getElementById("dupNotice");
const rateRequiredNotice = document.getElementById("rateRequiredNotice");
const packRequiredNotice = document.getElementById("packRequiredNotice");

function esc(v) {
    return (v ?? "").toString().replace(/[&<>"]/g, function (m) {
        return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" })[m];
    });
}

function escapeApostrophe(v) {
    return String(v ?? "").replace(/'/g, "&#39;");
}

function escAll(v) {
    return esc(escapeApostrophe(v));
}

function normalizeText(v) {
    return (v || "").toString().toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
}
function setMode(mode) {
    currentMode = mode;
    rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");
    if (mode === "add") {
        modeTag.textContent = "Add Mode";
        rightPanel.classList.add("add-mode");
    } else if (mode === "modify") {
        modeTag.textContent = "Edit Mode";
        rightPanel.classList.add("modify-mode");
    } else {
        modeTag.textContent = "Display Mode";
        rightPanel.classList.add("display-mode");
    }
    syncActionMode();
}

function syncActionMode() {
    const isDisplay = currentMode === "display";
    displayButtons.style.display = isDisplay ? "flex" : "none";
    addModeButtons.style.display = isDisplay ? "none" : "flex";
}

function setFormEditable(editable) {
    partySearch.readOnly = !editable;
    if (!editable) partySearch.setAttribute("tabindex", "-1");
    else partySearch.removeAttribute("tabindex");
}

function showPartyError() {
    partySearch.classList.add("field-error");
    partyError.textContent = "Required";
    partyError.style.display = "inline";
}

function clearPartyError() {
    partySearch.classList.remove("field-error");
    partyError.textContent = "";
    partyError.style.display = "none";
}

function hasAnyOtherFieldValue() {
    const anyRate = readRatesFromGrid().some(function (r) { return Number(r.product_id) > 0 || r.slr_rt || r.byr_rt; });
    const anyPack = readPackingFromGrid().some(function (r) { return (r.packing || r.slr_rt || r.byr_rt); });
    return anyRate || anyPack;
}

function buildRateRow() {
    return { product_id: 0, slr_type: "PERCENT", slr_rt: "", byr_type: "PERCENT", byr_rt: "" };
}

function buildPackRow() {
    return { packing: "", slr_rt: "", byr_rt: "" };
}

function setActiveGridRow(container, selector, index, shouldFocus) {
    const rows = Array.from(container.querySelectorAll(selector));
    if (!rows.length) return null;
    const nextIndex = Math.max(0, Math.min(rows.length - 1, Number(index) || 0));
    rows.forEach(function (row, rowIndex) {
        row.classList.toggle("active-grid-row", rowIndex === nextIndex);
    });
    const row = rows[nextIndex];
    if (row) {
        row.scrollIntoView({ block: "nearest" });
        if (shouldFocus) row.focus();
    }
    return nextIndex;
}

function getProductNameById(id) {
    const p = allProducts.find(function (item) { return Number(item.product_id) === Number(id); });
    return p ? (p.product_name || "") : "";
}

function normalizeRateType(value) {
    const v = String(value || "").trim().toUpperCase();
    if (v === "%") return "PERCENT";
    if (v === "AMOUNT") return "MANUAL";
    if (rateTypeOptions.some(function (o) { return o.value === v; })) return v;
    return "PERCENT";
}

function getRateTypeLabel(value) {
    const key = normalizeRateType(value);
    const opt = rateTypeOptions.find(function (o) { return o.value === key; });
    return opt ? opt.label : "%";
}

function renderRateRows(rows) {
    if (!rows.length) rows = [buildRateRow()];
    activeRateRowIndex = Math.max(0, Math.min(rows.length - 1, activeRateRowIndex));
    rateBody.innerHTML = rows.map(function (r, idx) {
        const activeClass = idx === activeRateRowIndex ? " active-grid-row" : "";
        return "<div class='table-row rate" + activeClass + "' data-rate-index='" + idx + "' tabindex='-1'>"
            + "<div class='center'>" + (idx + 1) + "</div>"
            + "<div><div class='dropdown-wrapper'>"
            + "<input class='prod-input' placeholder='Select product...' data-product-id='" + escAll(r.product_id || "") + "' value='" + escAll(getProductNameById(r.product_id)) + "'>"
            + "<div class='prod-dropdown'></div>"
            + "</div></div>"
            + "<div><div class='dropdown-wrapper'>"
            + "<input class='type-input slr-type' readonly value='" + escAll(getRateTypeLabel(r.slr_type)) + "' data-type-value='" + escAll(normalizeRateType(r.slr_type)) + "'>"
            + "<div class='type-dropdown'></div>"
            + "</div></div>"
            + "<div><input class='slr-rt' type='number' step='0.0001' value='" + escAll(r.slr_rt || "") + "'></div>"
            + "<div><div class='dropdown-wrapper'>"
            + "<input class='type-input byr-type' readonly value='" + escAll(getRateTypeLabel(r.byr_type)) + "' data-type-value='" + escAll(normalizeRateType(r.byr_type)) + "'>"
            + "<div class='type-dropdown'></div>"
            + "</div></div>"
            + "<div><input class='byr-rt' type='number' step='0.0001' value='" + escAll(r.byr_rt || "") + "'></div>"
            + "</div>";
    }).join("");
}

function renderPackRows(rows) {
    if (!rows.length) rows = [buildPackRow()];
    activePackRowIndex = Math.max(0, Math.min(rows.length - 1, activePackRowIndex));
    packBody.innerHTML = rows.map(function (r, idx) {
        const activeClass = idx === activePackRowIndex ? " active-grid-row" : "";
        return "<div class='table-row pack" + activeClass + "' data-pack-index='" + idx + "' tabindex='-1'>"
            + "<div class='center'>" + (idx + 1) + "</div>"
            + "<div><input class='pack-name' value='" + escAll(r.packing || "") + "'></div>"
            + "<div><input class='pack-slr-rt' type='number' step='0.0001' value='" + escAll(r.slr_rt || "") + "'></div>"
            + "<div><input class='pack-byr-rt' type='number' step='0.0001' value='" + escAll(r.byr_rt || "") + "'></div>"
            + "</div>";
    }).join("");
}

function readRatesFromGrid() {
    const rows = [];
    rateBody.querySelectorAll(".table-row.rate").forEach(function (row) {
        const prodInput = row.querySelector(".prod-input");
        const prodId = Number((prodInput && prodInput.dataset.productId) || 0);
        const slrTypeInput = row.querySelector(".slr-type");
        const byrTypeInput = row.querySelector(".byr-type");
        rows.push({
            product_id: prodId,
            slr_type: normalizeRateType((slrTypeInput && slrTypeInput.dataset.typeValue) || "PERCENT"),
            slr_rt: row.querySelector(".slr-rt").value.trim(),
            byr_type: normalizeRateType((byrTypeInput && byrTypeInput.dataset.typeValue) || "PERCENT"),
            byr_rt: row.querySelector(".byr-rt").value.trim()
        });
    });
    return rows;
}

function readPackingFromGrid() {
    const rows = [];
    packBody.querySelectorAll(".table-row.pack").forEach(function (row) {
        rows.push({
            packing: row.querySelector(".pack-name").value.trim(),
            slr_rt: row.querySelector(".pack-slr-rt").value.trim(),

function getPartyById(id) {
    return allParties.find(function (p) { return Number(p.party_id) === Number(id); });
}

function renderSetupList() {
    const keyword = filterInput.value.trim().toLowerCase();
    const rows = allSetups.filter(function (s) {
        const label = (s.party_name || "");
        return !keyword || label.toLowerCase().includes(keyword);
    });

    if (!rows.length) {
        setupList.innerHTML = "<div class='party-row'>No records found</div>";
        return;
    }

    setupList.innerHTML = rows.map(function (s) {
        const active = Number(s.party_id) === activePartyId ? "active" : "";
        return "<div class='party-row " + active + "' data-id='" + escAll(s.party_id) + "'>" + escAll(s.party_name || "") + "</div>";
    }).join("");

    setupList.querySelectorAll(".party-row").forEach(function (row) {
        row.addEventListener("click", function () {
            const id = Number(this.dataset.id);
            const party = getPartyById(id);
            if (party) selectParty(party, true);
        });
    });
}

function filterParties(term) {
    const q = normalizeText(term);
    return allParties.filter(function (p) {
        if (!q) return true;
        const label = normalizeText((p.party_name || "") + " " + (p.city || ""));
        return label.includes(q);
    });
}

function renderPartyDropdown(rows) {
    partyDropdown.innerHTML = "";
    if (!rows.length) {
        partyDropdown.innerHTML = "<div class='dropdown-item'><div>No party found</div><div>-</div><div>-</div></div>";
        partyDropdown.style.display = "block";
        return;
    }
    if (rows.length === 1) dropIndex = 0;
    rows.forEach(function (p, idx) {
        const item = document.createElement("div");
        item.className = "dropdown-item" + (idx === dropIndex ? " active" : "");
        item.innerHTML = "<div>" + escAll(p.party_name || "") + "</div><div>" + escAll(p.city || "") + "</div><div>" + escAll(p.party_id || "") + "</div>";
        item.addEventListener("click", function () {
            const keepEdit = currentMode === "add" || currentMode === "modify";
            selectParty(p, !keepEdit, !keepEdit);
            if (keepEdit) focusFirstRateField();
        });
        partyDropdown.appendChild(item);
    });
    partyDropdown.style.display = "block";
}

function findExactPartyByInput(rawText) {
    const typed = normalizeText(rawText);
    if (!typed) return null;
    return allParties.find(function (p) {
        const name = normalizeText(p.party_name || "");
        const city = normalizeText(p.city || "");
        const combo = normalizeText((p.party_name || "") + " " + (p.city || ""));
        return typed === name || typed === combo || (city && typed === (name + " " + city).trim());
    }) || null;
}

async function saveSetup(isModify) {
    let partyId = Number(partyIdInput.value || 0);
    if (!partyId) {
        const matched = findExactPartyByInput(partySearch.value);
        if (matched) {
            partyId = Number(matched.party_id);
            partyIdInput.value = partyId;
            partySearch.value = matched.party_name + (matched.city ? "," + matched.city : "");
        }
    }

    if (!partyId) {
        if (hasAnyOtherFieldValue()) {
            showPartyError();
            partySearch.focus();
        }
        return;
    }

    clearPartyError();

    const productRows = readRatesFromGrid().filter(function (r) { return Number(r.product_id) > 0; });
    const packAllRows = readPackingFromGrid();
    const packingRows = packAllRows.filter(function (r) { return r.packing || r.slr_rt || r.byr_rt; });

    if (!productRows.length && !packingRows.length) {
        const firstProd = rateBody.querySelector(".prod-input");
        if (firstProd) {
            firstProd.classList.add("field-error");
            firstProd.focus();
        }
        showRateRequiredNotice();
        return;
    }

    const missingPackName = packAllRows.find(function (r) {
        return (r.slr_rt || r.byr_rt) && !r.packing;
    });
    if (missingPackName) {
        const packInputs = Array.from(packBody.querySelectorAll(".pack-name"));
        const target = packInputs.find(function (inp, idx) {
            const row = packAllRows[idx];
            return row && (row.slr_rt || row.byr_rt) && !row.packing;
        });
        if (target) {
            target.classList.add("field-error");
            target.focus();
        }
        showPackRequiredNotice();
        return;
    }

    const seen = {};
    for (let i = 0; i < productRows.length; i += 1) {
        const pid = Number(productRows[i].product_id);
        if (seen[pid]) {
            alert("Duplicate product selected");
            return;
        }
        seen[pid] = true;
    }

    if (!isModify && typeof window.confirmAdd === "function") {
        const party = getPartyById(partyId);
        const label = party ? (party.party_name + (party.city ? "," + party.city : "")) : String(partyId);
        const ok = await window.confirmAdd("Are you sure you want to add this party setup?\n\n" + label);
        if (!ok) return;
    }

    let okProduct = true;
    let okPacking = true;

    if (productRows.length) {
        const fd = new FormData();
        fd.set("party_id", String(partyId));
        fd.set("rows_json", JSON.stringify(productRows));
        const res = await fetch("../../api/party_brokerage/save_rates.php", { method: "POST", body: fd });
        const data = await res.json();
        okProduct = data && data.status === "success";
        if (!okProduct) alert((data && data.message) || "Product save failed");
    } else {
        const body = new URLSearchParams();
        body.set("party_id", String(partyId));
        await fetch("../../api/party_brokerage/delete_rates.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString()
        });
    }

    if (packingRows.length) {
        const fd = new FormData();
        fd.set("party_id", String(partyId));
        fd.set("rows_json", JSON.stringify(packingRows));
        const res = await fetch("../../api/party_brokerage/save_packing_rates.php", { method: "POST", body: fd });
        const data = await res.json();
        okPacking = data && data.status === "success";
        if (!okPacking) alert((data && data.message) || "Packing save failed");
    } else {
        const body = new URLSearchParams();
        body.set("party_id", String(partyId));
        await fetch("../../api/party_brokerage/delete_packing_rates.php", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString()
        });
    }

    if (okProduct && okPacking) {
        await loadSetupList();
        if (isModify) {
            const selectedParty = getPartyById(partyId);
            if (selectedParty) await selectParty(selectedParty, true, true);
        } else {
            resetForm();
        }
    }
}

async function deleteSetup() {
    const partyId = Number(partyIdInput.value || 0);
    if (!partyId) {
        alert("Select party setup to delete");
        return;
    }
    const ok = await window.confirmDelete("Delete brokerage setup for this party?");

    const body = new URLSearchParams();

    await fetch("../../api/party_brokerage/delete_rates.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },

    });

    await fetch("../../api/party_brokerage/delete_packing_rates.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },

}

function renderProductDropdown(input, rows, activeIndex) {
    const wrapper = input.closest(".dropdown-wrapper");
    const drop = wrapper ? wrapper.querySelector(".prod-dropdown") : null;
    if (!drop) return;
    drop.innerHTML = "";
    if (!rows.length) {
        drop.innerHTML = "<div class='prod-option'>No product found</div>";
        drop.style.display = "block";
        return;
    }
    rows.forEach(function (p, idx) {
        const opt = document.createElement("div");
        opt.className = "prod-option" + (idx === activeIndex ? " active" : "");
        opt.textContent = p.product_name || "";
        opt.dataset.productId = p.product_id;
        opt.addEventListener("mousedown", function (e) {
            e.preventDefault();
        });
        opt.addEventListener("click", function () {
            input.value = p.product_name || "";
            input.dataset.productId = String(p.product_id);
            drop.style.display = "none";
            if (isDuplicateProduct(p.product_id, input)) {
                input.value = "";
                input.dataset.productId = "";
                input.classList.add("field-error");
                showDuplicateNotice();
                input.focus();
                return;
            }
            input.classList.remove("field-error");
        });
        drop.appendChild(opt);
    });
    drop.style.display = "block";
    const activeEl = drop.querySelector(".prod-option.active");
    if (activeEl && typeof activeEl.scrollIntoView === "function") {
        activeEl.scrollIntoView({ block: "nearest" });
    }
}

function renderTypeDropdown(input, activeIndex) {

        row.textContent = opt.label;
        row.dataset.typeValue = opt.value;

        });

            drop.style.display = "none";

    if (activeEl && typeof activeEl.scrollIntoView === "function") {
        activeEl.scrollIntoView({ block: "nearest" });

}

function isDuplicateProduct(productId, currentInput) {

rateBody.addEventListener("keydown", function (e) {
    const input = e.target.closest(".prod-input");
    if (!input) return;
    if (currentMode === "display") return;
    const rows = filterProducts(input.dataset.filterText || "");
    let idx = Number(input.dataset.activeIndex || -1);
    if (e.key === "ArrowDown") {
        e.preventDefault();
        e.stopPropagation();
        idx = rows.length ? (idx + 1) % rows.length : -1;
        input.dataset.activeIndex = String(idx);
        renderProductDropdown(input, rows, idx);
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        e.stopPropagation();
        idx = rows.length ? (idx - 1 + rows.length) % rows.length : -1;
        input.dataset.activeIndex = String(idx);
        renderProductDropdown(input, rows, idx);
    } else if (e.key === "Enter") {
        if (rows.length && idx >= 0 && rows[idx]) {
            e.preventDefault();
            e.__addModeHandled = true;
            if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
            input.value = rows[idx].product_name || "";
            input.dataset.productId = String(rows[idx].product_id);
            closeAllProductDropdowns();
            if (isDuplicateProduct(rows[idx].product_id, input)) {
                input.value = "";
                input.dataset.productId = "";
                input.classList.add("field-error");
                showDuplicateNotice();
                input.focus();
                return;
            }
            input.classList.remove("field-error");
        }
    } else if (e.key === "Escape") {
        closeAllProductDropdowns();
    }
});

        if (nameInput) nameInput.classList.remove("field-error");
    }
    if (packRequiredNotice) packRequiredNotice.style.display = "none";
});

partySearch.addEventListener("input", function () {
    if (currentMode === "display") return;
    partyIdInput.value = "";
    activePartyId = null;
    setMode("add");
    setFormEditable(true);
    renderSetupList();
    dropIndex = -1;
    renderPartyDropdown(filterParties(partySearch.value));
});

partySearch.addEventListener("focus", function () {
    if (currentMode === "display") return;
    dropIndex = -1;
    renderPartyDropdown(filterParties(partySearch.value));
});

partySearch.addEventListener("click", function () {
    if (currentMode === "display") return;
    dropIndex = -1;
    renderPartyDropdown(filterParties(partySearch.value));
});

partySearch.addEventListener("keydown", function (e) {
    if (currentMode === "display") return;
    const rows = filterParties(partySearch.value);
    if (!rows.length && e.key !== "Escape") return;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        dropIndex = (dropIndex + 1) % rows.length;
        renderPartyDropdown(rows);
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        dropIndex = (dropIndex - 1 + rows.length) % rows.length;
        renderPartyDropdown(rows);
    } else if (e.key === "Enter") {
        e.preventDefault();
        if (dropIndex < 0 && rows.length === 1) dropIndex = 0;
        if (dropIndex >= 0 && rows[dropIndex]) {
            const keepEdit = currentMode === "add" || currentMode === "modify";
            selectParty(rows[dropIndex], !keepEdit, !keepEdit);
            if (keepEdit) focusFirstRateField();
            return;
        }
        const exact = findExactPartyByInput(partySearch.value);
        if (exact) {
            const keepEdit = currentMode === "add" || currentMode === "modify";
            selectParty(exact, !keepEdit, !keepEdit);
            if (keepEdit) focusFirstRateField();
        }
    } else if (e.key === "Escape") {
        e.preventDefault();
        e.stopPropagation();
        partyDropdown.style.display = "none";
        dropIndex = -1;
    }
});

packBody.addEventListener("focusin", function (e) {
    const row = e.target.closest(".table-row.pack");
    if (!row) return;
    const nextIndex = setActiveGridRow(packBody, ".table-row.pack", Number(row.dataset.packIndex || 0), false);
    if (nextIndex !== null) activePackRowIndex = nextIndex;
});

partySearch.addEventListener("input", function () {
    if ((partySearch.value || "").trim()) clearPartyError();
});

filterInput.addEventListener("input", renderSetupList);

setupList.addEventListener("click", function (e) {
    const row = e.target.closest(".party-row");
    if (!row || !row.dataset.id) return;
    const party = getPartyById(Number(row.dataset.id));
    if (party) selectParty(party, true, true);
});

partyDropdown.addEventListener("mousedown", function (e) {
    e.preventDefault();
});

document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown-wrapper")) {
        partyDropdown.style.display = "none";
        dropIndex = -1;
    }
    if (!e.target.closest(".prod-dropdown") && !e.target.closest(".prod-input")) {
        closeAllProductDropdowns();
    }
    if (!e.target.closest(".type-dropdown") && !e.target.closest(".type-input")) {
        closeAllTypeDropdowns();
    }
});

document.addEventListener("focusin", function (e) {
    const target = e.target;
    if (!target) return;
    if (target.closest(".prod-dropdown") || target.closest(".prod-input")) return;
    if (target.closest(".type-dropdown") || target.closest(".type-input")) return;
    closeAllRateDropdowns();
});

document.getElementById("addBtn").addEventListener("click", handleAddAction);
document.getElementById("modifyBtn").addEventListener("click", handleModifyAction);
document.getElementById("deleteBtn").addEventListener("click", deleteSetup);
document.getElementById("printBtn").addEventListener("click", function () { window.print(); });
document.getElementById("exitBtn").addEventListener("click", function () { window.location.href = "../../index.html"; });
document.getElementById("saveBtn").addEventListener("click", function () {
    if (currentMode === "modify") saveSetup(true);
    else saveSetup(false);
});
document.getElementById("cancelBtn").addEventListener("click", cancelEditMode);

document.addEventListener("keydown", function (e) {
    if (currentMode === "display") return;
    const target = e.target;
    if (!target || !target.closest) return;

    const inRateGrid = !!target.closest("#rateBody, #rateShortcutBar");
    const inPackGrid = !!target.closest("#packBody, #packShortcutBar");
    if (!inRateGrid && !inPackGrid) return;

    const isTypingField = target.matches("input:not([type='checkbox']):not([type='radio']), textarea");
    if ((e.key === "a" || e.key === "A" || e.key === "e" || e.key === "E" || e.key === "d" || e.key === "D") && isTypingField) {
        return;
    }

    if (inRateGrid) {
        if (e.key === "ArrowDown" || e.key === "ArrowUp") {
            e.preventDefault();
            const nextIndex = setActiveGridRow(rateBody, ".table-row.rate", activeRateRowIndex + (e.key === "ArrowDown" ? 1 : -1), true);
            if (nextIndex !== null) activeRateRowIndex = nextIndex;
            return;
        }
        if (e.key === "A" || e.key === "a") {
            e.preventDefault();
            addProductRow();
            focusRateRowField();
            return;
        }
        if (e.key === "E" || e.key === "e") {
            e.preventDefault();
            focusRateRowField();
            return;
        }
        if (e.key === "D" || e.key === "d") {
            e.preventDefault();
            const rows = readRatesFromGrid();
            const removeIndex = Math.max(0, Math.min((rows.length ? rows.length : 1) - 1, activeRateRowIndex));
            const nextRows = (rows.length ? rows.slice() : [buildRateRow()]);
            nextRows.splice(removeIndex, 1);
            currentRateRows = nextRows.length ? nextRows : [buildRateRow()];
            activeRateRowIndex = Math.max(0, Math.min(currentRateRows.length - 1, removeIndex));
            renderRateRows(currentRateRows);
            focusRateRowField();
            return;
        }
        if (e.key === "F1") {
            e.preventDefault();
            partySearch.focus();
            return;
        }
    }

    if (inPackGrid) {
        if (e.key === "ArrowDown" || e.key === "ArrowUp") {
            e.preventDefault();
            const nextIndex = setActiveGridRow(packBody, ".table-row.pack", activePackRowIndex + (e.key === "ArrowDown" ? 1 : -1), true);
            if (nextIndex !== null) activePackRowIndex = nextIndex;
            return;
        }
        if (e.key === "A" || e.key === "a") {
            e.preventDefault();
            addPackingRow();
            focusPackRowField();
            return;
        }
        if (e.key === "E" || e.key === "e") {
            e.preventDefault();
            focusPackRowField();
            return;
        }
        if (e.key === "D" || e.key === "d") {
            e.preventDefault();
            const rows = readPackingFromGrid();
            const removeIndex = Math.max(0, Math.min((rows.length ? rows.length : 1) - 1, activePackRowIndex));
            const nextRows = (rows.length ? rows.slice() : [buildPackRow()]);
            nextRows.splice(removeIndex, 1);
            currentPackRows = nextRows.length ? nextRows : [buildPackRow()];
            activePackRowIndex = Math.max(0, Math.min(currentPackRows.length - 1, removeIndex));
            renderPackRows(currentPackRows);
            focusPackRowField();
            return;
        }
        if (e.key === "F1") {
            e.preventDefault();
            focusFirstRateField();
        }
    }
});

document.addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;
    if (currentMode !== "add" && currentMode !== "modify") return;
    const active = document.activeElement;
    if (!active) return;
    if (active.classList && (active.classList.contains("prod-input") || active.classList.contains("type-input"))) {
        const wrapper = active.closest(".dropdown-wrapper");
        const prodOpen = wrapper && wrapper.querySelector(".prod-dropdown") && wrapper.querySelector(".prod-dropdown").style.display === "block";
        const typeOpen = wrapper && wrapper.querySelector(".type-dropdown") && wrapper.querySelector(".type-dropdown").style.display === "block";
        if (prodOpen || typeOpen) return;
    }
    const container = active.closest("#rateBody, #packBody");
    if (!container) return;
    const fields = Array.from(container.querySelectorAll("input, select")).filter(function (el) {
        return !el.disabled;
    });
    const idx = fields.indexOf(active);
    if (idx === -1) return;
    e.preventDefault();
    e.__addModeHandled = true;
    if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();

    const forward = !e.shiftKey;
    const nextIndex = forward ? idx + 1 : idx - 1;

    if (nextIndex >= 0 && nextIndex < fields.length) {
        fields[nextIndex].focus();
        return;
    }

    if (forward) {
        if (container.id === "rateBody") {
            const next = packBody.querySelector("input, select");
            if (next) { next.focus(); return; }
        } else {
            const saveBtn = document.getElementById("saveBtn");
            if (saveBtn) { saveBtn.focus(); return; }
        }
    } else {
        if (container.id === "packBody") {
            const prev = rateBody.querySelector("input, select");
            if (prev) {
                const rateFields = Array.from(rateBody.querySelectorAll("input, select")).filter(function (el) { return !el.disabled; });
                if (rateFields.length) {
                    rateFields[rateFields.length - 1].focus();
                    return;
                }
            }
        } else {
            partySearch.focus();
            return;
        }
    }
}, true);

document.addEventListener("keydown", function (e) {
    if (currentMode !== "display") return;
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    const rows = Array.from(setupList.querySelectorAll(".party-row")).filter(function (r) { return r.dataset.id; });
    if (!rows.length) return;
    let currentIndex = rows.findIndex(function (row) { return Number(row.dataset.id) === Number(activePartyId); });
    if (currentIndex === -1) currentIndex = 0;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        if (currentIndex < rows.length - 1) currentIndex += 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
    if (e.key === "ArrowUp") {
        e.preventDefault();
        if (currentIndex > 0) currentIndex -= 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
});

setMode("display");
setFormEditable(false);
(async function init() {
    await loadParties();
    await loadProducts();
    await loadSetupList();
    if (allSetups.length) {
        const firstParty = getPartyById(allSetups[0].party_id);
        if (firstParty) {
            await selectParty(firstParty, true, true);
            return;
        }
    }
    resetForm();
})();
</script>
