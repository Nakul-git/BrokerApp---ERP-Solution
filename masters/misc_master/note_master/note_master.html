<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Note Master | SoftBrokerage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../../style.css?v=8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>
const appRoot=(function(){const path=String(location.pathname||'').replace(/\\\\/g,'/');const lower=path.toLowerCase();const marker='/brokerapp/';const idx=lower.indexOf(marker);if(idx!==-1){return location.origin+path.slice(0,idx+marker.length);}return location.origin+'/';})();
(async function(){
    const res=await fetch(appRoot + "api/check_auth.php");
    const data=await res.json();
    if(!data.logged_in)window.location.replace(appRoot + "login.html");
})();
</script>
<script src="../../../global-nav.js" defer></script>
<script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>

<link rel="stylesheet" href="../../../selection-mode.css?v=1">
<link rel="stylesheet" href="../../../add-mode.css?v=1">
<script src="../../../add-mode.js" defer></script>
<script src="../../../permissions-catalog.js"></script>
<script src="../../../selection-mode.js" defer></script>
    <link rel="stylesheet" href="./style.css?v=1">
<script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../../edit-mode.js" defer data-edit-mode="1"></script>
</head>
<body>

<div class="content">
<div class="feature-box">
<h2 class="page-title">Note Master</h2>

<div class="master-layout">
<div class="left-panel">
<div class="label">Selection Mode</div>
<input id="filterInput" type="text" autocomplete="off" placeholder="Search note...">
<div class="list-wrap"><div class="list-head">Name</div><div id="noteList"></div></div>
</div>

<div class="right-panel">
<span id="modeTag" class="mode-tag">Display Mode</span>
        <form id="noteForm" autocomplete="off">
<input type="hidden" id="note_id" name="note_id">
<div class="form-grid">
<div class="form-group full"><label for="note_description" class="label-with-error"><span>Note Description</span><span id="noteDescriptionError" class="error-text" style="display:none;"></span></label><input id="note_description" name="note_description" data-add-first data-duplicate-check="checkDuplicateNoteDescription"></div>
<div class="form-group"><label for="sort_order">Order</label><input id="sort_order" name="sort_order" type="number" step="1" min="0" value="0"></div>
<div class="form-group full">
<div class="checks-inline">
<label><input id="applicable_sauda" name="applicable_sauda" type="checkbox" checked>Applicable Sauda</label>
<label><input id="applicable_unloading" name="applicable_unloading" type="checkbox" checked>Applicable Unloading</label>
</div>
</div>
</div>
</form>

 <div id="displayButtons" class="action-row">
                        <button class="btn primary" type="button" id="addBtn">📂 F2-Add</button>
                        <button class="btn" type="button" id="modifyBtn">📝 F3-Modify</button>
                        <button class="btn danger" type="button" id="deleteBtn">❌ F5-Delete</button>
                        <button class="btn" type="button" id="printBtn">📊 F7-Print</button>
                        <button class="btn" type="button" id="exitBtn">❌ Esc-Exit</button>
                    </div>

                    <div id="addModeButtons" class="action-row hidden">
                        <button class="btn danger" type="button" id="cancelBtn">❌ Esc-Cancel</button>
                        <button class="btn primary" type="button" id="saveBtn">💾 F6-Save</button>
                    </div>
</div>
</div>
</div>

<script>
let allNotes=[];
let activeNoteId=null;
let currentMode="display";
let preEditNoteId=null;

const filterInput=document.getElementById("filterInput");
const noteList=document.getElementById("noteList");
const noteForm=document.getElementById("noteForm");
const modeTag=document.getElementById("modeTag");
const displayButtons=document.getElementById("displayButtons");
const addModeButtons=document.getElementById("addModeButtons");
const noteDescriptionInput=document.getElementById("note_description");
const noteDescriptionError=document.getElementById("noteDescriptionError");

function esc(v){return (v??"").toString().replace(/[&<>\"']/g,function(m){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[m];});}
function noteDescriptionOf(n){return (n?.note_description ?? "").toString();}
function showNoteDescriptionError(message){noteDescriptionInput.classList.add("field-error");noteDescriptionError.textContent=message;noteDescriptionError.style.display="inline";}
function clearNoteDescriptionError(){noteDescriptionInput.classList.remove("field-error");noteDescriptionError.textContent="";noteDescriptionError.style.display="none";}

function checkDuplicateNoteDescription(){
    const name=noteDescriptionInput.value.trim().toLowerCase();
    if(!name){clearNoteDescriptionError();return false;}
    const currentId=Number(document.getElementById("note_id").value||0);
    const duplicate=allNotes.some(function(n){
        const sameName=noteDescriptionOf(n).trim().toLowerCase()===name;
        const sameId=Number(n.note_id)===currentId;
        return sameName&&!sameId;
    });
    if(duplicate){showNoteDescriptionError("Already exists");return true;}
    clearNoteDescriptionError();
    return false;
}

function setFormEditable(editable){
    const fields=noteForm.querySelectorAll("input");
    fields.forEach(function(field){
        if(field.id==="note_id")return;
        if(field.type==="checkbox"){
            field.disabled=!editable;
            if(!editable)field.setAttribute("tabindex","-1");
            else field.removeAttribute("tabindex");
            return;
        }
        if(!editable)field.setAttribute("tabindex","-1");
        else field.removeAttribute("tabindex");
        field.readOnly=!editable;
    });
}

function syncActionMode(){
    const isDisplay=currentMode==="display";
    displayButtons.classList.toggle("hidden",!isDisplay);
    addModeButtons.classList.toggle("hidden",isDisplay);
    displayButtons.style.display=isDisplay?"flex":"none";
    addModeButtons.style.display=isDisplay?"none":"flex";
}

function setMode(mode){
    currentMode=mode;
    const rightPanel=document.querySelector(".right-panel");
    rightPanel.classList.remove("add-mode","modify-mode","display-mode");
    if(mode==="add"){modeTag.textContent="Add Mode";rightPanel.classList.add("add-mode");setTimeout(function(){noteDescriptionInput.focus();},0);}
    if(mode==="modify"){modeTag.textContent="Edit Mode";rightPanel.classList.add("modify-mode");setTimeout(function(){noteDescriptionInput.focus();},0);}
    if(mode==="display"){modeTag.textContent="Display Mode";rightPanel.classList.add("display-mode");preEditNoteId=null;clearNoteDescriptionError();syncSelectionHighlight();}
    syncActionMode();
}

function ensureActiveNoteSelection(){
    if(!allNotes.length){activeNoteId=null;return null;}
    let active=allNotes.find(function(n){return Number(n.note_id)===Number(activeNoteId);});
    if(!active){active=allNotes[0];activeNoteId=Number(active.note_id);}
    return active;
}

function resetForm(){
    noteForm.reset();
    document.getElementById("note_id").value="";
    document.getElementById("sort_order").value="0";
    document.getElementById("applicable_sauda").checked=true;
    document.getElementById("applicable_unloading").checked=true;
    activeNoteId=null;
    clearNoteDescriptionError();
    setMode("add");
    setFormEditable(true);
    syncActionMode();
    renderNotes();
}

function fillForm(n){
    document.getElementById("note_id").value=n.note_id||"";
    document.getElementById("note_description").value=n.note_description||"";
    document.getElementById("sort_order").value=n.sort_order??0;
    document.getElementById("applicable_sauda").checked=Number(n.applicable_sauda)===1;
    document.getElementById("applicable_unloading").checked=Number(n.applicable_unloading)===1;
    activeNoteId=Number(n.note_id);
    setMode("display");
    setFormEditable(false);
    syncActionMode();
    clearNoteDescriptionError();
}

function fillFormWithoutRender(n){
    document.getElementById("note_id").value=n.note_id||"";
    document.getElementById("note_description").value=n.note_description||"";
    document.getElementById("sort_order").value=n.sort_order??0;
    document.getElementById("applicable_sauda").checked=Number(n.applicable_sauda)===1;
    document.getElementById("applicable_unloading").checked=Number(n.applicable_unloading)===1;
    activeNoteId=Number(n.note_id);
}

function renderNotes(){
    ensureActiveNoteSelection();
    const keyword = "";
    const rows=allNotes.filter(function(n){return !keyword || noteDescriptionOf(n).toLowerCase().includes(keyword);});
    if(!rows.length){noteList.innerHTML="<div class='note-row'>No records found</div>";return;}
    noteList.innerHTML=rows.map(function(n){
        const active=Number(n.note_id)===activeNoteId?"active":"";
        return "<div class='note-row "+active+"' data-id='"+esc(n.note_id)+"'>"+esc(noteDescriptionOf(n))+"</div>";
    }).join("");
    noteList.querySelectorAll(".note-row").forEach(function(row){row.addEventListener("click",function(){selectRow(this);});});
    syncSelectionHighlight();
}

function syncSelectionHighlight(){
    const rows=Array.from(noteList.querySelectorAll(".note-row")).filter(function(r){return r.dataset.id;});
    rows.forEach(function(r){r.classList.remove("active");});
    const activeRow=rows.find(function(r){return Number(r.dataset.id)===Number(activeNoteId);});
    if(activeRow){activeRow.classList.add("active");activeRow.scrollIntoView({block:"nearest"});}
}

function selectRow(row){
    noteList.querySelectorAll(".note-row").forEach(function(r){r.classList.remove("active");});
    row.classList.add("active");
    const id=Number(row.dataset.id);
    activeNoteId=id;
    const n=allNotes.find(function(x){return Number(x.note_id)===id;});
    if(!n)return;
    fillFormWithoutRender(n);
    setMode("display");
    setFormEditable(false);
    syncActionMode();
    row.scrollIntoView({block:"center"});
}

async function loadNotes(){
    const res=await fetch("../../../api/note/get_note.php");
    allNotes=await res.json();
    if(allNotes.length){
        ensureActiveNoteSelection();
        renderNotes();
        const selected=ensureActiveNoteSelection();
        if(selected)fillFormWithoutRender(selected);
        setMode("display");
        setFormEditable(false);
        syncActionMode();
        document.querySelector(".list-wrap").scrollTop=0;
    }else{
        renderNotes();
        setMode("display");
        setFormEditable(false);
        syncActionMode();
    }
}

function customConfirm(message,callback){
    if(window.deleteModeConfirm){window.deleteModeConfirm(message,callback);return;}
}

async function saveNote(isModify){
    const fd=new FormData(noteForm);
    const noteId=fd.get("note_id");
    const noteDescription=(fd.get("note_description")||"").trim();
    if(checkDuplicateNoteDescription()){noteDescriptionInput.focus();noteDescriptionInput.select();return;}

    let url="../../../api/note/add_note.php";
    if(isModify){
        if(!noteId){alert("Select a note to modify");return;}
        url="../../../api/note/update_note.php";
    }else{
        const confirmAdd=await window.confirmAdd("Are you sure you want to add this note?\n\n"+noteDescription);
        if(!confirmAdd)return;
    }

    const res=await fetch(url,{method:"POST",body:fd});
    const data=await res.json();
    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

    if(data.status==="success"){
        await loadNotes();
        if(isModify&&noteId){
            const updated=allNotes.find(function(n){return Number(n.note_id)===Number(noteId);});
            if(updated)fillForm(updated);
            return;
        }
        resetForm();
        setMode("add");
        setFormEditable(true);
        syncActionMode();
        noteDescriptionInput.focus();
    }
}

async function deleteNote(){
    const noteId=document.getElementById("note_id").value;
    if(!noteId){alert("Select a note to delete");return;}
    customConfirm("Delete this note?",async function(){
        const body=new URLSearchParams();
        body.set("note_id",noteId);
        const res=await fetch("../../../api/note/delete_note.php",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:body.toString()});
        const data=await res.json();
        if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }
        if(data.status==="success"){
            await loadNotes();
            if(allNotes.length){setMode("display");setFormEditable(false);syncActionMode();}
            else resetForm();
        }
    });
}

function handleAddAction(){preEditNoteId=activeNoteId;resetForm();noteDescriptionInput.focus();}
function handleModifyAction(){
    const noteId=document.getElementById("note_id").value;
    if(!noteId){alert("Select a note to modify");return;}
    preEditNoteId=Number(noteId);
    setMode("modify");
    setFormEditable(true);
    syncActionMode();
}
function cancelEditMode(){
    if(preEditNoteId){
        const previous=allNotes.find(function(n){return Number(n.note_id)===Number(preEditNoteId);});
        if(previous){fillForm(previous);preEditNoteId=null;return;}
    }
    const fallback=ensureActiveNoteSelection();
    if(fallback){fillForm(fallback);return;}
    setMode("display");
    setFormEditable(false);
    syncActionMode();
    renderNotes();
}

noteDescriptionInput.addEventListener("input",function(){if(currentMode==="add"||currentMode==="modify")checkDuplicateNoteDescription();});
document.getElementById("addBtn").addEventListener("click",handleAddAction);
document.getElementById("modifyBtn").addEventListener("click",handleModifyAction);
document.getElementById("deleteBtn").addEventListener("click",deleteNote);
document.getElementById("printBtn").addEventListener("click",function(){window.print();});
document.getElementById("exitBtn").addEventListener("click",function(){window.location.href = appRoot + "index.html";});
document.getElementById("cancelBtn").addEventListener("click",cancelEditMode);
document.getElementById("saveBtn").addEventListener("click",function(){if(currentMode==="modify")saveNote(true);else saveNote(false);});let typeBuffer="",typeTimer=null,lastMatchedIndex=-1;
document.addEventListener("keydown",function(e){
    if(currentMode!=="display")return;
    if(e.ctrlKey||e.altKey||e.metaKey)return;
    const rows=Array.from(noteList.querySelectorAll(".note-row")).filter(function(r){return r.dataset.id;});
    if(!rows.length)return;
    const isSearchBox=document.activeElement.id==="filterInput";
    if(e.key.length===1&&/^[a-zA-Z]$/.test(e.key)){
        if(isSearchBox)return;
        e.preventDefault();
        const letter=e.key.toLowerCase();
        if(typeTimer)clearTimeout(typeTimer);
        typeBuffer+=letter;
        typeTimer=setTimeout(function(){typeBuffer="";lastMatchedIndex=-1;},700);
        let matchIndex=-1;
        if(typeBuffer.length===1){
            const startIndex=lastMatchedIndex+1;
            matchIndex=rows.findIndex(function(row,index){return index>=startIndex&&row.textContent.trim().toLowerCase().startsWith(letter);});
            if(matchIndex===-1)matchIndex=rows.findIndex(function(row){return row.textContent.trim().toLowerCase().startsWith(letter);});
        }else{
            matchIndex=rows.findIndex(function(row){return row.textContent.trim().toLowerCase().startsWith(typeBuffer);});
        }
        if(matchIndex!==-1){lastMatchedIndex=matchIndex;selectRow(rows[matchIndex]);}
    }
});
document.addEventListener("keydown",function(e){
    if(currentMode!=="display")return;
    const rows=Array.from(noteList.querySelectorAll(".note-row")).filter(function(r){return r.dataset.id;});
    if(!rows.length)return;
    let currentIndex=rows.findIndex(function(row){return Number(row.dataset.id)===Number(activeNoteId);});
    if(currentIndex===-1)currentIndex=0;
    if(e.key==="ArrowDown"){e.preventDefault();if(currentIndex<rows.length-1)currentIndex++;selectRow(rows[currentIndex]);}
    if(e.key==="ArrowUp"){e.preventDefault();if(currentIndex>0)currentIndex--;selectRow(rows[currentIndex]);}
});(function(){let navMode=false,mainIndex=0,subIndex=-1;const topNavItems=function(){return Array.from(document.querySelectorAll(".top-nav > li, .main-nav > li, nav > ul > li")).filter(function(li){return li.offsetParent!==null;});};function getSubItems(li){return Array.from(li.querySelectorAll("ul li")).filter(function(item){return item.offsetParent!==null;});}function highlightMain(index){const items=topNavItems();items.forEach(function(i){i.classList.remove("nav-active");});if(!items[index])return;items[index].classList.add("nav-active");if(items[index].focus)items[index].focus();}function highlightSub(subItems,index){subItems.forEach(function(i){i.classList.remove("nav-sub-active");});if(!subItems[index])return;subItems[index].classList.add("nav-sub-active");subItems[index].scrollIntoView({block:"nearest"});}function resetNav(){navMode=false;mainIndex=0;subIndex=-1;document.querySelectorAll(".nav-active").forEach(function(el){el.classList.remove("nav-active");});document.querySelectorAll(".nav-sub-active").forEach(function(el){el.classList.remove("nav-sub-active");});}document.addEventListener("keydown",function(e){if(e.key==="Alt"&&!navMode){e.preventDefault();navMode=true;mainIndex=0;subIndex=-1;highlightMain(mainIndex);return;}if(!navMode)return;const items=topNavItems();const currentMain=items[mainIndex];const subItems=currentMain?getSubItems(currentMain):[];if(e.key==="Escape"){e.preventDefault();resetNav();return;}if(e.key==="ArrowRight"){e.preventDefault();mainIndex=(mainIndex+1)%items.length;subIndex=-1;highlightMain(mainIndex);}if(e.key==="ArrowLeft"){e.preventDefault();mainIndex=(mainIndex-1+items.length)%items.length;subIndex=-1;highlightMain(mainIndex);}if(e.key==="ArrowDown"){e.preventDefault();if(!subItems.length)return;if(subIndex<0)subIndex=0;else subIndex=(subIndex+1)%subItems.length;highlightSub(subItems,subIndex);}if(e.key==="ArrowUp"){e.preventDefault();if(!subItems.length)return;if(subIndex<0)subIndex=subItems.length-1;else subIndex=(subIndex-1+subItems.length)%subItems.length;highlightSub(subItems,subIndex);}if(e.key==="Enter"){e.preventDefault();if(subIndex>=0&&subItems[subIndex])subItems[subIndex].click();else if(currentMain)currentMain.click();resetNav();}});})();

setMode("display");
setFormEditable(false);
syncActionMode();
(async function init(){
    await loadNotes();
    if(allNotes.length){
        const first=ensureActiveNoteSelection();
        if(first)fillFormWithoutRender(first);
        renderNotes();
    }
})();
</script>

</body>
</html>
