<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Keeping Unit Master | SoftBrokerage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../../style.css?v=8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script>
const appRoot=(function(){const path=String(location.pathname||'').replace(/\\\\/g,'/');const lower=path.toLowerCase();const marker='/brokerapp/';const idx=lower.indexOf(marker);if(idx!==-1){return location.origin+path.slice(0,idx+marker.length);}return location.origin+'/';})();
(async function(){
    const res=await fetch(appRoot + "api/check_auth.php");
    const data=await res.json();
    if(!data.logged_in)window.location.replace(appRoot + "login.html");
})();
</script>
<script src="../../../global-nav.js" defer></script>
<script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>

<link rel="stylesheet" href="../../../selection-mode.css?v=1">
<link rel="stylesheet" href="../../../add-mode.css?v=1">
<script src="../../../add-mode.js" defer></script>
<script src="../../../permissions-catalog.js"></script>
<script src="../../../selection-mode.js" defer></script>
    <link rel="stylesheet" href="./style.css?v=1">
<script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../../edit-mode.js" defer data-edit-mode="1"></script>
</head>
<body>

<div class="content">
<div class="feature-box">
<h2 class="page-title">Stock Keeping Unit Master</h2>

<div class="master-layout">
<div class="left-panel">
<div class="label">Selection Mode</div>
<input id="filterInput" type="text" autocomplete="off" placeholder="Search SKU...">
<div class="list-wrap"><div class="list-head">Name</div><div id="skuList"></div></div>
</div>

<div class="right-panel">
<span id="modeTag" class="mode-tag">Display Mode</span>
<form id="skuForm" autocomplete="off">
<input type="hidden" id="sku_id" name="sku_id">
<div class="form-grid">
<div class="form-group full">
<label for="sku_name" class="label-with-error">
<span>SKU Name</span>
<span id="skuNameError" class="error-text" style="display:none;"></span>
</label>
<input id="sku_name" name="sku_name" required data-add-first data-duplicate-check="checkDuplicateSkuName">
</div>
<div class="form-group small">
<label for="sku_symbol" class="label-with-error">
<span>SKU Symbol</span>
<span id="skuSymbolError" class="error-text" style="display:none;"></span>
</label>
<input id="sku_symbol" name="sku_symbol" maxlength="20" required data-duplicate-check="checkDuplicateSkuName">
</div>
<div class="form-group small">
<label for="no_of_decimals">No Of Decimals</label>
<input id="no_of_decimals" name="no_of_decimals" type="number" min="0" max="8" step="1" value="2">
</div>
</div>

<div class="conv-shortcuts" id="convShortcutBar">A - Add&nbsp;&nbsp;E - Edit&nbsp;&nbsp;D - Delete&nbsp;&nbsp;F1 - Move Back</div>
<div class="conv-wrap">
<table class="conv-table" aria-label="Conversion details">
<thead>
<tr>
<th style="width:42px;">Sno.</th>
<th>Conversion Unit</th>
<th style="width:170px;">Unit Symbol</th>
<th style="width:110px;">Conv. Type</th>
<th style="width:150px;">Conv. Value</th>
</tr>
</thead>
<tbody>
<tr class="conv-row active-conv-row" id="conversionRow" tabindex="0">
<td class="slno">1</td>
<td><input id="conversion_unit" name="conversion_unit" maxlength="120"></td>
<td><input id="unit_symbol" name="unit_symbol" maxlength="30"></td>
<td>
<select id="conv_type" name="conv_type">
<option value="*">*</option>
<option value="/">/</option>
</select>
</td>
<td><input id="conv_value" name="conv_value" type="number" step="0.0001" min="0" value="1"></td>
</tr>
</tbody>
</table>
</div>
</form>

 <div id="displayButtons" class="action-row">
                        <button class="btn primary" type="button" id="addBtn">📂 F2-Add</button>
                        <button class="btn" type="button" id="modifyBtn">📝 F3-Modify</button>
                        <button class="btn danger" type="button" id="deleteBtn">❌ F5-Delete</button>
                        <button class="btn" type="button" id="printBtn">📊 F7-Print</button>
                        <button class="btn" type="button" id="exitBtn">❌ Esc-Exit</button>
                    </div>

                    <div id="addModeButtons" class="action-row hidden">
                        <button class="btn danger" type="button" id="cancelBtn">❌ Esc-Cancel</button>
                        <button class="btn primary" type="button" id="saveBtn">💾 F6-Save</button>
                    </div>
</div>
</div>
</div>

<script>
let allSkus=[];
let activeSkuId=null;
let currentMode="display";
let preEditSkuId=null;

const filterInput=document.getElementById("filterInput");
const skuList=document.getElementById("skuList");
const skuForm=document.getElementById("skuForm");
const modeTag=document.getElementById("modeTag");
const displayButtons=document.getElementById("displayButtons");
const addModeButtons=document.getElementById("addModeButtons");
const skuNameInput=document.getElementById("sku_name");
const skuSymbolInput=document.getElementById("sku_symbol");
const decimalsInput=document.getElementById("no_of_decimals");
const conversionRow=document.getElementById("conversionRow");
const conversionUnitInput=document.getElementById("conversion_unit");
const unitSymbolInput=document.getElementById("unit_symbol");
const convTypeInput=document.getElementById("conv_type");
const convValueInput=document.getElementById("conv_value");
const skuNameError=document.getElementById("skuNameError");
const skuSymbolError=document.getElementById("skuSymbolError");

function esc(v){return (v??"").toString().replace(/[&<>\"']/g,function(m){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[m];});}
function skuNameOf(row){return (row?.sku_name??"").toString();}
function skuSymbolOf(row){return (row?.sku_symbol??"").toString();}

function showSkuNameError(message){skuNameInput.classList.add("field-error");skuNameError.textContent=message;skuNameError.style.display="inline";}
function clearSkuNameError(){skuNameInput.classList.remove("field-error");skuNameError.textContent="";skuNameError.style.display="none";}
function showSkuSymbolError(message){skuSymbolInput.classList.add("field-error");skuSymbolError.textContent=message;skuSymbolError.style.display="inline";}
function clearSkuSymbolError(){skuSymbolInput.classList.remove("field-error");skuSymbolError.textContent="";skuSymbolError.style.display="none";}
function clearFieldErrors(){clearSkuNameError();clearSkuSymbolError();}

function checkDuplicateSkuName(){
    const name=skuNameInput.value.trim().toLowerCase();
    if(!name){clearSkuNameError();return false;}
    const currentId=Number(document.getElementById("sku_id").value||0);
    const duplicate=allSkus.some(function(row){
        return skuNameOf(row).trim().toLowerCase()===name && Number(row.sku_id)!==currentId;
    });
    if(duplicate){showSkuNameError("Already exists");return true;}
    clearSkuNameError();
    return false;
}

function validateNumericFields(){
    let decimals=Number(decimalsInput.value||2);
    if(!Number.isFinite(decimals))decimals=2;
    decimals=Math.max(0,Math.min(8,Math.round(decimals)));
    decimalsInput.value=String(decimals);

    let conv=Number(convValueInput.value||1);
    if(!Number.isFinite(conv)||conv<0)conv=0;
    convValueInput.value=String(conv);
}

function setConversionRowActive(){
    if(conversionRow)conversionRow.classList.add("active-conv-row");
}

function focusConversionRow(){
    setConversionRowActive();
    setTimeout(function(){conversionUnitInput.focus();},0);
}

function clearConversionRow(){
    conversionUnitInput.value="";
    unitSymbolInput.value="";
    convTypeInput.value="*";
    convValueInput.value="1";
}

function setFormEditable(editable){
    const fields=skuForm.querySelectorAll("input, select");
    fields.forEach(function(field){
        if(field.id==="sku_id")return;
        if(!editable)field.setAttribute("tabindex","-1");
        else field.removeAttribute("tabindex");
        if(field.tagName==="SELECT")field.disabled=!editable;
        else field.readOnly=!editable;
    });
}

function syncActionMode(){
    const isDisplay=currentMode==="display";
    displayButtons.classList.toggle("hidden",!isDisplay);
    addModeButtons.classList.toggle("hidden",isDisplay);
    displayButtons.style.display=isDisplay?"flex":"none";
    addModeButtons.style.display=isDisplay?"none":"flex";
}

function setMode(mode){
    currentMode=mode;
    const rightPanel=document.querySelector(".right-panel");
    rightPanel.classList.remove("add-mode","modify-mode","display-mode");

    if(mode==="add"){
        modeTag.textContent="Add Mode";
        rightPanel.classList.add("add-mode");
        setTimeout(function(){skuNameInput.focus();},0);
    }
    if(mode==="modify"){
        modeTag.textContent="Edit Mode";
        rightPanel.classList.add("modify-mode");
        setTimeout(function(){skuNameInput.focus();},0);
    }
    if(mode==="display"){
        modeTag.textContent="Display Mode";
        rightPanel.classList.add("display-mode");
        preEditSkuId=null;
        clearFieldErrors();
        syncSelectionHighlight();
    }
    syncActionMode();
}

function ensureActiveSelection(){
    if(!allSkus.length){activeSkuId=null;return null;}
    let active=allSkus.find(function(row){return Number(row.sku_id)===Number(activeSkuId);});
    if(!active){active=allSkus[0];activeSkuId=Number(active.sku_id);}    
    return active;
}

function fillFormWithoutRender(row){
    document.getElementById("sku_id").value=row.sku_id||"";
    document.getElementById("sku_name").value=skuNameOf(row);
    document.getElementById("sku_symbol").value=skuSymbolOf(row);
    decimalsInput.value=(row.no_of_decimals===null||row.no_of_decimals===undefined)?"2":String(row.no_of_decimals);
    document.getElementById("conversion_unit").value=row.conversion_unit||"";
    document.getElementById("unit_symbol").value=row.unit_symbol||"";
    convTypeInput.value=(row.conv_type==="/"?"/":"*");
    convValueInput.value=(row.conv_value===null||row.conv_value===undefined||row.conv_value==="")?"1":String(row.conv_value);
    activeSkuId=Number(row.sku_id);
    clearFieldErrors();
}

function fillForm(row){
    fillFormWithoutRender(row);
    validateNumericFields();
    setMode("display");
    setFormEditable(false);
    syncActionMode();
    renderSkus();
}

function resetForm(){
    skuForm.reset();
    document.getElementById("sku_id").value="";
    decimalsInput.value="2";
    convTypeInput.value="*";
    convValueInput.value="1";
    setConversionRowActive();
    clearFieldErrors();
    setMode("add");
    setFormEditable(true);
    syncActionMode();
    renderSkus();
}

function renderSkus(){
    ensureActiveSelection();
    const keyword = "";
    const rows=allSkus.filter(function(row){
        return !keyword || skuNameOf(row).toLowerCase().includes(keyword) || skuSymbolOf(row).toLowerCase().includes(keyword);
    });

    if(!rows.length){skuList.innerHTML="<div class='sku-row'>No records found</div>";return;}

    skuList.innerHTML=rows.map(function(row){
        const active=Number(row.sku_id)===activeSkuId?"active":"";
        return "<div class='sku-row "+active+"' data-id='"+esc(row.sku_id)+"'>"+esc(skuNameOf(row))+"</div>";
    }).join("");

    skuList.querySelectorAll(".sku-row").forEach(function(item){item.addEventListener("click",function(){selectRow(this);});});
    syncSelectionHighlight();
}

function syncSelectionHighlight(){
    const rows=Array.from(skuList.querySelectorAll(".sku-row")).filter(function(r){return r.dataset.id;});
    rows.forEach(function(r){r.classList.remove("active");});
    const activeRow=rows.find(function(r){return Number(r.dataset.id)===Number(activeSkuId);});
    if(activeRow){activeRow.classList.add("active");activeRow.scrollIntoView({block:"nearest"});}
}

function selectRow(row){
    skuList.querySelectorAll(".sku-row").forEach(function(r){r.classList.remove("active");});
    row.classList.add("active");
    const id=Number(row.dataset.id);
    activeSkuId=id;
    const selected=allSkus.find(function(x){return Number(x.sku_id)===id;});
    if(!selected)return;
    fillFormWithoutRender(selected);
    row.scrollIntoView({block:"center"});
}

async function loadSkus(preferredId){
    const res=await fetch("../../../api/sku_unit/get_sku_unit.php");
    allSkus=await res.json();
    if(!Array.isArray(allSkus))allSkus=[];

    if(allSkus.length){
        if(preferredId&&allSkus.some(function(row){return Number(row.sku_id)===Number(preferredId);})){activeSkuId=Number(preferredId);}        
        const selected=ensureActiveSelection();
        renderSkus();
        if(selected)fillFormWithoutRender(selected);
        setMode("display");
        setFormEditable(false);
        syncActionMode();
        document.querySelector(".list-wrap").scrollTop=0;
    }else{
        skuList.innerHTML="<div class='sku-row'>No records found</div>";
        resetForm();
    }
}

function startAddMode(){
    skuForm.reset();
    document.getElementById("sku_id").value="";
    decimalsInput.value="2";
    convTypeInput.value="*";
    convValueInput.value="1";
    setConversionRowActive();
    clearFieldErrors();
    setMode("add");
    setFormEditable(true);
    syncActionMode();
}

function startModifyMode(){
    const selected=ensureActiveSelection();
    if(!selected){alert("No SKU selected");return;}
    preEditSkuId=Number(selected.sku_id);
    fillFormWithoutRender(selected);
    setMode("modify");
    setFormEditable(true);
    syncActionMode();
}

function cancelEditMode(){
    if(currentMode==="add"){
        const selected=ensureActiveSelection();
        if(selected){fillForm(selected);}else{resetForm();}
        return;
    }
    if(currentMode==="modify"){
        const selected=allSkus.find(function(row){return Number(row.sku_id)===Number(preEditSkuId);})||ensureActiveSelection();
        if(selected){fillForm(selected);}else{resetForm();}
        return;
    }
}

function keepPrimaryFieldActive(){
    if(currentMode==="add"||currentMode==="modify"){
        setTimeout(function(){if(!skuForm.contains(document.activeElement))skuNameInput.focus();},0);
    }
}

function nextByName(name){
    const n=(name||"").trim().toLowerCase();
    if(!n)return null;
    return allSkus.find(function(row){return skuNameOf(row).trim().toLowerCase()===n;})||null;
}

async function saveRecord(){
    validateNumericFields();

    const formData=new FormData(skuForm);
    const skuName=(formData.get("sku_name")||"").trim();
    const skuSymbol=(formData.get("sku_symbol")||"").trim();

    clearFieldErrors();
    if(!skuName){showSkuNameError("Required");skuNameInput.focus();return;}
    if(!skuSymbol){showSkuSymbolError("Required");skuSymbolInput.focus();return;}
    if(checkDuplicateSkuName()){skuNameInput.focus();skuNameInput.select();return;}

    formData.set("sku_name",skuName);
    formData.set("sku_symbol",skuSymbol.toUpperCase());

    if(currentMode!=="modify"){
        const confirmAdd=await window.confirmAdd("Are you sure you want to add this SKU?\n\n"+skuName);
        if(!confirmAdd)return;
    }

    let apiUrl="../../../api/sku_unit/add_sku_unit.php";
    if(currentMode==="modify")apiUrl="../../../api/sku_unit/update_sku_unit.php";

    const preserveId=currentMode==="modify"?Number(formData.get("sku_id")||0):null;
    const preserveName=skuName;

    const response=await fetch(apiUrl,{method:"POST",body:formData});
    const data=await response.json();
    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }
    if(data.status!=="success")return;

    await loadSkus(preserveId);
    if(!preserveId){
        const created=nextByName(preserveName);
        if(created){activeSkuId=Number(created.sku_id);fillForm(created);}        
    }
    if(preserveId){
        const updated=allSkus.find(function(row){return Number(row.sku_id)===Number(preserveId);});
        if(updated){fillForm(updated);}        
    }
}

async function deleteRecord(){
    const selected=ensureActiveSelection();
    if(!selected){alert("No SKU selected");return;}
    if(!(await confirmDelete("Delete this SKU?")))return;

    const body=new URLSearchParams();
    body.set("sku_id",selected.sku_id);

    const response=await fetch("../../../api/sku_unit/delete_sku_unit.php",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:body.toString()
    });
    const data=await response.json();
    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }
    if(data.status!=="success")return;

    const currentIdx=allSkus.findIndex(function(row){return Number(row.sku_id)===Number(selected.sku_id);});
    await loadSkus();
    if(!allSkus.length)return;

    const fallback=allSkus[Math.min(Math.max(currentIdx,0),allSkus.length-1)]||allSkus[0];
    activeSkuId=Number(fallback.sku_id);
    fillForm(fallback);
}

document.getElementById("addBtn").addEventListener("click",startAddMode);
document.getElementById("modifyBtn").addEventListener("click",startModifyMode);
document.getElementById("deleteBtn").addEventListener("click",deleteRecord);
document.getElementById("printBtn").addEventListener("click",function(){window.print();});
document.getElementById("exitBtn").addEventListener("click",function(){window.location.href = appRoot + "index.html";});
document.getElementById("cancelBtn").addEventListener("click",cancelEditMode);
document.getElementById("saveBtn").addEventListener("click",saveRecord);

conversionRow.addEventListener("click",function(){setConversionRowActive();});
conversionRow.addEventListener("focusin",function(){setConversionRowActive();});

skuNameInput.addEventListener("input",function(){if(currentMode!=="display")checkDuplicateSkuName();});
skuSymbolInput.addEventListener("input",function(){clearSkuSymbolError();});
skuForm.addEventListener("focusin",function(e){
    if(currentMode!=="modify")return;
    const field=e.target;
    if((field.tagName==="INPUT"||field.tagName==="SELECT")&&field.type!=="hidden"&&!field.readOnly&&!field.disabled){
        if(field.select)setTimeout(function(){field.select();},0);
    }
});let typeBuffer="",typeTimer=null,lastMatchedIndex=-1;
document.addEventListener("keydown",function(e){
    if(currentMode!=="display")return;
    if(e.ctrlKey||e.altKey||e.metaKey)return;
    const rows=Array.from(skuList.querySelectorAll(".sku-row")).filter(function(r){return r.dataset.id;});
    if(!rows.length)return;
    const isSearchBox=document.activeElement.id==="filterInput";

    if(e.key.length===1&&/^[a-zA-Z]$/.test(e.key)){
        if(isSearchBox)return;
        e.preventDefault();
        const letter=e.key.toLowerCase();
        if(typeTimer)clearTimeout(typeTimer);
        typeBuffer+=letter;
        typeTimer=setTimeout(function(){typeBuffer="";lastMatchedIndex=-1;},700);

        let matchIndex=-1;
        if(typeBuffer.length===1){
            const startIndex=lastMatchedIndex+1;
            matchIndex=rows.findIndex(function(row,index){return index>=startIndex&&row.textContent.trim().toLowerCase().startsWith(letter);});
            if(matchIndex===-1)matchIndex=rows.findIndex(function(row){return row.textContent.trim().toLowerCase().startsWith(letter);});
        }else{
            matchIndex=rows.findIndex(function(row){return row.textContent.trim().toLowerCase().startsWith(typeBuffer);});
        }

        if(matchIndex!==-1){
            lastMatchedIndex=matchIndex;
            selectRow(rows[matchIndex]);
        }
    }
});

document.addEventListener("keydown",function(e){
    if(currentMode==="add"||currentMode==="modify"){
        const target=e.target;
        const inConvArea=target&&target.closest&&target.closest("#conversionRow,#convShortcutBar");
        if(inConvArea){
            const isTypingField=target.matches&&target.matches("input:not([type='checkbox']):not([type='radio']), textarea");
            if((e.key==="a"||e.key==="A"||e.key==="e"||e.key==="E"||e.key==="d"||e.key==="D")&&isTypingField)return;
            if(e.key==="A"||e.key==="a"){e.preventDefault();focusConversionRow();return;}
            if(e.key==="E"||e.key==="e"){e.preventDefault();focusConversionRow();return;}
            if(e.key==="D"||e.key==="d"){e.preventDefault();clearConversionRow();focusConversionRow();return;}
            if(e.key==="F1"){e.preventDefault();decimalsInput.focus();return;}
        }
    }
    if(currentMode!=="display")return;
    const rows=Array.from(skuList.querySelectorAll(".sku-row")).filter(function(r){return r.dataset.id;});
    if(!rows.length)return;
    let currentIndex=rows.findIndex(function(row){return Number(row.dataset.id)===Number(activeSkuId);});
    if(currentIndex===-1)currentIndex=0;

    if(e.key==="ArrowDown"){e.preventDefault();if(currentIndex<rows.length-1)currentIndex++;selectRow(rows[currentIndex]);}
    if(e.key==="ArrowUp"){e.preventDefault();if(currentIndex>0)currentIndex--;selectRow(rows[currentIndex]);}
});

document.addEventListener("mousedown",function(e){if(currentMode==="add"||currentMode==="modify"){if(!skuForm.contains(e.target))keepPrimaryFieldActive();}});setMode("display");
setFormEditable(false);
syncActionMode();

(async function init(){
    await loadSkus();
    if(allSkus.length){
        const first=ensureActiveSelection();
        if(first)fillFormWithoutRender(first);
        renderSkus();
    }
})();
</script>

</body>
</html>
