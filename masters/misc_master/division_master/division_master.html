<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Division Master | SoftBrokerage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../../style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script>
        const appRoot = (function(){
            const path = String(location.pathname || "").replace(/\\/g, "/");
            const lower = path.toLowerCase();
            const marker = "/brokerapp/";
            const idx = lower.indexOf(marker);
            if (idx !== -1) {
                return location.origin + path.slice(0, idx + marker.length);
            }
            return location.origin + "/";
        })();
        (async function () {
            const res = await fetch(appRoot + "api/check_auth.php");
            const data = await res.json();
            if (!data.logged_in) window.location.replace(appRoot + "login.html");
        })();
    </script>
    <script src="../../../global-nav.js" defer></script>
    <script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>

    <link rel="stylesheet" href="../../../selection-mode.css?v=1">
    <link rel="stylesheet" href="../../../add-mode.css?v=1">
    <script src="../../../add-mode.js" defer></script>
    <script src="../../../permissions-catalog.js"></script>
    <script src="../../../selection-mode.js" defer></script>
    <link rel="stylesheet" href="./style.css?v=1">
    <script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
    <script src="../../../edit-mode.js" defer data-edit-mode="1"></script>
</head>

<body>

    <div class="content">
        <div class="feature-box">
            <h2 class="page-title">Division Master</h2>

            <div class="master-layout">
                <div class="left-panel">
                    <div class="label">Selection Mode</div>
                    <input id="filterInput" type="text" autocomplete="off" placeholder="Search division...">
                    <div class="list-wrap">
                        <div class="list-head">Name</div>
                        <div id="divisionList"></div>
                    </div>
                </div>

                <div class="right-panel">
                    <span id="modeTag" class="mode-tag">Display Mode</span>
                    <form id="divisionForm" autocomplete="off">

                        <div class="tab-shell">

                                <button class="tab-btn active" type="button" data-tab="basicTab">Basic Information</button>
                                <button class="tab-btn" type="button" data-tab="additionalTab">Additional Information</button>
                            </div>
                            <div id="basicTab" class="tab-panel active">

                                            Name</span><span id="divNameError" class="error-text"

                                        required data-add-first data-duplicate-check="checkDuplicateDivisionName"></div>

                                        id="company_name" name="company_name"></div>
                                <div class="form-group"><label for="div_code">Div. Code</label><input id="div_code"
                                        name="div_code"></div>
                                <div class="form-group top-checks">
                                    <div class="check-row"><label><input type="checkbox" id="is_active" name="is_active"
                                                checked> Active</label><label><input type="checkbox" id="is_default"
                                                name="is_default"> Default</label></div>
                                </div>
                                <div class="form-group"><label for="address1">Address 1</label><input id="address1"
                                        name="address1"></div>
                                <div class="form-group"><label for="address2">Address 2</label><input id="address2"

                                <div class="form-group"><label for="address3">Address 3</label><input id="address3"
                                        name="address3"></div>
                                <div class="form-group"><label for="address4">Address 4</label><input id="address4"
                                        name="address4"></div>
                                <div class="form-group"><label for="place_name">Place</label><input id="place_name"

                                <div class="form-group"><label for="state_name">State</label><input id="state_name"

                                <div class="form-group"><label for="pin_code">Pin</label><input id="pin_code"

                                <div class="form-group"><label for="phone_fax">Phone (Fax)</label><input id="phone_fax"

                                <div class="form-group"><label for="email_id">Email ID</label><input id="email_id"

                                <div class="form-group"><label for="website">Website</label><input id="website"
                                        name="website"></div>
                                <div class="form-group"><label for="tin_no">TIN</label><input id="tin_no" name="tin_no">
                                </div>
                                <div class="form-group"><label for="tan_no">TAN</label><input id="tan_no" name="tan_no">

                                        name="bank_name"></div>
                                <div class="form-group"><label for="bank1">Bank1</label><input id="bank1" name="bank1">
                                </div>
                                <div class="form-group"><label for="bank2">Bank2</label><input id="bank2" name="bank2">
                                </div>
                                <div class="form-group"><label for="bank3">Bank3</label><input id="bank3" name="bank3">
                                </div>
                                <div class="form-group"><label for="bank4">Bank4</label><input id="bank4" name="bank4">
                                </div>
                                </div>
                            </div>
                            <div id="additionalTab" class="tab-panel">
                                <div class="form-grid additional-grid">
                                <div class="form-group"><label for="jurisdiction">Jurisdiction</label><input
                                        id="jurisdiction" name="jurisdiction"></div>
                                <div class="form-group terms-box"><label for="fixed_terms">Fixed Terms &amp;
                                        Conditions</label><textarea id="fixed_terms" name="fixed_terms"></textarea>
                                </div>
                                <div class="form-group"><label for="top_line_header">Top Line
                                        (Header)</label><input id="top_line_header" name="top_line_header"></div>
                                <div class="form-group"><label for="middle_line">Middle Line</label><input
                                        id="middle_line" name="middle_line"></div>
                                <div class="form-group"><label for="bottom_footer">Bottom (Footer)</label><input
                                        id="bottom_footer" name="bottom_footer"></div>
                                <div class="form-group"><label for="sms_domain">SMS Domain</label><input id="sms_domain"
                                        name="sms_domain"></div>
                                <div class="form-group"><label for="sms_user">SMS User</label><input id="sms_user"
                                        name="sms_user"></div>
                                <div class="form-group"><label for="sms_password">SMS Password</label><input
                                        id="sms_password" name="sms_password"></div>
                                <div class="form-group"><label for="sms_port">SMS Port</label><input id="sms_port"
                                        name="sms_port"></div>

                    </form>

                     <div id="displayButtons" class="action-row">
                        <button class="btn primary" type="button" id="addBtn">📂 F2-Add</button>
                        <button class="btn" type="button" id="modifyBtn">📝 F3-Modify</button>
                        <button class="btn danger" type="button" id="deleteBtn">❌ F5-Delete</button>
                        <button class="btn" type="button" id="printBtn">📊 F7-Print</button>
                        <button class="btn" type="button" id="exitBtn">❌ Esc-Exit</button>
                    </div>

                    <div id="addModeButtons" class="action-row hidden">
                        <button class="btn danger" type="button" id="cancelBtn">❌ Esc-Cancel</button>
                        <button class="btn primary" type="button" id="saveBtn">💾 F6-Save</button>
                    </div>

                </div>
            </div>
        </div>

        <script>
            let allDivisions = [];
            let activeDivisionId = null;
            let currentMode = "display";
            let preEditDivisionId = null;

            const filterInput = document.getElementById("filterInput");
            const divisionList = document.getElementById("divisionList");
            const divisionForm = document.getElementById("divisionForm");
            const modeTag = document.getElementById("modeTag");
            const displayButtons = document.getElementById("displayButtons");
            const addModeButtons = document.getElementById("addModeButtons");
            const divNameInput = document.getElementById("div_name");
            const divNameError = document.getElementById("divNameError");

            function esc(v) { return (v ?? "").toString().replace(/[&<>\"']/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[m]; }); }
            function divisionNameOf(d) { return (d?.div_name ?? "").toString(); }
            function showDivNameError(message) { divNameInput.classList.add("field-error"); divNameError.textContent = message; divNameError.style.display = "inline"; }
            function clearDivNameError() { divNameInput.classList.remove("field-error"); divNameError.textContent = ""; divNameError.style.display = "none"; }
            function checkDuplicateDivisionName() { const name = divNameInput.value.trim().toLowerCase(); if (!name) { clearDivNameError(); return false; } const currentId = Number(document.getElementById("division_id").value || 0); const duplicate = allDivisions.some(function (d) { const sameName = divisionNameOf(d).trim().toLowerCase() === name; const sameId = Number(d.division_id) === currentId; return sameName && !sameId; }); if (duplicate) { showDivNameError("Already exists"); return true; } clearDivNameError(); return false; }

            function setFormEditable(editable) { const fields = divisionForm.querySelectorAll("input, textarea, select"); fields.forEach(function (field) { if (field.id === "division_id") return; if (field.type === "checkbox") { field.disabled = !editable; if (!editable) field.setAttribute("tabindex", "-1"); else field.removeAttribute("tabindex"); return; } if (!editable) field.setAttribute("tabindex", "-1"); else field.removeAttribute("tabindex"); if (field.tagName === "SELECT") field.disabled = !editable; else field.readOnly = !editable; }); }
            function syncActionMode() { const isDisplay = currentMode === "display"; displayButtons.classList.toggle("hidden", !isDisplay); addModeButtons.classList.toggle("hidden", isDisplay); displayButtons.style.display = isDisplay ? "flex" : "none"; addModeButtons.style.display = isDisplay ? "none" : "flex"; }
            function setMode(mode) { currentMode = mode; const rightPanel = document.querySelector(".right-panel"); rightPanel.classList.remove("add-mode", "modify-mode", "display-mode"); if (mode === "add") { modeTag.textContent = "Add Mode"; rightPanel.classList.add("add-mode"); setTimeout(function () { divNameInput.focus(); }, 0); } if (mode === "modify") { modeTag.textContent = "Edit Mode"; rightPanel.classList.add("modify-mode"); setTimeout(function () { divNameInput.focus(); }, 0); } if (mode === "display") { modeTag.textContent = "Display Mode"; rightPanel.classList.add("display-mode"); preEditDivisionId = null; clearDivNameError(); syncSelectionHighlight(); } syncActionMode(); }
            function ensureActiveDivisionSelection() { if (!allDivisions.length) { activeDivisionId = null; return null; } let active = allDivisions.find(function (d) { return Number(d.division_id) === Number(activeDivisionId); }); if (!active) { active = allDivisions[0]; activeDivisionId = Number(active.division_id); } return active; }
            function resetForm() { divisionForm.reset(); document.getElementById("division_id").value = ""; document.getElementById("is_active").checked = true; document.getElementById("is_default").checked = false; activeDivisionId = null; clearDivNameError(); setMode("add"); setFormEditable(true); syncActionMode(); renderDivisions(); }

            function setField(id, v) { const el = document.getElementById(id); if (el) el.value = v ?? ""; }
            function setCheck(id, v) { const el = document.getElementById(id); if (el) el.checked = Number(v) === 1; }

            function fillForm(d) { setField("division_id", d.division_id); setField("div_name", d.div_name); setField("div_code", d.div_code); setField("company_name", d.company_name); setCheck("is_active", d.is_active); setCheck("is_default", d.is_default); setField("address1", d.address1); setField("address2", d.address2); setField("address3", d.address3); setField("address4", d.address4); setField("place_name", d.place_name); setField("state_name", d.state_name); setField("pin_code", d.pin_code); setField("proprietor", d.proprietor); setField("pan_no", d.pan_no); setField("phone_office", d.phone_office); setField("mobile_no", d.mobile_no); setField("phone_fax", d.phone_fax); setField("email_id", d.email_id); setField("website", d.website); setField("tin_no", d.tin_no); setField("tan_no", d.tan_no); setField("gst_no", d.gst_no); setField("bank_name", d.bank_name); setField("bank1", d.bank1); setField("bank2", d.bank2); setField("bank3", d.bank3); setField("bank4", d.bank4); setField("jurisdiction", d.jurisdiction); setField("top_line_header", d.top_line_header); setField("middle_line", d.middle_line); setField("bottom_footer", d.bottom_footer); setField("fixed_terms", d.fixed_terms); setField("sms_domain", d.sms_domain); setField("sms_user", d.sms_user); setField("sms_password", d.sms_password); setField("sms_port", d.sms_port); setField("smtp_client", d.smtp_client); setField("email_user", d.email_user); setField("email_pwd", d.email_pwd); setField("email_port", d.email_port); activeDivisionId = Number(d.division_id); setMode("display"); setFormEditable(false); syncActionMode(); clearDivNameError(); }
            function fillFormWithoutRender(d) {
                setField("division_id", d.division_id);
                setField("div_name", d.div_name);
                setField("div_code", d.div_code);
                setField("company_name", d.company_name);
                setCheck("is_active", d.is_active);
                setCheck("is_default", d.is_default);
                setField("address1", d.address1);
                setField("address2", d.address2);
                setField("address3", d.address3);
                setField("address4", d.address4);
                setField("place_name", d.place_name);
                setField("state_name", d.state_name);
                setField("pin_code", d.pin_code);
                setField("proprietor", d.proprietor);
                setField("pan_no", d.pan_no);
                setField("phone_office", d.phone_office);
                setField("mobile_no", d.mobile_no);
                setField("phone_fax", d.phone_fax);
                setField("email_id", d.email_id);
                setField("website", d.website);
                setField("tin_no", d.tin_no);
                setField("tan_no", d.tan_no);
                setField("gst_no", d.gst_no);
                setField("bank_name", d.bank_name);
                setField("bank1", d.bank1);
                setField("bank2", d.bank2);
                setField("bank3", d.bank3);
                setField("bank4", d.bank4);
                setField("jurisdiction", d.jurisdiction);
                setField("top_line_header", d.top_line_header);
                setField("middle_line", d.middle_line);
                setField("bottom_footer", d.bottom_footer);
                setField("fixed_terms", d.fixed_terms);
                setField("sms_domain", d.sms_domain);
                setField("sms_user", d.sms_user);
                setField("sms_password", d.sms_password);
                setField("sms_port", d.sms_port);
                setField("smtp_client", d.smtp_client);
                setField("email_user", d.email_user);
                setField("email_pwd", d.email_pwd);
                setField("email_port", d.email_port);
                activeDivisionId = Number(d.division_id);
                setMode("display");
                setFormEditable(false);
                syncActionMode();
                clearDivNameError();
            }
            function renderDivisions() { ensureActiveDivisionSelection(); const keyword = ""; const rows = allDivisions.filter(function (d) { return !keyword || divisionNameOf(d).toLowerCase().includes(keyword); }); if (!rows.length) { divisionList.innerHTML = "<div class='division-row'>No records found</div>"; return; } divisionList.innerHTML = rows.map(function (d) { const active = Number(d.division_id) === activeDivisionId ? "active" : ""; return "<div class='division-row " + active + "' data-id='" + esc(d.division_id) + "'>" + esc(divisionNameOf(d)) + "</div>"; }).join(""); divisionList.querySelectorAll(".division-row").forEach(function (row) { row.addEventListener("click", function () { selectRow(this); }); }); syncSelectionHighlight(); }
            function syncSelectionHighlight() { const rows = Array.from(divisionList.querySelectorAll(".division-row")).filter(function (r) { return r.dataset.id; }); rows.forEach(function (r) { r.classList.remove("active"); }); const activeRow = rows.find(function (r) { return Number(r.dataset.id) === Number(activeDivisionId); }); if (activeRow) { activeRow.classList.add("active"); activeRow.scrollIntoView({ block: "nearest" }); } }
            function selectRow(row) { divisionList.querySelectorAll(".division-row").forEach(function (r) { r.classList.remove("active"); }); row.classList.add("active"); const id = Number(row.dataset.id); activeDivisionId = id; const d = allDivisions.find(function (x) { return Number(x.division_id) === id; }); if (!d) return; fillFormWithoutRender(d); row.scrollIntoView({ block: "center" }); }

            async function loadDivisions() { const res = await fetch("../../../api/division/get_division.php"); allDivisions = await res.json(); if (allDivisions.length) { ensureActiveDivisionSelection(); renderDivisions(); const selected = ensureActiveDivisionSelection(); if (selected) fillFormWithoutRender(selected); document.querySelector(".list-wrap").scrollTop = 0; } else { renderDivisions(); setMode("display"); setFormEditable(false); syncActionMode(); } }

            function customConfirm(message, callback) { if (window.deleteModeConfirm) { window.deleteModeConfirm(message, callback); return; } }

            async function saveDivision(isModify) { const fd = new FormData(divisionForm); const divisionId = fd.get("division_id"); const divName = (fd.get("div_name") || "").trim(); if (checkDuplicateDivisionName()) { divNameInput.focus(); divNameInput.select(); return; } if (!divName) { showDivNameError("Required"); setTimeout(function () { divNameInput.focus(); divNameInput.select(); }, 50); return; } if (!isModify) { const c = await window.confirmAdd("Are you sure you want to add this division?\n\n" + divName); if (!c) return; } let url = "../../../api/division/add_division.php"; if (isModify) { if (!divisionId) { alert("Select a division to modify"); return; } url = "../../../api/division/update_division.php"; } const res = await fetch(url, { method: "POST", body: fd }); const data = await res.json(); if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); } if (data.status === "success") { await loadDivisions(); if (isModify && divisionId) { const updated = allDivisions.find(function (d) { return Number(d.division_id) === Number(divisionId); }); if (updated) fillForm(updated); return; } resetForm(); setMode("add"); setFormEditable(true); syncActionMode(); divNameInput.focus(); } }

            async function deleteDivision() { const divisionId = document.getElementById("division_id").value; if (!divisionId) { alert("Select a division to delete"); return; } customConfirm("Delete this division?", async function () { const body = new URLSearchParams(); body.set("division_id", divisionId); const res = await fetch("../../../api/division/delete_division.php", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: body.toString() }); const data = await res.json(); if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); } if (data.status === "success") { await loadDivisions(); if (allDivisions.length) { setMode("display"); setFormEditable(false); syncActionMode(); } else resetForm(); } }); }

            function handleAddAction() { preEditDivisionId = activeDivisionId; resetForm(); divNameInput.focus(); }
            function handleModifyAction() { const divisionId = document.getElementById("division_id").value; if (!divisionId) { alert("Select a division to modify"); return; } preEditDivisionId = Number(divisionId); setMode("modify"); setFormEditable(true); syncActionMode(); }
            function cancelEditMode() { if (preEditDivisionId) { const previous = allDivisions.find(function (d) { return Number(d.division_id) === Number(preEditDivisionId); }); if (previous) { fillForm(previous); preEditDivisionId = null; return; } } const fallback = ensureActiveDivisionSelection(); if (fallback) { fillForm(fallback); return; } setMode("display"); setFormEditable(false); syncActionMode(); renderDivisions(); }
            function keepDivNameActive() { if (currentMode === "add" || currentMode === "modify") { setTimeout(function () { if (!divisionForm.contains(document.activeElement)) divNameInput.focus(); }, 0); } }

            divNameInput.addEventListener("input", function () { if (currentMode === "add" || currentMode === "modify") checkDuplicateDivisionName(); });
            divisionForm.addEventListener("focusin", function (e) { if (currentMode !== "modify") return; const field = e.target; if (field.tagName === "INPUT" && field.type === "text" && !field.readOnly) { setTimeout(function () { field.select(); }, 0); } });

            function setActiveTab(tabId) {
                document.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.remove("active"); });
                document.querySelectorAll(".tab-panel").forEach(function (p) { p.classList.remove("active"); });
                const btn = document.querySelector('.tab-btn[data-tab="' + tabId + '"]');
                if (btn) btn.classList.add("active");
                const panel = document.getElementById(tabId);
                if (panel) panel.classList.add("active");
            }

            document.querySelectorAll(".tab-btn").forEach(function (btn) {
                btn.addEventListener("click", function () {
                    setActiveTab(btn.dataset.tab);
                });
            });

            const additionalFirstField = document.getElementById("jurisdiction");
            const basicLastField = document.getElementById("bank4");

            if (basicLastField) {
                basicLastField.addEventListener("keydown", function (e) {
                    if (currentMode !== "add" && currentMode !== "modify") return;
                    if (e.key === "Enter" || e.key === "Tab") {
                        e.preventDefault();
                        setActiveTab("additionalTab");
                        if (additionalFirstField) additionalFirstField.focus();
                    }
                });
            }

            document.getElementById("addBtn").addEventListener("click", handleAddAction);
            document.getElementById("modifyBtn").addEventListener("click", handleModifyAction);
            document.getElementById("deleteBtn").addEventListener("click", deleteDivision);
            document.getElementById("printBtn").addEventListener("click", function () { window.print(); });
            document.getElementById("exitBtn").addEventListener("click", function () { window.location.href = appRoot + "index.html"; });
            document.getElementById("cancelBtn").addEventListener("click", cancelEditMode);
            document.getElementById("saveBtn").addEventListener("click", function () { if (currentMode === "modify") saveDivision(true); else saveDivision(false); });
            let typeBuffer = "", typeTimer = null, lastMatchedIndex = -1;
            document.addEventListener("keydown", function (e) { if (currentMode !== "display") return; if (e.ctrlKey || e.altKey || e.metaKey) return; const rows = Array.from(divisionList.querySelectorAll(".division-row")).filter(function (r) { return r.dataset.id; }); if (!rows.length) return; const isSearchBox = document.activeElement.id === "filterInput"; if (e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) { if (isSearchBox) return; e.preventDefault(); const letter = e.key.toLowerCase(); if (typeTimer) clearTimeout(typeTimer); typeBuffer += letter; typeTimer = setTimeout(function () { typeBuffer = ""; lastMatchedIndex = -1; }, 700); let matchIndex = -1; if (typeBuffer.length === 1) { const startIndex = lastMatchedIndex + 1; matchIndex = rows.findIndex(function (row, index) { return index >= startIndex && row.textContent.trim().toLowerCase().startsWith(letter); }); if (matchIndex === -1) matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(letter); }); } else { matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(typeBuffer); }); } if (matchIndex !== -1) { lastMatchedIndex = matchIndex; selectRow(rows[matchIndex]); } } });
            document.addEventListener("keydown", function (e) { if (currentMode !== "display") return; const rows = Array.from(divisionList.querySelectorAll(".division-row")).filter(function (r) { return r.dataset.id; }); if (!rows.length) return; let currentIndex = rows.findIndex(function (row) { return Number(row.dataset.id) === Number(activeDivisionId); }); if (currentIndex === -1) currentIndex = 0; if (e.key === "ArrowDown") { e.preventDefault(); if (currentIndex < rows.length - 1) currentIndex++; selectRow(rows[currentIndex]); } if (e.key === "ArrowUp") { e.preventDefault(); if (currentIndex > 0) currentIndex--; selectRow(rows[currentIndex]); } });

            document.addEventListener("mousedown", function (e) { if (currentMode === "add" || currentMode === "modify") { if (!divisionForm.contains(e.target)) keepDivNameActive(); } }); (function () { let navMode = false, mainIndex = 0, subIndex = -1; const topNavItems = function () { return Array.from(document.querySelectorAll(".top-nav > li, .main-nav > li, nav > ul > li")).filter(function (li) { return li.offsetParent !== null; }); }; function getSubItems(li) { return Array.from(li.querySelectorAll("ul li")).filter(function (item) { return item.offsetParent !== null; }); } function highlightMain(index) { const items = topNavItems(); items.forEach(function (i) { i.classList.remove("nav-active"); }); if (!items[index]) return; items[index].classList.add("nav-active"); if (items[index].focus) items[index].focus(); } function highlightSub(subItems, index) { subItems.forEach(function (i) { i.classList.remove("nav-sub-active"); }); if (!subItems[index]) return; subItems[index].classList.add("nav-sub-active"); subItems[index].scrollIntoView({ block: "nearest" }); } function resetNav() { navMode = false; mainIndex = 0; subIndex = -1; document.querySelectorAll(".nav-active").forEach(function (el) { el.classList.remove("nav-active"); }); document.querySelectorAll(".nav-sub-active").forEach(function (el) { el.classList.remove("nav-sub-active"); }); } document.addEventListener("keydown", function (e) { if (e.key === "Alt" && !navMode) { e.preventDefault(); navMode = true; mainIndex = 0; subIndex = -1; highlightMain(mainIndex); return; } if (!navMode) return; const items = topNavItems(); const currentMain = items[mainIndex]; const subItems = currentMain ? getSubItems(currentMain) : []; if (e.key === "Escape") { e.preventDefault(); resetNav(); return; } if (e.key === "ArrowRight") { e.preventDefault(); mainIndex = (mainIndex + 1) % items.length; subIndex = -1; highlightMain(mainIndex); } if (e.key === "ArrowLeft") { e.preventDefault(); mainIndex = (mainIndex - 1 + items.length) % items.length; subIndex = -1; highlightMain(mainIndex); } if (e.key === "ArrowDown") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = 0; else subIndex = (subIndex + 1) % subItems.length; highlightSub(subItems, subIndex); } if (e.key === "ArrowUp") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = subItems.length - 1; else subIndex = (subIndex - 1 + subItems.length) % subItems.length; highlightSub(subItems, subIndex); } if (e.key === "Enter") { e.preventDefault(); if (subIndex >= 0 && subItems[subIndex]) subItems[subIndex].click(); else if (currentMain) currentMain.click(); resetNav(); } }); })();

            setFormEditable(false);
