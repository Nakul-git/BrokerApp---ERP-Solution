<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Deals In Master | SoftBrokerage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../../style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

   <link rel="stylesheet" href="./style.css?v=8">

    <script>
        const appRoot = (function(){ const path = String(location.pathname || '').replace(/\\\\/g, '/'); const lower = path.toLowerCase(); const marker = '/brokerapp/'; const idx = lower.indexOf(marker); if (idx !== -1) { return location.origin + path.slice(0, idx + marker.length); } return location.origin + '/'; })();
(async function () {
            const res = await fetch(appRoot + "api/check_auth.php");
            const data = await res.json();
            if (!data.logged_in) window.location.replace(appRoot + "login.html");
        })();
    </script>
    <script src="../../../global-nav.js" defer></script>
    <script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>

    <link rel="stylesheet" href="../../../selection-mode.css?v=1">
    <link rel="stylesheet" href="../../../add-mode.css?v=1">
    <script src="../../../add-mode.js" defer></script>
    <script src="../../../permissions-catalog.js"></script>
    <script src="../../../selection-mode.js" defer></script>
<script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../../edit-mode.js" defer data-edit-mode="1"></script>
</head>

<body>

    <div class="content">
        <div class="feature-box">
            <h2 class="page-title">Deals In Master</h2>

            <div class="master-layout">
                <div class="left-panel">
                    <div class="label">Selection Mode</div>
                    <input id="filterInput" type="text" autocomplete="off" placeholder="Search deals...">
                    <div class="list-wrap">
                        <div class="list-head">Name</div>
                        <div id="dealsList"></div>
                    </div>
                </div>

                <div class="right-panel">
                    <span id="modeTag" class="mode-tag">Display Mode</span>
                    <form id="dealsForm" autocomplete="off">
                        <input type="hidden" id="deals_id" name="deals_id">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label for="deals_name" class="label-with-error">
                                    <span>Description</span>
                                    <span id="dealsNameError" class="error-text" style="display:none;"></span>
                                </label>
                                <input id="deals_name" name="deals_name" required data-add-first
                                    data-duplicate-check="checkDuplicateDealsName">
                            </div>
                        </div>
                    </form>

                    <div id="displayButtons" class="action-row">
                        <button class="btn primary" type="button" id="addBtn">📂 F2-Add</button>
                        <button class="btn" type="button" id="modifyBtn">📝 F3-Modify</button>
                        <button class="btn danger" type="button" id="deleteBtn">❌ F5-Delete</button>
                        <button class="btn" type="button" id="printBtn">📊 F7-Print</button>
                        <button class="btn" type="button" id="exitBtn">❌ Esc-Exit</button>
                    </div>

                    <div id="addModeButtons" class="action-row hidden">
                        <button class="btn danger" type="button" id="cancelBtn">❌ Esc-Cancel</button>
                        <button class="btn primary" type="button" id="saveBtn">💾 F6-Save</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let allDeals = [];
            let activeDealsId = null;
            let currentMode = "display";
            let preEditDealsId = null;

            const filterInput = document.getElementById("filterInput");
            const dealsList = document.getElementById("dealsList");
            const dealsForm = document.getElementById("dealsForm");
            const modeTag = document.getElementById("modeTag");
            const displayButtons = document.getElementById("displayButtons");
            const addModeButtons = document.getElementById("addModeButtons");
            const dealsNameInput = document.getElementById("deals_name");
            const dealsNameError = document.getElementById("dealsNameError");
            function esc(v) { return (v ?? "").toString().replace(/[&<>\"']/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[m]; }); }
            function dealsNameOf(deal) { return (deal?.deals_name ?? deal?.description ?? "").toString(); }

            function showDealsNameError(message) { dealsNameInput.classList.add("field-error"); dealsNameError.textContent = message; dealsNameError.style.display = "inline"; }
            function clearDealsNameError() { dealsNameInput.classList.remove("field-error"); dealsNameError.textContent = ""; dealsNameError.style.display = "none"; }

            function checkDuplicateDealsName() {
                const name = dealsNameInput.value.trim().toLowerCase();
                if (!name) { clearDealsNameError(); return false; }
                const currentId = Number(document.getElementById("deals_id").value || 0);
                const duplicate = allDeals.some(function (deal) {
                    const sameName = dealsNameOf(deal).trim().toLowerCase() === name;
                    const sameId = Number(deal.deals_id) === currentId;
                    return sameName && !sameId;
                });
                if (duplicate) { showDealsNameError("Already exists"); return true; }
                clearDealsNameError();
                return false;
            }

            function setFormEditable(editable) {
                const fields = dealsForm.querySelectorAll("input, select");
                fields.forEach(function (field) {
                    if (field.id === "deals_id") return;
                    if (!editable) field.setAttribute("tabindex", "-1");
                    else field.removeAttribute("tabindex");
                    if (field.tagName === "SELECT") field.disabled = !editable;
                    else field.readOnly = !editable;
                });
            }

            function syncActionMode() {
                const isDisplay = currentMode === "display";
                displayButtons.classList.toggle("hidden", !isDisplay);
                addModeButtons.classList.toggle("hidden", isDisplay);
                displayButtons.style.display = isDisplay ? "flex" : "none";
                addModeButtons.style.display = isDisplay ? "none" : "flex";
            }

            function setMode(mode) {
                currentMode = mode;
                const rightPanel = document.querySelector(".right-panel");
                rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");

                if (mode === "add") {
                    modeTag.textContent = "Add Mode";
                    rightPanel.classList.add("add-mode");
                    setTimeout(function () { dealsNameInput.focus(); }, 0);
                }
                if (mode === "modify") {
                    modeTag.textContent = "Edit Mode";
                    rightPanel.classList.add("modify-mode");
                    setTimeout(function () { dealsNameInput.focus(); }, 0);
                }
                if (mode === "display") {
                    modeTag.textContent = "Display Mode";
                    rightPanel.classList.add("display-mode");
                    preEditDealsId = null;
                    clearDealsNameError();
                    syncSelectionHighlight();
                }
                syncActionMode();
            }

            function ensureActiveDealsSelection() {
                if (!allDeals.length) {
                    activeDealsId = null;
                    return null;
                }
                let active = allDeals.find(function (deal) { return Number(deal.deals_id) === Number(activeDealsId); });
                if (!active) {
                    active = allDeals[0];
                    activeDealsId = Number(active.deals_id);
                }
                return active;
            }

            function resetForm() {
                dealsForm.reset();
                document.getElementById("deals_id").value = "";
                activeDealsId = null;
                clearDealsNameError();
                setMode("add");
                setFormEditable(true);
                syncActionMode();
                renderDeals();
            }

            function fillForm(deal) {
                document.getElementById("deals_id").value = deal.deals_id || "";
                document.getElementById("deals_name").value = dealsNameOf(deal);
                activeDealsId = Number(deal.deals_id);
                setMode("display");
                setFormEditable(false);
                syncActionMode();
                clearDealsNameError();
            }

            function fillFormWithoutRender(deal) {
                document.getElementById("deals_id").value = deal.deals_id || "";
                document.getElementById("deals_name").value = dealsNameOf(deal);
                activeDealsId = Number(deal.deals_id);
            }

            function renderDeals() {
                ensureActiveDealsSelection();
                const keyword = "";
                const rows = allDeals.filter(function (deal) {
                    return !keyword || dealsNameOf(deal).toLowerCase().includes(keyword);
                });

                if (!rows.length) {
                    dealsList.innerHTML = "<div class='deals-row'>No records found</div>";
                    return;
                }

                dealsList.innerHTML = rows.map(function (deal) {
                    const active = Number(deal.deals_id) === activeDealsId ? "active" : "";
                    return "<div class='deals-row " + active + "' data-id='" + esc(deal.deals_id) + "'>" + esc(dealsNameOf(deal)) + "</div>";
                }).join("");

                dealsList.querySelectorAll(".deals-row").forEach(function (row) {
                    row.addEventListener("click", function () { selectRow(this); });
                });

                syncSelectionHighlight();
            }

            function syncSelectionHighlight() {
                const rows = Array.from(dealsList.querySelectorAll(".deals-row")).filter(function (r) { return r.dataset.id; });
                rows.forEach(function (r) { r.classList.remove("active"); });
                const activeRow = rows.find(function (r) { return Number(r.dataset.id) === Number(activeDealsId); });
                if (activeRow) {
                    activeRow.classList.add("active");
                    activeRow.scrollIntoView({ block: "nearest" });
                }
            }

            function selectRow(row) {
                dealsList.querySelectorAll(".deals-row").forEach(function (r) { r.classList.remove("active"); });
                row.classList.add("active");
                const id = Number(row.dataset.id);
                activeDealsId = id;
                const deal = allDeals.find(function (x) { return Number(x.deals_id) === id; });
                if (!deal) return;
                fillFormWithoutRender(deal);
                row.scrollIntoView({ block: "center" });
            }

            async function loadDeals() {
                const res = await fetch("../../../api/deals_in/get_deals_in.php");
                allDeals = await res.json();

                if (allDeals.length) {
                    ensureActiveDealsSelection();
                    renderDeals();
                    const selected = ensureActiveDealsSelection();
                    if (selected) fillFormWithoutRender(selected);
                    document.querySelector(".list-wrap").scrollTop = 0;
                } else {
                    renderDeals();
                    setMode("display");
                    setFormEditable(false);
                    syncActionMode();
                }
            }

            function customConfirm(message, callback) {
                if (window.deleteModeConfirm) {
                    window.deleteModeConfirm(message, callback);
                    return;
                }
            }

            async function saveDeals(isModify) {
                const fd = new FormData(dealsForm);
                const dealsId = fd.get("deals_id");
                const dealsName = (fd.get("deals_name") || "").trim();

                if (checkDuplicateDealsName()) {
                    dealsNameInput.focus();
                    dealsNameInput.select();
                    return;
                }
                if (!dealsName) {
                    showDealsNameError("Required");
                    setTimeout(function () { dealsNameInput.focus(); dealsNameInput.select(); }, 50);
                    return;
                }

                if (!isModify) {
                    const confirmAdd = await window.confirmAdd("Are you sure you want to add this deals entry?\n\n" + dealsName);
                    if (!confirmAdd) return;
                }

                let url = "../../../api/deals_in/add_deals_in.php";
                if (isModify) {
                    if (!dealsId) { alert("Select a record to modify"); return; }
                    url = "../../../api/deals_in/update_deals_in.php";
                }

                const res = await fetch(url, { method: "POST", body: fd });
                const data = await res.json();
                if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

                if (data.status === "success") {
                    await loadDeals();
                    if (isModify && dealsId) {
                        const updated = allDeals.find(function (deal) { return Number(deal.deals_id) === Number(dealsId); });
                        if (updated) fillForm(updated);
                        return;
                    }
                    resetForm();
                    setMode("add");
                    setFormEditable(true);
                    syncActionMode();
                    dealsNameInput.focus();
                }
            }

            async function deleteDeals() {
                const dealsId = document.getElementById("deals_id").value;
                if (!dealsId) { alert("Select a record to delete"); return; }

                customConfirm("Delete this record?", async function () {
                    const body = new URLSearchParams();
                    body.set("deals_id", dealsId);

                    const res = await fetch("../../../api/deals_in/delete_deals_in.php", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: body.toString()
                    });
                    const data = await res.json();
                    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

                    if (data.status === "success") {
                        await loadDeals();
                        if (allDeals.length) {
                            setMode("display");
                            setFormEditable(false);
                            syncActionMode();
                        } else {
                            resetForm();
                        }
                    }
                });
            }

            function handleAddAction() { preEditDealsId = activeDealsId; resetForm(); dealsNameInput.focus(); }
            function handleModifyAction() {
                const dealsId = document.getElementById("deals_id").value;
                if (!dealsId) { alert("Select a record to modify"); return; }
                preEditDealsId = Number(dealsId);
                setMode("modify");
                setFormEditable(true);
                syncActionMode();
            }
            function cancelEditMode() {
                if (preEditDealsId) {
                    const previous = allDeals.find(function (deal) { return Number(deal.deals_id) === Number(preEditDealsId); });
                    if (previous) { fillForm(previous); preEditDealsId = null; return; }
                }
                const fallback = ensureActiveDealsSelection();
                if (fallback) { fillForm(fallback); return; }
                setMode("display");
                setFormEditable(false);
                syncActionMode();
                renderDeals();
            }

            function keepDealsNameActive() {
                if (currentMode === "add" || currentMode === "modify") {
                    setTimeout(function () { if (!dealsForm.contains(document.activeElement)) dealsNameInput.focus(); }, 0);
                }
            }

            dealsNameInput.addEventListener("input", function () { if (currentMode === "add" || currentMode === "modify") checkDuplicateDealsName(); });
            dealsForm.addEventListener("focusin", function (e) {
                if (currentMode !== "modify") return;
                const field = e.target;
                if (field.tagName === "INPUT" && field.type !== "hidden" && !field.readOnly) { setTimeout(function () { field.select(); }, 0); }
            });

            document.getElementById("addBtn").addEventListener("click", handleAddAction);
            document.getElementById("modifyBtn").addEventListener("click", handleModifyAction);
            document.getElementById("deleteBtn").addEventListener("click", deleteDeals);
            document.getElementById("printBtn").addEventListener("click", function () { window.print(); });
            document.getElementById("exitBtn").addEventListener("click", function () { window.location.href = "../../../index.html"; });
            document.getElementById("cancelBtn").addEventListener("click", cancelEditMode);
            document.getElementById("saveBtn").addEventListener("click", function () { if (currentMode === "modify") saveDeals(true); else saveDeals(false); });
            let typeBuffer = "", typeTimer = null, lastMatchedIndex = -1;
            document.addEventListener("keydown", function (e) {
                if (currentMode !== "display") return;
                if (e.ctrlKey || e.altKey || e.metaKey) return;
                const rows = Array.from(dealsList.querySelectorAll(".deals-row")).filter(function (r) { return r.dataset.id; });
                if (!rows.length) return;
                const isSearchBox = document.activeElement.id === "filterInput";
                if (e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) {
                    if (isSearchBox) return;
                    e.preventDefault();
                    const letter = e.key.toLowerCase();
                    if (typeTimer) clearTimeout(typeTimer);
                    typeBuffer += letter;
                    typeTimer = setTimeout(function () { typeBuffer = ""; lastMatchedIndex = -1; }, 700);

                    let matchIndex = -1;
                    if (typeBuffer.length === 1) {
                        const startIndex = lastMatchedIndex + 1;
                        matchIndex = rows.findIndex(function (row, index) { return index >= startIndex && row.textContent.trim().toLowerCase().startsWith(letter); });
                        if (matchIndex === -1) matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(letter); });
                    } else {
                        matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(typeBuffer); });
                    }
                    if (matchIndex !== -1) { lastMatchedIndex = matchIndex; selectRow(rows[matchIndex]); }
                }
            });

            document.addEventListener("keydown", function (e) {
                if (currentMode !== "display") return;
                const rows = Array.from(dealsList.querySelectorAll(".deals-row")).filter(function (r) { return r.dataset.id; });
                if (!rows.length) return;
                let currentIndex = rows.findIndex(function (row) { return Number(row.dataset.id) === Number(activeDealsId); });
                if (currentIndex === -1) currentIndex = 0;

                if (e.key === "ArrowDown") { e.preventDefault(); if (currentIndex < rows.length - 1) currentIndex++; selectRow(rows[currentIndex]); }
                if (e.key === "ArrowUp") { e.preventDefault(); if (currentIndex > 0) currentIndex--; selectRow(rows[currentIndex]); }

            });

            document.addEventListener("mousedown", function (e) { if (currentMode === "add" || currentMode === "modify") { if (!dealsForm.contains(e.target)) keepDealsNameActive(); } });(function () {
                let navMode = false, mainIndex = 0, subIndex = -1;
                const topNavItems = function () { return Array.from(document.querySelectorAll(".top-nav > li, .main-nav > li, nav > ul > li")).filter(function (li) { return li.offsetParent !== null; }); };
                function getSubItems(li) { return Array.from(li.querySelectorAll("ul li")).filter(function (item) { return item.offsetParent !== null; }); }
                function highlightMain(index) { const items = topNavItems(); items.forEach(function (i) { i.classList.remove("nav-active"); }); if (!items[index]) return; items[index].classList.add("nav-active"); if (items[index].focus) items[index].focus(); }
                function highlightSub(subItems, index) { subItems.forEach(function (i) { i.classList.remove("nav-sub-active"); }); if (!subItems[index]) return; subItems[index].classList.add("nav-sub-active"); subItems[index].scrollIntoView({ block: "nearest" }); }
                function resetNav() { navMode = false; mainIndex = 0; subIndex = -1; document.querySelectorAll(".nav-active").forEach(function (el) { el.classList.remove("nav-active"); }); document.querySelectorAll(".nav-sub-active").forEach(function (el) { el.classList.remove("nav-sub-active"); }); }

                document.addEventListener("keydown", function (e) {
                    if (e.key === "Alt" && !navMode) { e.preventDefault(); navMode = true; mainIndex = 0; subIndex = -1; highlightMain(mainIndex); return; }
                    if (!navMode) return;
                    const items = topNavItems();
                    const currentMain = items[mainIndex];
                    const subItems = currentMain ? getSubItems(currentMain) : [];

                    if (e.key === "Escape") { e.preventDefault(); resetNav(); return; }
                    if (e.key === "ArrowRight") { e.preventDefault(); mainIndex = (mainIndex + 1) % items.length; subIndex = -1; highlightMain(mainIndex); }
                    if (e.key === "ArrowLeft") { e.preventDefault(); mainIndex = (mainIndex - 1 + items.length) % items.length; subIndex = -1; highlightMain(mainIndex); }
                    if (e.key === "ArrowDown") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = 0; else subIndex = (subIndex + 1) % subItems.length; highlightSub(subItems, subIndex); }
                    if (e.key === "ArrowUp") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = subItems.length - 1; else subIndex = (subIndex - 1 + subItems.length) % subItems.length; highlightSub(subItems, subIndex); }
                    if (e.key === "Enter") { e.preventDefault(); if (subIndex >= 0 && subItems[subIndex]) subItems[subIndex].click(); else if (currentMain) currentMain.click(); resetNav(); }
                });
            })();

            setMode("display");
            setFormEditable(false);
            syncActionMode();

            (async function init() {
                await loadDeals();
                if (allDeals.length) {
                    const first = ensureActiveDealsSelection();
                    if (first) fillFormWithoutRender(first);
                    renderDeals();
                }
            })();
        </script>

</body>

</html>
