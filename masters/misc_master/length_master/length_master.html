<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Length Master | SoftBrokerage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../../style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="./style.css?v=8">
    

    <script>
        const appRoot = (function(){ const path = String(location.pathname || '').replace(/\\\\/g, '/'); const lower = path.toLowerCase(); const marker = '/brokerapp/'; const idx = lower.indexOf(marker); if (idx !== -1) { return location.origin + path.slice(0, idx + marker.length); } return location.origin + '/'; })();
(async function () {
            const res = await fetch(appRoot + "api/check_auth.php");
            const data = await res.json();
            if (!data.logged_in) window.location.replace(appRoot + "login.html");
        })();
    </script>
    <script src="../../../global-nav.js" defer></script>
    <script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>

    <link rel="stylesheet" href="../../../selection-mode.css?v=1">
    <link rel="stylesheet" href="../../../add-mode.css?v=1">
    <script src="../../../add-mode.js" defer></script>
    <script src="../../../permissions-catalog.js"></script>
    <script src="../../../selection-mode.js" defer></script>
<script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../../edit-mode.js" defer data-edit-mode="1"></script>
</head>

<body>

    <div class="content">
        <div class="feature-box">
            <h2 class="page-title">Length Master</h2>

            <div class="master-layout">
                <div class="left-panel">
                    <div class="label">Selection Mode</div>
                    <input id="filterInput" type="text" autocomplete="off" placeholder="Search length...">
                    <div class="list-wrap">
                        <div class="list-head">Name</div>
                        <div id="lengthList"></div>
                    </div>
                </div>

                <div class="right-panel">
                    <span id="modeTag" class="mode-tag">Display Mode</span>
                    <form id="lengthForm" autocomplete="off">
                        <input type="hidden" id="length_id" name="length_id">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label for="length_name" class="label-with-error">
                                    <span>Description</span>
                                    <span id="lengthNameError" class="error-text" style="display:none;"></span>
                                </label>
                                <input id="length_name" name="length_name" required data-add-first
                                    data-duplicate-check="checkDuplicateLengthName">
                            </div>
                        </div>
                    </form>

                    <div id="displayButtons" class="action-row">
                        <button class="btn primary" type="button" id="addBtn">📂 F2-Add</button>
                        <button class="btn" type="button" id="modifyBtn">📝 F3-Modify</button>
                        <button class="btn danger" type="button" id="deleteBtn">❌ F5-Delete</button>
                        <button class="btn" type="button" id="printBtn">📊 F7-Print</button>
                        <button class="btn" type="button" id="exitBtn">❌ Esc-Exit</button>
                    </div>

                    <div id="addModeButtons" class="action-row hidden">
                        <button class="btn danger" type="button" id="cancelBtn">❌ Esc-Cancel</button>
                        <button class="btn primary" type="button" id="saveBtn">💾 F6-Save</button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            let allLengths = [];
            let activeLengthId = null;
            let currentMode = "display";
            let preEditLengthId = null;

            const filterInput = document.getElementById("filterInput");
            const lengthList = document.getElementById("lengthList");
            const lengthForm = document.getElementById("lengthForm");
            const modeTag = document.getElementById("modeTag");
            const displayButtons = document.getElementById("displayButtons");
            const addModeButtons = document.getElementById("addModeButtons");
            const lengthNameInput = document.getElementById("length_name");
            const lengthNameError = document.getElementById("lengthNameError");
            function esc(v) { return (v ?? "").toString().replace(/[&<>\"']/g, function (m) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[m]; }); }
            function lengthNameOf(length) { return (length?.length_name ?? length?.description ?? "").toString(); }

            function showLengthNameError(message) { lengthNameInput.classList.add("field-error"); lengthNameError.textContent = message; lengthNameError.style.display = "inline"; }
            function clearLengthNameError() { lengthNameInput.classList.remove("field-error"); lengthNameError.textContent = ""; lengthNameError.style.display = "none"; }

            function checkDuplicateLengthName() {
                const name = lengthNameInput.value.trim().toLowerCase();
                if (!name) { clearLengthNameError(); return false; }
                const currentId = Number(document.getElementById("length_id").value || 0);
                const duplicate = allLengths.some(function (length) {
                    const sameName = lengthNameOf(length).trim().toLowerCase() === name;
                    const sameId = Number(length.length_id) === currentId;
                    return sameName && !sameId;
                });
                if (duplicate) { showLengthNameError("Already exists"); return true; }
                clearLengthNameError();
                return false;
            }

            function setFormEditable(editable) {
                const fields = lengthForm.querySelectorAll("input, select");
                fields.forEach(function (field) {
                    if (field.id === "length_id") return;
                    if (!editable) field.setAttribute("tabindex", "-1");
                    else field.removeAttribute("tabindex");
                    if (field.tagName === "SELECT") field.disabled = !editable;
                    else field.readOnly = !editable;
                });
            }

            function syncActionMode() {
                const isDisplay = currentMode === "display";
                displayButtons.classList.toggle("hidden", !isDisplay);
                addModeButtons.classList.toggle("hidden", isDisplay);
                displayButtons.style.display = isDisplay ? "flex" : "none";
                addModeButtons.style.display = isDisplay ? "none" : "flex";
            }

            function setMode(mode) {
                currentMode = mode;
                const rightPanel = document.querySelector(".right-panel");
                rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");

                if (mode === "add") {
                    modeTag.textContent = "Add Mode";
                    rightPanel.classList.add("add-mode");
                    setTimeout(function () { lengthNameInput.focus(); }, 0);
                }
                if (mode === "modify") {
                    modeTag.textContent = "Edit Mode";
                    rightPanel.classList.add("modify-mode");
                    setTimeout(function () { lengthNameInput.focus(); }, 0);
                }
                if (mode === "display") {
                    modeTag.textContent = "Display Mode";
                    rightPanel.classList.add("display-mode");
                    preEditLengthId = null;
                    clearLengthNameError();
                    syncSelectionHighlight();
                }
                syncActionMode();
            }

            function ensureActiveLengthSelection() {
                if (!allLengths.length) {
                    activeLengthId = null;
                    return null;
                }
                let active = allLengths.find(function (length) { return Number(length.length_id) === Number(activeLengthId); });
                if (!active) {
                    active = allLengths[0];
                    activeLengthId = Number(active.length_id);
                }
                return active;
            }

            function resetForm() {
                lengthForm.reset();
                document.getElementById("length_id").value = "";
                activeLengthId = null;
                clearLengthNameError();
                setMode("add");
                setFormEditable(true);
                syncActionMode();
                renderLengths();
            }

            function fillForm(length) {
                document.getElementById("length_id").value = length.length_id || "";
                document.getElementById("length_name").value = lengthNameOf(length);
                activeLengthId = Number(length.length_id);
                setMode("display");
                setFormEditable(false);
                syncActionMode();
                clearLengthNameError();
            }

            function fillFormWithoutRender(length) {
                document.getElementById("length_id").value = length.length_id || "";
                document.getElementById("length_name").value = lengthNameOf(length);
                activeLengthId = Number(length.length_id);
            }

            function renderLengths() {
                ensureActiveLengthSelection();
                const keyword = "";
                const rows = allLengths.filter(function (length) {
                    return !keyword || lengthNameOf(length).toLowerCase().includes(keyword);
                });

                if (!rows.length) {
                    lengthList.innerHTML = "<div class='length-row'>No lengths found</div>";
                    return;
                }

                lengthList.innerHTML = rows.map(function (length) {
                    const active = Number(length.length_id) === activeLengthId ? "active" : "";
                    return "<div class='length-row " + active + "' data-id='" + esc(length.length_id) + "'>" + esc(lengthNameOf(length)) + "</div>";
                }).join("");

                lengthList.querySelectorAll(".length-row").forEach(function (row) {
                    row.addEventListener("click", function () { selectRow(this); });
                });

                syncSelectionHighlight();
            }

            function syncSelectionHighlight() {
                const rows = Array.from(lengthList.querySelectorAll(".length-row")).filter(function (r) { return r.dataset.id; });
                rows.forEach(function (r) { r.classList.remove("active"); });
                const activeRow = rows.find(function (r) { return Number(r.dataset.id) === Number(activeLengthId); });
                if (activeRow) {
                    activeRow.classList.add("active");
                    activeRow.scrollIntoView({ block: "nearest" });
                }
            }

            function selectRow(row) {
                lengthList.querySelectorAll(".length-row").forEach(function (r) { r.classList.remove("active"); });
                row.classList.add("active");
                const id = Number(row.dataset.id);
                activeLengthId = id;
                const length = allLengths.find(function (x) { return Number(x.length_id) === id; });
                if (!length) return;
                fillFormWithoutRender(length);
                row.scrollIntoView({ block: "center" });
            }

            async function loadLengths() {
                const res = await fetch("../../../api/length/get_length.php");
                allLengths = await res.json();

                if (allLengths.length) {
                    ensureActiveLengthSelection();
                    renderLengths();
                    const selected = ensureActiveLengthSelection();
                    if (selected) fillFormWithoutRender(selected);
                    document.querySelector(".list-wrap").scrollTop = 0;
                } else {
                    renderLengths();
                    setMode("display");
                    setFormEditable(false);
                    syncActionMode();
                }
            }

            function customConfirm(message, callback) {
                if (window.deleteModeConfirm) {
                    window.deleteModeConfirm(message, callback);
                    return;
                }
            }

            async function saveLength(isModify) {
                const fd = new FormData(lengthForm);
                const lengthId = fd.get("length_id");
                const lengthName = (fd.get("length_name") || "").trim();

                if (checkDuplicateLengthName()) {
                    lengthNameInput.focus();
                    lengthNameInput.select();
                    return;
                }
                if (!lengthName) {
                    showLengthNameError("Required");
                    setTimeout(function () { lengthNameInput.focus(); lengthNameInput.select(); }, 50);
                    return;
                }

                if (!isModify) {
                    const confirmAdd = await window.confirmAdd("Are you sure you want to add this length?\n\n" + lengthName);
                    if (!confirmAdd) return;
                }

                let url = "../../../api/length/add_length.php";
                if (isModify) {
                    if (!lengthId) { alert("Select a length to modify"); return; }
                    url = "../../../api/length/update_length.php";
                }

                const res = await fetch(url, { method: "POST", body: fd });
                const data = await res.json();
                if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

                if (data.status === "success") {
                    await loadLengths();
                    if (isModify && lengthId) {
                        const updated = allLengths.find(function (length) { return Number(length.length_id) === Number(lengthId); });
                        if (updated) fillForm(updated);
                        return;
                    }
                    resetForm();
                    setMode("add");
                    setFormEditable(true);
                    syncActionMode();
                    lengthNameInput.focus();
                }
            }

            async function deleteLength() {
                const lengthId = document.getElementById("length_id").value;
                if (!lengthId) { alert("Select a length to delete"); return; }

                customConfirm("Delete this length?", async function () {
                    const body = new URLSearchParams();
                    body.set("length_id", lengthId);

                    const res = await fetch("../../../api/length/delete_length.php", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: body.toString()
                    });
                    const data = await res.json();
                    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

                    if (data.status === "success") {
                        await loadLengths();
                        if (allLengths.length) {
                            setMode("display");
                            setFormEditable(false);
                            syncActionMode();
                        } else {
                            resetForm();
                        }
                    }
                });
            }

            function handleAddAction() { preEditLengthId = activeLengthId; resetForm(); lengthNameInput.focus(); }
            function handleModifyAction() {
                const lengthId = document.getElementById("length_id").value;
                if (!lengthId) { alert("Select a length to modify"); return; }
                preEditLengthId = Number(lengthId);
                setMode("modify");
                setFormEditable(true);
                syncActionMode();
            }
            function cancelEditMode() {
                if (preEditLengthId) {
                    const previous = allLengths.find(function (length) { return Number(length.length_id) === Number(preEditLengthId); });
                    if (previous) { fillForm(previous); preEditLengthId = null; return; }
                }
                const fallback = ensureActiveLengthSelection();
                if (fallback) { fillForm(fallback); return; }
                setMode("display");
                setFormEditable(false);
                syncActionMode();
                renderLengths();
            }

            function keepLengthNameActive() {
                if (currentMode === "add" || currentMode === "modify") {
                    setTimeout(function () { if (!lengthForm.contains(document.activeElement)) lengthNameInput.focus(); }, 0);
                }
            }

            lengthNameInput.addEventListener("input", function () { if (currentMode === "add" || currentMode === "modify") checkDuplicateLengthName(); });
            lengthForm.addEventListener("focusin", function (e) {
                if (currentMode !== "modify") return;
                const field = e.target;
                if (field.tagName === "INPUT" && field.type !== "hidden" && !field.readOnly) { setTimeout(function () { field.select(); }, 0); }
            });

            document.getElementById("addBtn").addEventListener("click", handleAddAction);
            document.getElementById("modifyBtn").addEventListener("click", handleModifyAction);
            document.getElementById("deleteBtn").addEventListener("click", deleteLength);
            document.getElementById("printBtn").addEventListener("click", function () { window.print(); });
            document.getElementById("exitBtn").addEventListener("click", function () { window.location.href = "../../../index.html"; });
            document.getElementById("cancelBtn").addEventListener("click", cancelEditMode);
            document.getElementById("saveBtn").addEventListener("click", function () { if (currentMode === "modify") saveLength(true); else saveLength(false); });
            let typeBuffer = "", typeTimer = null, lastMatchedIndex = -1;
            document.addEventListener("keydown", function (e) {
                if (currentMode !== "display") return;
                if (e.ctrlKey || e.altKey || e.metaKey) return;
                const rows = Array.from(lengthList.querySelectorAll(".length-row")).filter(function (r) { return r.dataset.id; });
                if (!rows.length) return;
                const isSearchBox = document.activeElement.id === "filterInput";
                if (e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) {
                    if (isSearchBox) return;
                    e.preventDefault();
                    const letter = e.key.toLowerCase();
                    if (typeTimer) clearTimeout(typeTimer);
                    typeBuffer += letter;
                    typeTimer = setTimeout(function () { typeBuffer = ""; lastMatchedIndex = -1; }, 700);

                    let matchIndex = -1;
                    if (typeBuffer.length === 1) {
                        const startIndex = lastMatchedIndex + 1;
                        matchIndex = rows.findIndex(function (row, index) { return index >= startIndex && row.textContent.trim().toLowerCase().startsWith(letter); });
                        if (matchIndex === -1) matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(letter); });
                    } else {
                        matchIndex = rows.findIndex(function (row) { return row.textContent.trim().toLowerCase().startsWith(typeBuffer); });
                    }
                    if (matchIndex !== -1) { lastMatchedIndex = matchIndex; selectRow(rows[matchIndex]); }
                }
            });

            document.addEventListener("keydown", function (e) {
                if (currentMode !== "display") return;
                const rows = Array.from(lengthList.querySelectorAll(".length-row")).filter(function (r) { return r.dataset.id; });
                if (!rows.length) return;
                let currentIndex = rows.findIndex(function (row) { return Number(row.dataset.id) === Number(activeLengthId); });
                if (currentIndex === -1) currentIndex = 0;

                if (e.key === "ArrowDown") {
                    e.preventDefault(); // activate keyboard visual state
                    if (currentIndex < rows.length - 1) currentIndex++; selectRow(rows[currentIndex]);
                }
                if (e.key === "ArrowUp") {
                    e.preventDefault(); // activate keyboard visual state
                    if (currentIndex > 0) currentIndex--; selectRow(rows[currentIndex]);
                }
            });

            document.addEventListener("mousedown", function (e) { if (currentMode === "add" || currentMode === "modify") { if (!lengthForm.contains(e.target)) keepLengthNameActive(); } });(function () {
                let navMode = false, mainIndex = 0, subIndex = -1;
                const topNavItems = function () { return Array.from(document.querySelectorAll(".top-nav > li, .main-nav > li, nav > ul > li")).filter(function (li) { return li.offsetParent !== null; }); };
                function getSubItems(li) { return Array.from(li.querySelectorAll("ul li")).filter(function (item) { return item.offsetParent !== null; }); }
                function highlightMain(index) { const items = topNavItems(); items.forEach(function (i) { i.classList.remove("nav-active"); }); if (!items[index]) return; items[index].classList.add("nav-active"); if (items[index].focus) items[index].focus(); }
                function highlightSub(subItems, index) { subItems.forEach(function (i) { i.classList.remove("nav-sub-active"); }); if (!subItems[index]) return; subItems[index].classList.add("nav-sub-active"); subItems[index].scrollIntoView({ block: "nearest" }); }
                function resetNav() { navMode = false; mainIndex = 0; subIndex = -1; document.querySelectorAll(".nav-active").forEach(function (el) { el.classList.remove("nav-active"); }); document.querySelectorAll(".nav-sub-active").forEach(function (el) { el.classList.remove("nav-sub-active"); }); }

                document.addEventListener("keydown", function (e) {
                    if (e.key === "Alt" && !navMode) { e.preventDefault(); navMode = true; mainIndex = 0; subIndex = -1; highlightMain(mainIndex); return; }
                    if (!navMode) return;
                    const items = topNavItems();
                    const currentMain = items[mainIndex];
                    const subItems = currentMain ? getSubItems(currentMain) : [];

                    if (e.key === "Escape") { e.preventDefault(); resetNav(); return; }
                    if (e.key === "ArrowRight") { e.preventDefault(); mainIndex = (mainIndex + 1) % items.length; subIndex = -1; highlightMain(mainIndex); }
                    if (e.key === "ArrowLeft") { e.preventDefault(); mainIndex = (mainIndex - 1 + items.length) % items.length; subIndex = -1; highlightMain(mainIndex); }
                    if (e.key === "ArrowDown") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = 0; else subIndex = (subIndex + 1) % subItems.length; highlightSub(subItems, subIndex); }
                    if (e.key === "ArrowUp") { e.preventDefault(); if (!subItems.length) return; if (subIndex < 0) subIndex = subItems.length - 1; else subIndex = (subIndex - 1 + subItems.length) % subItems.length; highlightSub(subItems, subIndex); }
                    if (e.key === "Enter") { e.preventDefault(); if (subIndex >= 0 && subItems[subIndex]) subItems[subIndex].click(); else if (currentMain) currentMain.click(); resetNav(); }
                });
            })();

            setMode("display");
            setFormEditable(false);
            syncActionMode();

            (async function init() {
                await loadLengths();
                if (allLengths.length) {
                    const first = ensureActiveLengthSelection();
                    if (first) fillFormWithoutRender(first);
                    renderLengths();
                }
            })();
        </script>

</body>

</html>
