
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product Master | SoftBrokerage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../style.css?v=8">
<link rel="stylesheet" href="../../selection-mode.css?v=1">
<link rel="stylesheet" href="../../add-mode.css?v=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
* { box-sizing: border-box; }

html, body {
    max-width: 100%;
    overflow: hidden;
    height: 100%;
}

.content {
    padding: 6px 8px 8px;
    height: calc(100vh - 108px);
    overflow: hidden;
}

.feature-box {
    width: 100%;
    max-width: none;
    height: 100%;
    margin: 0 auto;
    padding: 6px;
    border: 1px solid #d8d8d8;
    background: #efefef;
    overflow: hidden;
}

.page-title {
    margin: 0 0 8px;
    text-align: center;
    font-size: 24px;
    font-family: "Times New Roman", serif;
    font-weight: 400;
    color: #0b8d2f;
    line-height: 1;
}

.master-layout {
    display: grid;
    grid-template-columns: 270px minmax(0, 1fr);
    gap: 6px;
    align-items: start;
    height: calc(100% - 44px);
    min-height: 0;
}

.left-panel, .right-panel {
    background: #efefef;
    border: 1px solid #d0d0d0;
    padding: 8px;
    min-width: 0;
    height: 100%;
    overflow: hidden;
}

.right-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
}

.left-panel .label {
    font-size: 15px;
    font-family: "Times New Roman", serif;
    color: #2f2f2f;
    margin-bottom: 4px;
}

#filterInput {
    width: 100%;
    max-width: 100%;
    height: 28px;
    padding: 4px 6px;
    border: 2px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 12px;
    font-family: "Times New Roman", serif;
    color: #000;
}

#filterInput:focus {
    outline: none;
    background: #1fdde0;
    border-color: #00cfd6;
}

.list-wrap {
    margin-top: 6px;
    border: 2px solid #18c7cf;
    background: #22e2e8;
    height: calc(100% - 54px);
    max-height: none;
    overflow-y: auto;
    overflow-x: hidden;
}

.list-head {
    position: sticky;
    top: 0;
    z-index: 1;
    padding: 4px 6px;
    font-size: 12px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #000;
    border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    background: #fff;
}

.product-row {
    padding: 3px 6px;
    font-size: 12px;
    line-height: 1.2;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    scroll-margin-top: 30px;
}

.product-row:hover { background: rgba(0, 0, 0, 0.08); }
.product-row.active { background: #0074d9; color: #fff; }

.product-row-sub {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.95;
}

.mode-tag {
    display: inline-block;
    align-self: flex-start;
    margin-bottom: 6px;
    padding: 2px 6px;
    border: 1px solid #c5b800;
    background: #ffef1c;
    color: #000;
    font-size: 14px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
}

#productForm {
    border: 1px solid #d7d7d7;
    padding: 4px 5px;
    background: #efefef;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
}

.product-scroll {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding-right: 2px;
}

.action-footer {
    flex: 0 0 auto;
    margin-top: auto;
    padding-top: 6px;
    background: #efefef;
}

.basic-shell {
    border: 1px solid #d0d0d0;
    background: #f6f6f6;
}

.basic-tab {
    display: inline-block;
    margin: -12px 0 0 8px;
    padding: 2px 8px;
    border: 1px solid #d0d0d0;
    border-bottom: none;
    background: #fff;
    font-size: 14px;
    font-family: "Times New Roman", serif;
    color: #222;
    position: relative;
    top: -1px;
}

.basic-body {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(360px, 0.9fr);
    gap: 8px;
    padding: 6px;
    align-items: start;
}

.basic-left,
.basic-right {
    min-width: 0;
}

.field-row {
    display: grid;
    gap: 6px;
    margin-bottom: 4px;
}

.field-row.row-2 {
    grid-template-columns: repeat(2, minmax(0, 1fr));
}

.field-row.row-3 {
    grid-template-columns: repeat(3, minmax(0, 1fr));
}

.field-row.row-4 {
    grid-template-columns: repeat(4, minmax(0, 1fr));
}

.form-group {
    display: grid;
    grid-template-columns: 90px minmax(0, 1fr);
    align-items: center;
    gap: 4px;
}

.form-group.full { grid-column: 1 / -1; }
.form-group.w2 { grid-column: span 2; }
.form-group.w3 { grid-column: span 3; }

.form-group label {
    font-size: 11px;
    font-family: "Times New Roman", serif;
    color: #2d2d2d;
    white-space: nowrap;
}

.form-group input, .form-group select, .form-group textarea {
    width: 100%;
    height: 20px;
    padding: 1px 5px;
    border: 2px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 11px;
    font-family: "Times New Roman", serif;
    color: #000;
}

.dropdown-hidden {
    display: none;
}

.form-group textarea {
    min-height: 24px;
    height: auto;
    resize: vertical;
}

.checkbox-cell {
    display: flex;
    align-items: center;
    min-height: 20px;
}

.checkbox-cell label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    white-space: nowrap;
}

.checkbox-cell input[type="checkbox"] {
    width: 13px;
    height: 13px;
    margin: 0;
}

.dropdown-wrapper {
    position: relative;
}

.dropdown-input {
    width: 100%;
    height: 20px;
    padding: 1px 5px;
    border: 2px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 11px;
    font-family: "Times New Roman", serif;
    color: #000;
}

.dropdown-input:focus {
    outline: none;
    background: #1fdde0;
    border-color: #00cfd6;
}

.dropdown-list {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    max-height: 220px;
    overflow-y: auto;
    background: #22e2e8;
    border: 2px solid #18c7cf;
    display: none;
    z-index: 40;
}

.dropdown-list.open {
    display: block;
}

.dropdown-item {
    padding: 3px 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: "Times New Roman", serif;
}

.dropdown-item:hover,
.dropdown-item.active {
    background: #0074d9;
    color: #fff;
}

.dropdown-empty {
    padding: 3px 5px;
    font-size: 11px;
    color: #000;
}

.check-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 3px 6px;
}

.check-grid label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
}

.check-grid input[type="checkbox"] {
    width: 13px;
    height: 13px;
    margin: 0;
}

.panel-box {
    border: 1px solid #7b7b7b;
    background: #fff;
    max-height: 176px;
    overflow: hidden;
}

.brand-head, .brand-row {
    display: grid;
    grid-template-columns: 54px 110px minmax(0, 1fr);
}

.brand-head {
    background: #e3b07d;
    border-bottom: 1px solid #7b7b7b;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    font-size: 11px;
}

.brand-head div, .brand-row div {
    padding: 2px 4px;
    border-right: 1px solid #7b7b7b;
}

.brand-head div:last-child, .brand-row div:last-child {
    border-right: none;
}

.brand-body {
    max-height: 130px;
    overflow-y: auto;
    background: #bffcff;
}

.brand-row {
    border-top: 1px solid rgba(0, 0, 0, 0.08);
    font-family: "Times New Roman", serif;
    font-size: 10px;
}

.brand-row input[type="checkbox"] {
    width: 13px;
    height: 13px;
    margin: 0;
}

.table-box {
    border: 1px solid #7b7b7b;
    background: #fff;
}

.table-head.pack {
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr) 88px 88px;
    background: #e3b07d;
    border-bottom: 1px solid #7b7b7b;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    font-size: 11px;
}

.table-head.pack div {
    padding: 2px 4px;
    border-right: 1px solid #7b7b7b;
}

.table-head.pack div:last-child { border-right: none; }

.table-body {
    max-height: 150px;
    overflow-y: auto;
    background: #bffcff;
}

.table-row.pack {
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr) 88px 88px;
    border-top: 1px solid rgba(0, 0, 0, 0.08);
    font-family: "Times New Roman", serif;
    font-size: 10px;
    cursor: pointer;
}

.table-row.pack > div {
    padding: 2px 4px;
    border-right: 1px solid rgba(0, 0, 0, 0.1);
}

.table-row.pack > div:last-child { border-right: none; }

.table-row.pack.active-pack-row > div {
    background: #0c78d3;
    color: #fff;
}

.table-row.pack.active-pack-row input {
    background: #fff;
    color: #000;
}

.table-row.pack input {
    width: 100%;
    height: 20px;
    border: 1px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 10px;
    font-family: "Times New Roman", serif;
}

.row-delete {
    width: 100%;
    height: 20px;
    border: 1px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 10px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    cursor: pointer;
}

.table-tools {
    margin: 2px 0 4px;
    display: flex;
    gap: 6px;
}

.pack-shortcuts {
    margin: 2px 0 4px;
    padding: 2px 8px;
    border: 1px solid #37dbe7;
    background: #1feaf1;
    color: #000;
    font-size: 11px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    text-align: left;
}

.order-chip {
    display: inline-block;
    margin: 0 0 4px;
    padding: 2px 8px;
    background: #ffc8cf;
    border: 1px solid #d59aa1;
    color: #000;
    font-size: 12px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
}

.panel-block {
    margin-bottom: 8px;
}

.panel-title {
    margin: 0 0 2px;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    color: #222;
}

.tool-btn {
    padding: 2px 8px;
    height: 22px;
    border-radius: 2px;
    border: 2px solid #efc9f0;
    background: #ea7ce8;
    color: #000;
    font-size: 10px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    cursor: pointer;
}

.right-panel.display-mode input,
.right-panel.display-mode select,
.right-panel.display-mode textarea,
.right-panel.display-mode input[type="checkbox"],
.right-panel.display-mode .row-delete,
.right-panel.display-mode .tool-btn,
.right-panel.display-mode .brand-body input {
    background: #e6e6e6;
    border-color: #c2c2c2;
    color: #444;
    pointer-events: none;
}

.action-row {
    margin-top: 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
}

.btn {
    min-width: 84px;
    padding: 2px 7px;
    height: 24px;
    border-radius: 2px;
    border: 2px solid #efc9f0;
    background: #ea7ce8;
    color: #000;
    font-size: 10px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    gap: 6px;
}

.btn:hover { filter: brightness(0.98); }
.btn.primary, .btn.danger { background: #ea7ce8; color: #000; border-color: #efc9f0; }

@media (max-width: 1200px) {
    html, body { overflow: auto; height: auto; }
    .content { padding: 10px 8px 16px; height: auto; overflow: visible; }
    .feature-box { height: auto; overflow: visible; }
    .master-layout { grid-template-columns: 1fr; }
    .basic-body { grid-template-columns: 1fr; }
    .field-row.row-2,
    .field-row.row-3,
    .field-row.row-4,
    .check-grid { grid-template-columns: 1fr 1fr; }
    .basic-right { max-width: none; }
}

@media (max-width: 760px) {
    .field-row.row-2,
    .field-row.row-3,
    .field-row.row-4,
    .check-grid { grid-template-columns: 1fr; }
    .form-group.w2, .form-group.w3, .form-group.full { grid-column: auto; }
    .form-group { grid-template-columns: 78px minmax(0, 1fr); }
}
</style>

    const res = await fetch("../../api/check_auth.php");

<script src="../../global-nav.js" defer></script>
<script src="../../global-keyboard.js" defer data-global-keyboard="1"></script>
<script src="../../selection-mode.js" defer></script>
<script src="../../add-mode.js" defer></script>
<script src="../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../edit-mode.js" defer data-edit-mode="1"></script>
</head>
<body>
<div class="content">
<div class="feature-box">
<h2 class="page-title">Product Master</h2>

<div class="master-layout">
<div class="left-panel">
<div class="label">Selection Mode</div>
<input id="filterInput" type="text" autocomplete="off" placeholder="Search product...">
<div class="list-wrap">
<div class="list-head">Name</div>
<div id="productList"></div>
</div>
</div>

<div class="right-panel">
<span id="modeTag" class="mode-tag">Display Mode</span>
<form id="productForm" autocomplete="off">
<input type="hidden" id="product_id" name="product_id">
<div class="product-scroll">
<div class="basic-shell">
<div class="basic-tab">Basic Information</div>
<div class="basic-body">
<div class="basic-left">
<div class="field-row row-2">
<div class="form-group">
<label for="item_code">Item Code</label>
<input id="item_code" name="item_code" type="text" data-add-first>
</div>
<div class="checkbox-cell">
<label><input id="default_item" name="default_item" type="checkbox">Default Item</label>
</div>
</div>

<div class="field-row">
<div class="form-group">
<label for="material_type">Material Type</label>
<select id="material_type" name="material_type">
<option value="FINISHED GOODS">FINISHED GOODS</option>
<option value="RAW MATERIAL">RAW MATERIAL</option>
<option value="SERVICE">SERVICE</option>
</select>
</div>
</div>

<div class="field-row">
<div class="form-group">
<label for="product_group">Product Group</label>
<input id="product_group" name="product_group" type="text">
</div>
</div>

<div class="field-row">
<div class="form-group full">
<label for="product_name" class="label-with-error"><span>Product Name</span><span id="productNameError" class="error-text" style="display:none;"></span></label>
<input id="product_name" name="product_name" required>
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="std_pack">Std. Pack</label>
<input id="std_pack" name="std_pack" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="pack_unit">Pack Unit</label>
<input id="pack_unit" name="pack_unit" type="text">
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="rate_type">Rate Type</label>
<select id="rate_type" name="rate_type">
<option value="W">W</option>
<option value="Q">Q</option>
<option value="P">P</option>
</select>
</div>
<div class="form-group">
<label for="div_factor">Div Fac.</label>
<input id="div_factor" name="div_factor" type="number" step="0.0001" value="1">
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="rate_range_from">Rate Range</label>
<input id="rate_range_from" name="rate_range_from" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="rate_range_to">To</label>
<input id="rate_range_to" name="rate_range_to" type="number" step="0.0001" value="0">
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="qty_range_from">Qty Range</label>
<input id="qty_range_from" name="qty_range_from" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="qty_range_to">To</label>
<input id="qty_range_to" name="qty_range_to" type="number" step="0.0001" value="0">
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="weight_range_from">Weight Rnge</label>
<input id="weight_range_from" name="weight_range_from" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="weight_range_to">To</label>
<input id="weight_range_to" name="weight_range_to" type="number" step="0.0001" value="0">
</div>
</div>

<div class="field-row">
<div class="form-group full">
<label>Cursor Stop</label>
<div class="check-grid">
<label><input id="cursor_brand" name="cursor_brand" type="checkbox" checked>Brand</label>
<label><input id="cursor_weight" name="cursor_weight" type="checkbox" checked>Weight</label>
<label><input id="cursor_unit" name="cursor_unit" type="checkbox">Unit</label>
<label><input id="cursor_qty" name="cursor_qty" type="checkbox" checked>Qty</label>
<label><input id="cursor_pack" name="cursor_pack" type="checkbox">Pack</label>
<label><input id="cursor_sp_pack" name="cursor_sp_pack" type="checkbox">Sp Pack</label>
<label><input id="kasar_rate" name="kasar_rate" type="checkbox">Kasar Rate</label>
<label><input id="term_type_flag" name="term_type_flag" type="checkbox">Term Type</label>
</div>
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="amt_ro">Amt R/o. ?</label>
<select id="amt_ro" name="amt_ro">
<option value="N">N</option>
<option value="Y">Y</option>
</select>
</div>
<div class="form-group">
<label for="edit_flag">Edit ?</label>
<select id="edit_flag" name="edit_flag">
<option value="Y">Y</option>
<option value="N">N</option>
</select>
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="brok_byr_type">Brok(BYR)</label>
<select id="brok_byr_type" name="brok_byr_type">
<option value="PERCENT">%</option>
<option value="AMOUNT">AMT</option>
</select>
</div>
<div class="form-group">
<label for="brok_byr_rate">Rate</label>
<input id="brok_byr_rate" name="brok_byr_rate" type="number" step="0.0001" value="0">
</div>
</div>

<div class="field-row row-2">
<div class="form-group">
<label for="brok_slr_type">Brok(SLR)</label>
<select id="brok_slr_type" name="brok_slr_type">
<option value="PERCENT">%</option>
<option value="AMOUNT">AMT</option>
</select>
</div>
<div class="form-group">
<label for="brok_slr_rate">Rate</label>
<input id="brok_slr_rate" name="brok_slr_rate" type="number" step="0.0001" value="0">
</div>
</div>

<div class="field-row row-2">
<div class="checkbox-cell">
<label><input id="packing_compulsory" name="packing_compulsory" type="checkbox">Packing Compulsory</label>
</div>
<div class="checkbox-cell">
<label><input id="link_with_master" name="link_with_master" type="checkbox">Link With Master</label>
</div>
</div>

<div class="field-row row-4">
<div class="form-group">
<label for="igst">Igst (%)</label>
<input id="igst" name="igst" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="cgst">Cgst (%)</label>
<input id="cgst" name="cgst" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="sgst">Sgst (%)</label>
<input id="sgst" name="sgst" type="number" step="0.0001" value="0">
</div>
<div class="form-group">
<label for="ord_no">Ord. No.</label>
<input id="ord_no" name="ord_no" type="number" step="1" value="0">
</div>
</div>

<div class="field-row row-3">
<div class="form-group">
<label for="tax_pack_max">Tax Pack</label>
<input id="tax_pack_max" name="tax_pack_max" type="number" step="0.0001" value="25">
</div>
<div class="form-group">
<label for="def_loading_pend">Def. Load</label>
<select id="def_loading_pend" name="def_loading_pend">
<option value="W">W</option>
<option value="Q">Q</option>
<option value="P">P</option>
</select>
</div>

<script>
let allProducts = [];
let allBrands = [];
let activeProductId = null;
let currentPackRows = [];
let currentMode = "display";
let preEditProductId = null;
let activePackRowIndex = 0;

const filterInput = document.getElementById("filterInput");
const productList = document.getElementById("productList");
const productForm = document.getElementById("productForm");
const modeTag = document.getElementById("modeTag");
const rightPanel = document.querySelector(".right-panel");
const displayButtons = document.getElementById("displayButtons");
const addModeButtons = document.getElementById("addModeButtons");
const brandBody = document.getElementById("brandBody");
const packBody = document.getElementById("packBody");
const productNameInput = document.getElementById("product_name");
const productNameError = document.getElementById("productNameError");

function esc(v) {
    return (v ?? "").toString().replace(/[&<>"']/g, function (m) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[m];
    });
}

function setMode(mode) {
    currentMode = mode;
    rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");
    if (mode === "add") {
        modeTag.textContent = "Add Mode";
        rightPanel.classList.add("add-mode");
    } else if (mode === "modify") {
        modeTag.textContent = "Edit Mode";
        rightPanel.classList.add("modify-mode");
    } else {
        modeTag.textContent = "Display Mode";
        rightPanel.classList.add("display-mode");
    }
    syncActionMode();
}

function syncActionMode() {
    const isDisplay = currentMode === "display";
    displayButtons.style.display = isDisplay ? "flex" : "none";
    addModeButtons.style.display = isDisplay ? "none" : "flex";
}

function showProductNameError(message) {
    productNameInput.classList.add("field-error");
    productNameError.textContent = message || "Required";
    productNameError.style.display = "inline";
}

function clearProductNameError() {
    productNameInput.classList.remove("field-error");
    productNameError.textContent = "";
    productNameError.style.display = "none";
}

function checkDuplicateProductName() {
    const name = (productNameInput.value || "").trim().toLowerCase();
    if (!name) { clearProductNameError(); return false; }
    const currentId = Number(document.getElementById("product_id").value || 0);
    const duplicate = allProducts.some(function (p) {
        const sameName = (p.product_name || "").trim().toLowerCase() === name;
        const sameId = Number(p.product_id) === currentId;
        return sameName && !sameId;
    });
    if (duplicate) {
        showProductNameError("Already exists");
        return true;
    }
    clearProductNameError();
    return false;
}

function setFormEditable(editable) {
    const fields = productForm.querySelectorAll("input:not([type='checkbox']), select, textarea");
    fields.forEach(function (el) {
        if (editable) {
            el.removeAttribute("tabindex");
            if (el.tagName === "SELECT") {
                el.disabled = false;
            } else {
                el.readOnly = false;
            }
            return;
        }
        el.setAttribute("tabindex", "-1");
        if (el.tagName === "SELECT") {
            el.disabled = true;
        } else {
            el.readOnly = true;
        }
    });
    productForm.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.disabled = !editable;
        if (editable) cb.removeAttribute("tabindex");
        else cb.setAttribute("tabindex", "-1");
    });
    productForm.querySelectorAll(".row-delete, .tool-btn").forEach(function (btn) {
        btn.disabled = !editable;
        if (editable) btn.removeAttribute("tabindex");
        else btn.setAttribute("tabindex", "-1");
    });
}

function buildPackRow() {
    return { packing: "", byr_rt: "", slr_rt: "" };
}

function clampPackRowIndex(rowCount) {
    if (rowCount <= 0) {
        activePackRowIndex = 0;
        return 0;
    }
    activePackRowIndex = Math.max(0, Math.min(rowCount - 1, activePackRowIndex));
    return activePackRowIndex;
}

function renderPackRows(rows) {
    const list = (rows && rows.length) ? rows : [buildPackRow()];
    clampPackRowIndex(list.length);
    packBody.innerHTML = list.map(function (r, idx) {
        const activeClass = idx === activePackRowIndex ? " active-pack-row" : "";
        return "<div class='table-row pack" + activeClass + "' data-pack-index='" + idx + "' tabindex='-1'>"
            + "<div style='text-align:center; font-weight:700;'>" + (idx + 1) + "</div>"
            + "<div><input class='pack-name' value='" + esc(r.packing || "") + "'></div>"
            + "<div><input class='pack-byr' type='number' step='0.0001' value='" + esc(r.byr_rt || "") + "'></div>"
            + "<div><input class='pack-slr' type='number' step='0.0001' value='" + esc(r.slr_rt || "") + "'></div>"
            + "</div>";
    }).join("");
}

function readPackRows() {
    const rows = [];
    packBody.querySelectorAll(".table-row.pack").forEach(function (row) {
        rows.push({
            packing: row.querySelector(".pack-name").value.trim(),
            byr_rt: row.querySelector(".pack-byr").value.trim(),
            slr_rt: row.querySelector(".pack-slr").value.trim()
        });
    });
    return rows.filter(function (r) {
        return r.packing !== "" || r.byr_rt !== "" || r.slr_rt !== "";
    });
}

function renderBrandChecklist(selectedIds) {
    const selected = new Set((selectedIds || []).map(function (x) { return Number(x); }));
    if (!allBrands.length) {
        brandBody.innerHTML = "<div class='brand-row'><div>-</div><div>-</div><div>No brands available. Add from Brand Master.</div></div>";
        return;
    }
    brandBody.innerHTML = allBrands.map(function (b, idx) {
        const checked = selected.has(Number(b.brand_id)) ? " checked" : "";
        return "<div class='brand-row'>"
            + "<div style='text-align:center; font-weight:700;'>" + (idx + 1) + "</div>"
            + "<div style='text-align:center;'><input type='checkbox' class='brand-check' value='" + esc(b.brand_id) + "'" + checked + "></div>"
            + "<div>" + esc(b.brand_name || "") + "</div>"
            + "</div>";
    }).join("");
}

function getSelectedBrandIds() {
    return Array.from(document.querySelectorAll(".brand-check:checked")).map(function (el) {
        return Number(el.value);
    }).filter(function (v) { return v > 0; });
}

function boolFromInt(v) {
    return Number(v) === 1 || Number(v) === true;
}

function setBool(id, v) {
    const el = document.getElementById(id);
    if (el) el.checked = boolFromInt(v);
}

function resetForm() {
    const setVal = function (id, value) {
        const el = document.getElementById(id);
        if (el) el.value = value;
    };
    productForm.reset();
    setVal("product_id", "");
    setVal("sales_rate", "0");
    setVal("rate", "0");
    setVal("div_factor", "1");
    setVal("tax_pack_max", "25");
    setVal("ord_no", "0");
    setBool("cursor_brand", 1);
    setBool("cursor_weight", 1);
    setBool("cursor_qty", 1);
    setBool("cursor_unit", 0);
    setBool("cursor_pack", 0);
    setBool("cursor_sp_pack", 0);
    setBool("default_item", 0);
    setBool("kasar_rate", 0);
    setBool("term_type_flag", 0);
    setBool("packing_compulsory", 0);
    setBool("link_with_master", 0);
    activeProductId = null;
    activePackRowIndex = 0;
    renderBrandChecklist([]);
    currentPackRows = [buildPackRow()];
    renderPackRows(currentPackRows);
    clearProductNameError();
    renderProducts();
    syncAllSelectDropdowns();
    setMode("add");
    setFormEditable(true);
}

function fillForm(p) {
    const setVal = function (id, val, fallback) {
        const el = document.getElementById(id);
        if (el) el.value = (val ?? fallback ?? "");
        if (el && el.tagName === "SELECT" && el.dataset.dropdownInputId) {
            syncSelectDropdown(el);
        }
    };
    setVal("product_id", p.product_id, "");
    setVal("item_code", p.item_code, "");
    setVal("material_type", p.material_type, "FINISHED GOODS");
    setVal("product_group", p.product_group, "");
    setVal("product_name", p.product_name, "");
    setVal("std_pack", p.std_pack, 0);
    setVal("pack_unit", p.pack_unit, "");
    setVal("rate_type", p.rate_type, "W");
    setVal("div_factor", p.div_factor, 1);
    setVal("rate_range_from", p.rate_range_from, 0);
    setVal("rate_range_to", p.rate_range_to, 0);
    setVal("qty_range_from", p.qty_range_from, 0);
    setVal("qty_range_to", p.qty_range_to, 0);
    setVal("weight_range_from", p.weight_range_from, 0);
    setVal("weight_range_to", p.weight_range_to, 0);
    setVal("sales_rate", p.sales_rate, 0);
    setVal("rate", p.rate, 0);
    setVal("amt_ro", p.amt_ro, "N");
    setVal("edit_flag", p.edit_flag, "Y");
    setVal("brok_byr_type", p.brok_byr_type, "PERCENT");
    setVal("brok_byr_rate", p.brok_byr_rate, 0);
    setVal("brok_slr_type", p.brok_slr_type, "PERCENT");
    setVal("brok_slr_rate", p.brok_slr_rate, 0);
    setVal("igst", p.igst, 0);
    setVal("cgst", p.cgst, 0);
    setVal("sgst", p.sgst, 0);
    setVal("ord_no", p.ord_no, 0);
    setVal("tax_pack_max", p.tax_pack_max, 25);
    setVal("remarks", p.remarks, "");
    setVal("def_loading_pend", p.def_loading_pend, "W");
    setVal("freight_type", p.freight_type, "W");

    setBool("default_item", p.default_item);
    setBool("cursor_brand", p.cursor_brand);
    setBool("cursor_weight", p.cursor_weight);
    setBool("cursor_unit", p.cursor_unit);
    setBool("cursor_qty", p.cursor_qty);
    setBool("cursor_pack", p.cursor_pack);
    setBool("cursor_sp_pack", p.cursor_sp_pack);
    setBool("kasar_rate", p.kasar_rate);
    setBool("term_type_flag", p.term_type_flag);
    setBool("packing_compulsory", p.packing_compulsory);
    setBool("link_with_master", p.link_with_master);

    activeProductId = Number(p.product_id);
    activePackRowIndex = 0;
    clearProductNameError();
    renderBrandChecklist(p.brand_ids || []);
    currentPackRows = (p.packing_rows && p.packing_rows.length) ? p.packing_rows : [buildPackRow()];
    renderPackRows(currentPackRows);
    renderProducts();
    setMode("display");
    setFormEditable(false);
}

function renderProducts() {
    const keyword = filterInput.value.trim().toLowerCase();
    const rows = allProducts.filter(function (p) {
        return !keyword || (p.product_name || "").toLowerCase().includes(keyword);
    });

    if (!rows.length) {
        productList.innerHTML = "<div class='product-row'><div class='product-row-name'>No products found</div></div>";
        return;
    }

    productList.innerHTML = rows.map(function (p) {
        const active = Number(p.product_id) === activeProductId ? "active" : "";
        const brandCount = Array.isArray(p.brand_ids) ? p.brand_ids.length : 0;
        return "<div class='product-row " + active + "' data-id='" + esc(p.product_id) + "'>"
            + "<div class='product-row-name'>" + esc(p.product_name || "") + "</div>"
            + "<div class='product-row-sub'>Group: " + esc(p.product_group || "-") + " | Brands: " + esc(brandCount) + "</div>"
            + "</div>";
    }).join("");

    productList.querySelectorAll(".product-row").forEach(function (row) {
        row.addEventListener("click", function () {
            const id = Number(this.dataset.id);
            const p = allProducts.find(function (x) { return Number(x.product_id) === id; });
            if (p) fillForm(p);
        });
    });
}
async function loadBrands() {
    const res = await fetch("../../api/brand/get_brand.php");
    allBrands = await res.json();
}

async function loadProducts() {
    const res = await fetch("../../api/product/get_product.php");
    const data = await res.json();
    allProducts = (data || []).map(function (p) {
        p.brand_ids = Array.isArray(p.brand_ids) ? p.brand_ids : [];
        p.packing_rows = Array.isArray(p.packing_rows) ? p.packing_rows : [];
        return p;
    });
    renderProducts();
}

async function addProduct() {
    if (typeof window.confirmAdd === "function") {
        const ok = await window.confirmAdd("Are you sure you want to add this product?");
        if (!ok) return;
    }
    if (checkDuplicateProductName()) {
        productNameInput.focus();
        productNameInput.select();
        return;
    }
    if (!(productNameInput.value || "").trim()) {
        showProductNameError("Required");
        productNameInput.focus();
        return;
    }
    const fd = new FormData(productForm);
    fd.set("brands_json", JSON.stringify(getSelectedBrandIds()));
    fd.set("packing_json", JSON.stringify(readPackRows()));
    const res = await fetch("../../api/product/add_product.php", { method: "POST", body: fd });
    const data = await res.json();
    if (!data || data.status !== "success") {
        const msg = (data && data.message) || "Request failed";
        if (String(msg).toLowerCase().includes("already exists")) {
            showProductNameError("Already exists");
            productNameInput.focus();
            productNameInput.select();
            return;
        }
        alert(msg);
    }
    if (data.status === "success") {
        await loadProducts();
        resetForm();
    }
}

async function updateProduct() {
    const product_id = Number(document.getElementById("product_id").value || 0);
    if (!product_id) {
        alert("Select product first");
        return;
    }
    if (checkDuplicateProductName()) {
        productNameInput.focus();
        productNameInput.select();
        return;
    }
    if (!(productNameInput.value || "").trim()) {
        showProductNameError("Required");
        productNameInput.focus();
        return;
    }
    const fd = new FormData(productForm);
    fd.set("brands_json", JSON.stringify(getSelectedBrandIds()));
    fd.set("packing_json", JSON.stringify(readPackRows()));
    const res = await fetch("../../api/product/update_product.php", { method: "POST", body: fd });
    const data = await res.json();
    if (!data || data.status !== "success") {
        const msg = (data && data.message) || "Request failed";
        if (String(msg).toLowerCase().includes("already exists")) {
            showProductNameError("Already exists");
            productNameInput.focus();
            productNameInput.select();
            return;
        }
        alert(msg);
    }
    if (data.status === "success") {
        await loadProducts();
        const p = allProducts.find(function (x) { return Number(x.product_id) === product_id; });
        if (p) fillForm(p);
    }
}

async function deleteProduct() {
    const product_id = Number(document.getElementById("product_id").value || 0);
    if (!product_id) {
        alert("Select product first");
        return;
    }
    const ok = await window.confirmDelete("Delete this product?");
    if (!ok) return;
    const fd = new FormData();
    fd.set("product_id", String(product_id));
    const res = await fetch("../../api/product/delete_product.php", { method: "POST", body: fd });
    const data = await res.json();
    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }
    if (data.status === "success") {
        await loadProducts();
        resetForm();
        setMode("display");
        setFormEditable(false);
    }
}

function handleAddAction() {
    preEditProductId = activeProductId;
    resetForm();
    setMode("add");
    setFormEditable(true);
    setTimeout(function () { document.getElementById("item_code").focus(); }, 0);
}

function handleModifyAction() {
    const product_id = Number(document.getElementById("product_id").value || 0);
    if (!product_id) {
        alert("Select product first");
        return;
    }
    preEditProductId = product_id;
    setMode("modify");
    setFormEditable(true);
    setTimeout(function () { document.getElementById("item_code").focus(); }, 0);
}

function cancelEditMode() {
    if (preEditProductId) {
        const prev = allProducts.find(function (x) { return Number(x.product_id) === Number(preEditProductId); });
        if (prev) {
            fillForm(prev);
            preEditProductId = null;
            return;
        }
    }
    if (allProducts.length) {
        fillForm(allProducts[0]);
        return;
    }
    resetForm();
}

productNameInput.addEventListener("input", function () {
    if ((productNameInput.value || "").trim()) {
        checkDuplicateProductName();
    } else {
        clearProductNameError();
    }
});

function setActivePackRow(index, shouldFocus) {
    const rows = Array.from(packBody.querySelectorAll(".table-row.pack"));
    if (!rows.length) {
        activePackRowIndex = 0;
        return;
    }
    activePackRowIndex = Math.max(0, Math.min(rows.length - 1, Number(index) || 0));
    rows.forEach(function (row, rowIndex) {
        row.classList.toggle("active-pack-row", rowIndex === activePackRowIndex);
    });
    const row = rows[activePackRowIndex];
    if (!row) return;
    row.scrollIntoView({ block: "nearest" });
    if (shouldFocus) row.focus();
}

function focusPackField(selector) {
    const row = packBody.querySelector(".table-row.pack.active-pack-row") || packBody.querySelector(".table-row.pack");
    if (!row) return;
    const field = row.querySelector(selector) || row.querySelector("input");
    if (field) field.focus();
}

function addPackRowFromShortcut() {
    const rows = readPackRows();
    rows.push(buildPackRow());
    currentPackRows = rows;
    activePackRowIndex = rows.length - 1;
    renderPackRows(currentPackRows);
    focusPackField(".pack-name");
}

function deletePackRowFromShortcut() {
    const rows = readPackRows();
    const baseRows = rows.length ? rows.slice() : [buildPackRow()];
    const removeIndex = Math.max(0, Math.min(baseRows.length - 1, activePackRowIndex));
    baseRows.splice(removeIndex, 1);
    currentPackRows = baseRows.length ? baseRows : [buildPackRow()];
    activePackRowIndex = Math.max(0, Math.min(currentPackRows.length - 1, removeIndex));
    renderPackRows(currentPackRows);
    focusPackField(".pack-name");
}

function focusMoveBackFromPack() {
    const linkWithMaster = document.getElementById("link_with_master");
    if (linkWithMaster) linkWithMaster.focus();
}

packBody.addEventListener("click", function (e) {
    const row = e.target.closest(".table-row.pack");
    if (!row) return;
    setActivePackRow(Number(row.dataset.packIndex || 0), false);
});

packBody.addEventListener("focusin", function (e) {
    const row = e.target.closest(".table-row.pack");
    if (!row) return;
    setActivePackRow(Number(row.dataset.packIndex || 0), false);
});

document.getElementById("addBtn").addEventListener("click", handleAddAction);
document.getElementById("modifyBtn").addEventListener("click", handleModifyAction);
document.getElementById("deleteBtn").addEventListener("click", deleteProduct);
document.getElementById("printBtn").addEventListener("click", function () { window.print(); });
document.getElementById("exitBtn").addEventListener("click", function () { window.location.href = "../../index.html"; });
document.getElementById("saveBtn").addEventListener("click", function () {
    if (currentMode === "modify") updateProduct();
    else addProduct();
});
document.getElementById("cancelBtn").addEventListener("click", cancelEditMode);
filterInput.addEventListener("input", renderProducts);

document.addEventListener("keydown", function (e) {
    if (currentMode === "display") return;
    const target = e.target;
    const inPackArea = !!(target && target.closest && target.closest("#packBody, #packShortcutBar"));
    if (!inPackArea) return;

    const isTypingField = target && target.matches && target.matches("input:not([type='checkbox']):not([type='radio']), textarea");
    if ((e.key === "a" || e.key === "A" || e.key === "e" || e.key === "E" || e.key === "d" || e.key === "D") && isTypingField) {
        return;
    }

    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        const rows = Array.from(packBody.querySelectorAll(".table-row.pack"));
        if (!rows.length) return;
        e.preventDefault();
        const delta = e.key === "ArrowDown" ? 1 : -1;
        setActivePackRow(activePackRowIndex + delta, true);
        return;
    }

    if (e.key === "A" || e.key === "a") {
        e.preventDefault();
        addPackRowFromShortcut();
        return;
    }

    if (e.key === "E" || e.key === "e") {
        e.preventDefault();
        focusPackField(".pack-name");
        return;
    }

    if (e.key === "D" || e.key === "d") {
        e.preventDefault();
        deletePackRowFromShortcut();
        return;
    }

    if (e.key === "F1") {
        e.preventDefault();
        focusMoveBackFromPack();
    }
});

function closeAllSelectDropdowns(exceptWrapper) {
    document.querySelectorAll(".dropdown-list.open").forEach(function (list) {
        if (exceptWrapper && list.closest(".dropdown-wrapper") === exceptWrapper) return;
        list.classList.remove("open");
    });
}

function focusNextField(fromEl) {
    const scope = productForm || document;
    const selectors = [
        "input:not([type='hidden']):not([tabindex='-1'])",
        "textarea:not([tabindex='-1'])",
        "select:not([tabindex='-1'])",
        "button:not([tabindex='-1'])"
    ].join(",");
    const list = Array.from(scope.querySelectorAll(selectors)).filter(function (el) {
        if (el.disabled) return false;
        if (el.offsetParent === null) return false;
        return true;
    });
    if (!list.length) return;
    const idx = list.indexOf(fromEl);
    if (idx === -1) return;
    const next = list[idx + 1];
    if (next) next.focus();
}

function buildSelectDropdownList(selectEl, listEl, filterText) {
    const query = (filterText || "").trim().toLowerCase();
    const options = Array.from(selectEl.options || []);
    const matched = options.filter(function (opt) {
        const text = (opt.textContent || "").trim();
        return !query || text.toLowerCase().includes(query);
    });
    listEl.innerHTML = "";
    if (!matched.length) {
        const empty = document.createElement("div");
        empty.className = "dropdown-empty";
        empty.textContent = "No options";
        listEl.appendChild(empty);
        return;
    }
    matched.forEach(function (opt, idx) {
        const item = document.createElement("div");
        item.className = "dropdown-item";
        item.dataset.value = opt.value;
        item.dataset.index = String(idx);
        item.textContent = (opt.textContent || "").trim();
        if (opt.value === selectEl.value) {
            item.classList.add("active");
        }
        item.addEventListener("mousedown", function (e) {
            e.preventDefault();
            selectEl.value = opt.value;
            syncSelectDropdown(selectEl);
            listEl.classList.remove("open");
            const ev = new Event("change", { bubbles: true });
            selectEl.dispatchEvent(ev);
        });
        listEl.appendChild(item);
    });
}

function moveSelectDropdownActive(listEl, dir) {
    const items = Array.from(listEl.querySelectorAll(".dropdown-item"));
    if (!items.length) return;
    let idx = items.findIndex(function (el) { return el.classList.contains("active"); });
    if (idx === -1) idx = 0;
    idx = Math.max(0, Math.min(items.length - 1, idx + dir));
    items.forEach(function (el) { el.classList.remove("active"); });
    items[idx].classList.add("active");
    items[idx].scrollIntoView({ block: "nearest" });
}

function syncSelectDropdown(selectEl) {
    const inputId = selectEl.dataset.dropdownInputId;
    if (!inputId) return;
    const inputEl = document.getElementById(inputId);
    if (!inputEl) return;
    const opt = selectEl.options[selectEl.selectedIndex];
    inputEl.value = opt ? (opt.textContent || "").trim() : "";
}

function enhanceSelectToDropdown(selectId) {
    const selectEl = document.getElementById(selectId);
    if (!selectEl) return;

    const wrapper = document.createElement("div");
    wrapper.className = "dropdown-wrapper";
    const inputEl = document.createElement("input");
    inputEl.type = "text";
    inputEl.autocomplete = "off";
    inputEl.className = "dropdown-input";
    inputEl.id = selectId + "_input";
    inputEl.placeholder = "Select...";

    const listEl = document.createElement("div");
    listEl.className = "dropdown-list";

    selectEl.parentNode.insertBefore(wrapper, selectEl);
    wrapper.appendChild(inputEl);
    wrapper.appendChild(listEl);
    wrapper.appendChild(selectEl);
    selectEl.classList.add("dropdown-hidden");
    selectEl.dataset.dropdownInputId = inputEl.id;

    syncSelectDropdown(selectEl);

    function openDropdown() {
        if (currentMode === "display") return;
        closeAllSelectDropdowns(wrapper);
        buildSelectDropdownList(selectEl, listEl, inputEl.value);
        listEl.classList.add("open");
    }

    inputEl.addEventListener("focus", function () {
        openDropdown();
    });

    inputEl.addEventListener("click", function () {
        openDropdown();
    });

    inputEl.addEventListener("input", function () {
        if (currentMode === "display") return;
        buildSelectDropdownList(selectEl, listEl, inputEl.value);
        listEl.classList.add("open");
    });

    inputEl.addEventListener("keydown", function (e) {
        if (currentMode === "display") return;
        if (e.key === "ArrowDown") {
            e.preventDefault();
            if (!listEl.classList.contains("open")) openDropdown();
            moveSelectDropdownActive(listEl, 1);
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (!listEl.classList.contains("open")) openDropdown();
            moveSelectDropdownActive(listEl, -1);
        } else if (e.key === "Enter") {
            const active = listEl.querySelector(".dropdown-item.active");
            e.preventDefault();
            if (active) {
                selectEl.value = active.dataset.value;
            }
            syncSelectDropdown(selectEl);
            listEl.classList.remove("open");
            const ev = new Event("change", { bubbles: true });
            selectEl.dispatchEvent(ev);
            focusNextField(inputEl);
        } else if (e.key === "Escape") {
            listEl.classList.remove("open");
        }
    });

    inputEl.addEventListener("blur", function () {
        setTimeout(function () {
            if (!wrapper.contains(document.activeElement)) {
                listEl.classList.remove("open");
                syncSelectDropdown(selectEl);
            }
        }, 120);
    });

    selectEl.addEventListener("change", function () {
        syncSelectDropdown(selectEl);
    });
}

function syncAllSelectDropdowns() {
    document.querySelectorAll("select[data-dropdown-input-id]").forEach(function (el) {
        syncSelectDropdown(el);
    });
}

document.addEventListener("mousedown", function (e) {
    const wrapper = e.target.closest(".dropdown-wrapper");
    if (wrapper) return;
    closeAllSelectDropdowns();
});

document.addEventListener("keydown", function (e) {
    if (!rightPanel.classList.contains("display-mode")) return;
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    const rows = Array.from(productList.querySelectorAll(".product-row")).filter(function (r) {
        if (!r.dataset || !r.dataset.id) return false;
        if (r.offsetParent === null) return false;
        return true;
    });
    if (!rows.length) return;
    let currentIndex = rows.findIndex(function (row) {
        return Number(row.dataset.id) === Number(activeProductId);
    });
    if (currentIndex === -1) currentIndex = 0;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        if (currentIndex < rows.length - 1) currentIndex += 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
    if (e.key === "ArrowUp") {
        e.preventDefault();
        if (currentIndex > 0) currentIndex -= 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
});

setMode("display");
setFormEditable(false);
(async function init() {
    await loadBrands();
    await loadProducts();
    enhanceSelectToDropdown("material_type");
    enhanceSelectToDropdown("rate_type");
    enhanceSelectToDropdown("amt_ro");
    enhanceSelectToDropdown("edit_flag");
    enhanceSelectToDropdown("brok_byr_type");
    enhanceSelectToDropdown("brok_slr_type");
    enhanceSelectToDropdown("def_loading_pend");
    enhanceSelectToDropdown("freight_type");
    if (allProducts.length) {
        fillForm(allProducts[0]);
        return;
    }
    resetForm();
})();
</script>
