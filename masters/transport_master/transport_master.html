<script>
let allTransports = [];
let allDivisions = [];
let allLines = [];
let allStates = [];
let allCities = [];
let activeTransportId = null;

let selectedLineNames = new Set();
let legacyLineNames = [];

let selectedCityIds = new Set();
let legacyCityEntries = [];
let stateFilterIds = new Set();

let workingLineNames = null;
let workingLegacyLineNames = null;
let workingCityIds = null;
let workingLegacyCityEntries = null;
let workingStateFilterIds = null;

const filterInput = document.getElementById("filterInput");
const transportList = document.getElementById("transportList");
const transportForm = document.getElementById("transportForm");
const modeTag = document.getElementById("modeTag");
const divisionOptions = document.getElementById("divisionOptions");
const stationInput = document.getElementById("stationInput");
const stationDropdown = document.getElementById("stationDropdown");
const stateInputView = document.getElementById("stateInputView");
const pinCodeInput = document.getElementById("pin_code");
const stationTable = document.getElementById("stationTable");
const lineTable = document.getElementById("lineTable");
const lineModal = document.getElementById("lineModal");
const cityModal = document.getElementById("cityModal");
const lineOptions = document.getElementById("lineOptions");
const stateOptions = document.getElementById("stateOptions");
const cityOptions = document.getElementById("cityOptions");
const displayButtons = document.getElementById("displayButtons");
const addModeButtons = document.getElementById("addModeButtons");
const rightPanel = document.querySelector(".right-panel");
const transportNameInput = document.getElementById("transport_name");
const transportNameError = document.getElementById("transportNameError");

let currentMode = "display";
let preEditTransportId = null;
let stationIndex = -1;
let stationFilter = "";

function esc(v) {
    return (v ?? "").toString().replace(/[&<>"']/g, function (m) {
        return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" })[m];
    });
}

function splitCsv(raw) {
    return (raw || "").split(",").map(function (v) { return v.trim(); }).filter(Boolean);
}

function normalizeName(name) {
    return (name || "").toString().trim().toLowerCase();
}

function parseStoredDivisionValues(raw) {
    if (!raw) return [];
    return raw.split(",").map(function (v) { return v.trim(); }).filter(Boolean);
}

function getSelectedDivisionIds() {
    return Array.from(divisionOptions.querySelectorAll("input[type='checkbox']:checked")).map(function (cb) { return cb.value; });
}

function syncApplicableDivisionsHidden() {
    document.getElementById("applicable_divisions").value = getSelectedDivisionIds().join(",");
}

function renderDivisionOptions(selectedValues) {
    const selectedSet = new Set((selectedValues || []).map(function (v) { return v.toString().toLowerCase(); }));
    if (!allDivisions.length) {
        divisionOptions.innerHTML = "<div style='font-size:14px;font-family:\"Times New Roman\",serif;'>No divisions found</div>";
        document.getElementById("applicable_divisions").value = "";
        return;
    }
    divisionOptions.innerHTML = allDivisions.map(function (d) {
        const id = String(d.division_id ?? "");
        const name = String(d.div_name ?? "");
        const checked = selectedSet.has(id.toLowerCase()) || selectedSet.has(name.toLowerCase()) ? "checked" : "";
        return "<label class='division-option'><input type='checkbox' value='" + esc(id) + "' data-name='" + esc(name) + "' " + checked + "> " + esc(name) + "</label>";
    }).join("");
    divisionOptions.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.addEventListener("change", syncApplicableDivisionsHidden);
    });
    syncApplicableDivisionsHidden();
}

function filterCities(term) {
    const q = (term || "").trim().toLowerCase();
    return allCities.filter(function (c) {
        return (c.city_name || "").toLowerCase().includes(q);
    });
}

function renderStationDropdown(cities) {
    stationDropdown.innerHTML = "";
    if (!cities.length) {
        stationDropdown.style.display = "none";
        return;
    }
    if (cities.length === 1) {
        stationIndex = 0;
    }
    cities.forEach(function (city, idx) {
        const row = document.createElement("div");
        row.textContent = (city.city_name || "") + " (" + (city.state_name || "") + ")";
        if (idx === stationIndex) row.classList.add("active");
        row.addEventListener("click", function () { selectCityFromInput(city); });
        stationDropdown.appendChild(row);
    });
    stationDropdown.style.display = "block";
    const activeEl = stationDropdown.querySelector(".active");
    if (activeEl && typeof activeEl.scrollIntoView === "function") {
        activeEl.scrollIntoView({ block: "nearest" });
    }
}

function selectCityFromInput(city) {
    if (!city) return;
    stationInput.value = city.city_name || "";
    stateInputView.value = city.state_name || "";
    setField("city_id", city.city_id || "");
    stationDropdown.style.display = "none";
    stationIndex = -1;
    stationFilter = "";
}

function setMode(mode) {
    currentMode = mode;
    rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");
    if (mode === "add") {
        modeTag.textContent = "Add Mode";
        rightPanel.classList.add("add-mode");
    } else if (mode === "modify") {
        modeTag.textContent = "Edit Mode";
        rightPanel.classList.add("modify-mode");
    } else {
        modeTag.textContent = "Display Mode";
        rightPanel.classList.add("display-mode");
    }
    stationDropdown.style.display = "none";
    stationIndex = -1;
    syncActionMode();
}

function showTransportNameError() {
    transportNameInput.classList.add("field-error");
    transportNameError.textContent = "Required";
    transportNameError.style.display = "inline";
}

function clearTransportNameError() {
    transportNameInput.classList.remove("field-error");
    transportNameError.textContent = "";
    transportNameError.style.display = "none";
}

function showTransportNameErrorMessage(message) {
    transportNameInput.classList.add("field-error");
    transportNameError.textContent = message || "Required";
    transportNameError.style.display = "inline";
}

function checkDuplicateTransportName() {
    const name = (transportNameInput.value || "").trim().toLowerCase();
    if (!name) { clearTransportNameError(); return false; }
    const currentId = Number(document.getElementById("transport_id").value || 0);
    const duplicate = allTransports.some(function (t) {
        const sameName = (t.transport_name || "").trim().toLowerCase() === name;
        const sameId = Number(t.transport_id) === currentId;
        return sameName && !sameId;
    });
    if (duplicate) {
        showTransportNameErrorMessage("Already exists");
        return true;
    }
    clearTransportNameError();
    return false;
}

function hasAnyOtherFieldValue() {
    const inputs = transportForm.querySelectorAll("input");
    for (let i = 0; i < inputs.length; i += 1) {
        const field = inputs[i];
        if (field.id === "transport_name") continue;
        if (field.type === "hidden") continue;
        if (field.readOnly) {
            if ((field.value || "").trim()) return true;
            continue;
        }
        if ((field.value || "").trim()) return true;
    }
    const anyDivision = divisionOptions.querySelector("input[type='checkbox']:checked");
    if (anyDivision) return true;
    return false;
}

function syncActionMode() {
    const isDisplay = currentMode === "display";
    displayButtons.style.display = isDisplay ? "flex" : "none";
    addModeButtons.style.display = "flex";
    const printBtn = document.getElementById("printBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const saveBtn = document.getElementById("saveBtn");
    if (printBtn) printBtn.hidden = isDisplay;
    if (cancelBtn) cancelBtn.hidden = isDisplay;
    if (saveBtn) saveBtn.hidden = isDisplay;
}

function setFormEditable(editable) {
    const fields = transportForm.querySelectorAll("input");
    fields.forEach(function (field) {
        if (field.type === "hidden") return;
        field.readOnly = !editable;
        if (!editable) field.setAttribute("tabindex", "-1");
        else field.removeAttribute("tabindex");
    });
    divisionOptions.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.disabled = !editable;
        cb.tabIndex = editable ? 0 : -1;
    });
    document.getElementById("printBtn").disabled = false;
    document.getElementById("cityBtn").disabled = false;
    document.getElementById("printBtn").setAttribute("aria-disabled", "false");
    document.getElementById("cityBtn").setAttribute("aria-disabled", "false");
}

function setField(id, value) {
    const el = document.getElementById(id);
    if (el) el.value = value ?? "";
}

function renderTransports() {
    const keyword = filterInput.value.trim().toLowerCase();
    const rows = allTransports.filter(function (t) {
        const name = (t.transport_name || "").toLowerCase();
        const station = (t.station || "").toLowerCase();
        return !keyword || name.includes(keyword) || station.includes(keyword);
    });

    if (!rows.length) {
        transportList.innerHTML = "<div class='transport-row'>No transports found</div>";
        return;
    }

    transportList.innerHTML = rows.map(function (t) {
        const active = Number(t.transport_id) === activeTransportId ? "active" : "";
        return "<div class='transport-row " + active + "' data-id='" + esc(t.transport_id) + "'>"
            + esc(t.transport_name || "")
            + "</div>";
    }).join("");

    transportList.querySelectorAll(".transport-row").forEach(function (row) {
        row.addEventListener("click", function () {
            const id = Number(this.dataset.id || 0);
            const t = allTransports.find(function (x) { return Number(x.transport_id) === id; });
            if (t) fillForm(t);
        });
    });
}

function selectTransportRow(row) {
    if (!row) return;
    const id = Number(row.dataset.id || 0);
    const t = allTransports.find(function (x) { return Number(x.transport_id) === id; });
    if (t) fillForm(t);
}

function resetSelections() {
    selectedLineNames = new Set();
    legacyLineNames = [];
    selectedCityIds = new Set();
    legacyCityEntries = [];
    stateFilterIds = new Set();
    renderLineTable();
    renderCityTable();
    syncLineHidden();
    syncCityHidden();
}

function resetForm() {
    transportForm.reset();
    setField("transport_id", "");
    setField("city_id", "");
    activeTransportId = null;
    renderDivisionOptions([]);
    resetSelections();
    setMode("add");
    setFormEditable(true);
    renderTransports();
}

function buildLineNameValue() {
    const selected = [];
    allLines.forEach(function (line) {
        const name = String(line.line_name || "");
        if (selectedLineNames.has(normalizeName(name))) {
            selected.push(name);
        }
    });
    legacyLineNames.forEach(function (name) {
        if (!selected.some(function (n) { return normalizeName(n) === normalizeName(name); })) {
            selected.push(name);
        }
    });
    return selected;
}

function syncLineHidden() {
    setField("line_name", buildLineNameValue().join(", "));
}

function renderLineTable() {
    const names = buildLineNameValue();
    if (!names.length) {
        lineTable.innerHTML = "";
        return;
    }
    lineTable.innerHTML = names.map(function (name, index) {
        return "<div class='grid-row line-row'>"
            + "<div>" + (index + 1) + "</div>"
            + "<div>" + esc(name) + "</div>"
            + "</div>";
    }).join("");
}

function buildCityRows(ids, legacyEntries) {
    const rows = [];
    ids.forEach(function (id) {
        const city = allCities.find(function (c) { return String(c.city_id) === String(id); });
        if (city) {
            rows.push({
                city_name: city.city_name || "",
                state_name: city.state_name || ""
            });
        }
    });
    legacyEntries.forEach(function (entry) {
        if (!rows.some(function (r) { return normalizeName(r.city_name) === normalizeName(entry.city_name); })) {
            rows.push({ city_name: entry.city_name || "", state_name: entry.state_name || "" });
        }
    });
    rows.sort(function (a, b) {
        return String(a.city_name || "").localeCompare(String(b.city_name || ""));
    });
    return rows;
}

function syncCityHidden() {
    const rows = buildCityRows(selectedCityIds, legacyCityEntries);
    const stations = rows.map(function (r) { return r.city_name; }).filter(Boolean);
    const states = [];
    rows.forEach(function (r) {
        if (r.state_name && !states.some(function (s) { return normalizeName(s) === normalizeName(r.state_name); })) {
            states.push(r.state_name);
        }
    });
    setField("station", stations.join(", "));
    setField("state_name", states.join(", "));
}

function renderCityTable() {
    const rows = buildCityRows(selectedCityIds, legacyCityEntries);
    if (!rows.length) {
        stationTable.innerHTML = "";
        return;
    }
    stationTable.innerHTML = rows.map(function (row, index) {
        return "<div class='grid-row'>"
            + "<div>" + (index + 1) + "</div>"
            + "<div>" + esc(row.city_name || "") + "</div>"
            + "<div>" + esc(row.state_name || "") + "</div>"
            + "</div>";
    }).join("");
}

function fillForm(t) {
    setField("transport_id", t.transport_id);
    setField("city_id", t.city_id || "");
    setField("transport_name", t.transport_name);
    setField("address", t.address);
    setField("address1", t.address1);
    setField("pin_code", t.pin_code);
    setField("contact_person", t.contact_person);
    setField("phone_office", t.phone_office);
    setField("mobile", t.mobile);
    setField("email", t.email);
    setField("pan", t.pan);
    setField("other_info", t.other_info);
    renderDivisionOptions(parseStoredDivisionValues(t.applicable_divisions || ""));

    selectedLineNames = new Set();
    legacyLineNames = [];
    splitCsv(t.line_name).forEach(function (name) {
        const match = allLines.find(function (l) { return normalizeName(l.line_name) === normalizeName(name); });
        if (match) selectedLineNames.add(normalizeName(match.line_name));
        else legacyLineNames.push(name);
    });

    selectedCityIds = new Set();
    legacyCityEntries = [];
    const cityNames = splitCsv(t.station);
    const stateNames = splitCsv(t.state_name);
    const defaultState = stateNames.length === 1 ? stateNames[0] : "";

    cityNames.forEach(function (name) {
        const city = allCities.find(function (c) { return normalizeName(c.city_name) === normalizeName(name); });
        if (city) selectedCityIds.add(String(city.city_id));
        else legacyCityEntries.push({ city_name: name, state_name: defaultState });
    });

    renderLineTable();
    renderCityTable();
    syncLineHidden();
    syncCityHidden();

    if (t.city_id) {
        stationInput.value = t.city_name || "";
        stateInputView.value = t.city_state_name || "";
    } else {
        stationInput.value = "";
        stateInputView.value = "";
    }

    activeTransportId = Number(t.transport_id);
    setMode("display");
    setFormEditable(false);
    renderTransports();
}

    }

        if (prev) {
            fillForm(prev);
            preEditTransportId = null;
            return;
        }
    }
    if (allTransports.length) {
        fillForm(allTransports[0]);
        return;
    }
    resetForm();
}

async function saveTransport(isModify) {
    try {
        syncApplicableDivisionsHidden();
        syncLineHidden();
        syncCityHidden();

        const fd = new FormData(transportForm);
        const transportId = fd.get("transport_id");
        const transportName = (fd.get("transport_name") || "").trim();

        if (checkDuplicateTransportName()) {
            transportNameInput.focus();
            transportNameInput.select();
            return;
        }

        if (!transportName) {
            if (hasAnyOtherFieldValue()) {
                showTransportNameErrorMessage("Required");
                transportNameInput.focus();
            }
            return;
        }
        clearTransportNameError();

        let url = "../../api/transport/add_transport.php";
        if (isModify) {
            if (!transportId) {
                alert("Select a transport to modify");
                return;
            }
            url = "../../api/transport/update_transport.php";
        } else if (typeof window.confirmAdd === "function") {
            const ok = await window.confirmAdd("Are you sure you want to add this transport?\n\n" + transportName);
            if (!ok) return;
        }

        const res = await fetch(url, { method: "POST", body: fd });
        let data = null;
        let rawText = "";
        try {
            rawText = await res.text();
            data = JSON.parse(rawText);
        } catch (e) {
            data = null;
        }
        if (!data || data.status !== "success") {
            const msg = (data && data.message)
                ? data.message
                : (rawText && rawText.trim() ? rawText.trim() : "Request failed");
            alert(msg);
        }

        if (data && data.status === "success") {
            await loadTransports();
            if (isModify && transportId) {
                const updated = allTransports.find(function (t) { return Number(t.transport_id) === Number(transportId); });
                if (updated) fillForm(updated);
                return;
            }
            // After add, show the new record in display mode so it is visible in the list.
            filterInput.value = "";
            const added = allTransports.find(function (t) {
                return normalizeName(t.transport_name) === normalizeName(transportName);
            });
            if (added) {
                fillForm(added);
            } else if (allTransports.length) {
                fillForm(allTransports[0]);
            } else {
                resetForm();
                setMode("display");
                setFormEditable(false);
            }
        }
    } catch (err) {
        alert("Request failed");
    } finally {
        if (window.clearAddModeSaveInFlight) window.clearAddModeSaveInFlight();
    }
}

async function deleteTransport() {
    const transportId = document.getElementById("transport_id").value;
    if (!transportId) {
        alert("Select a transport to delete");
        return;
    }
    const ok = await window.confirmDelete("Delete this transport?");
    if (!ok) return;

    const body = new URLSearchParams();
    body.set("transport_id", transportId);

    const res = await fetch("../../api/transport/delete_transport.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: body.toString()
    });
    const data = await res.json();
    if (!data || data.status !== "success") { alert((data && data.message) || "Request failed"); }

    if (data.status === "success") {
        await loadTransports();
        if (allTransports.length) {
            fillForm(allTransports[0]);
        } else {
            transportForm.reset();
            setField("transport_id", "");
            setField("city_id", "");
            activeTransportId = null;
            renderDivisionOptions([]);
            resetSelections();
            setMode("display");
            setFormEditable(false);
            renderTransports();
        }
    }
}

function openLineModal() {
    workingLineNames = new Set(selectedLineNames);
    workingLegacyLineNames = legacyLineNames.slice();
    renderLineOptions();
    lineModal.style.display = "flex";
}

function closeLineModal() {
    lineModal.style.display = "none";
    workingLineNames = null;
    workingLegacyLineNames = null;
}

function renderLineOptions() {
    if (!allLines.length) {
        lineOptions.innerHTML = "<div class='popup-item'>No lines found</div>";
        return;
    }
    lineOptions.innerHTML = allLines.map(function (line) {
        const name = String(line.line_name || "");
        const checked = workingLineNames.has(normalizeName(name)) ? "checked" : "";
        return "<label class='popup-item'><input type='checkbox' value='" + esc(name) + "' " + checked + "> " + esc(name) + "</label>";
    }).join("");

    lineOptions.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.addEventListener("change", function () {
            const name = cb.value || "";
            if (cb.checked) workingLineNames.add(normalizeName(name));
            else workingLineNames.delete(normalizeName(name));
        });
    });
}

function commitLineModal() {
    selectedLineNames = new Set(workingLineNames || []);
    legacyLineNames = (workingLegacyLineNames || []).slice();
    renderLineTable();
    syncLineHidden();
    closeLineModal();
}

function selectAllLines() {
    allLines.forEach(function (line) {
        const name = String(line.line_name || "");
        workingLineNames.add(normalizeName(name));
    });
    renderLineOptions();
}

function deselectAllLines() {
    workingLineNames = new Set();
    renderLineOptions();
}

function openCityModal() {
    workingCityIds = new Set(selectedCityIds);
    workingLegacyCityEntries = legacyCityEntries.slice();
    workingStateFilterIds = new Set(stateFilterIds);
    renderStateOptions();
    renderCityOptions();
    cityModal.style.display = "flex";
}

function closeCityModal() {
    cityModal.style.display = "none";
    workingCityIds = null;
    workingLegacyCityEntries = null;
    workingStateFilterIds = null;
}

function getVisibleCities() {
    if (workingStateFilterIds.size === 0) return allCities;
    return allCities.filter(function (c) { return workingStateFilterIds.has(String(c.state_id)); });
}

function renderStateOptions() {
    if (!allStates.length) {
        stateOptions.innerHTML = "<div class='popup-item'>No states found</div>";
        return;
    }
    stateOptions.innerHTML = allStates.map(function (state) {
        const id = String(state.id);
        const checked = workingStateFilterIds.has(id) ? "checked" : "";
        return "<label class='popup-item'><input type='checkbox' value='" + esc(id) + "' " + checked + "> " + esc(state.state_name || "") + "</label>";
    }).join("");

    stateOptions.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.addEventListener("change", function () {
            const stateId = cb.value;
            if (cb.checked) {
                workingStateFilterIds.add(stateId);
                allCities.forEach(function (city) {
                    if (String(city.state_id) === String(stateId)) {
                        workingCityIds.add(String(city.city_id));
                    }
                });
            } else {
                workingStateFilterIds.delete(stateId);
                allCities.forEach(function (city) {
                    if (String(city.state_id) === String(stateId)) {
                        workingCityIds.delete(String(city.city_id));
                    }
                });
            }
            renderStateOptions();
            renderCityOptions();
        });
    });
}

function renderCityOptions() {
    const visibleCities = getVisibleCities();
    if (!visibleCities.length) {
        cityOptions.innerHTML = "<div class='popup-item'>No cities found</div>";
        return;
    }
    cityOptions.innerHTML = visibleCities.map(function (city) {
        const id = String(city.city_id);
        const checked = workingCityIds.has(id) ? "checked" : "";
        return "<label class='popup-item'><input type='checkbox' value='" + esc(id) + "' " + checked + "> " + esc(city.city_name || "") + "</label>";
    }).join("");

    cityOptions.querySelectorAll("input[type='checkbox']").forEach(function (cb) {
        cb.addEventListener("change", function () {
            const cityId = cb.value;
            const city = allCities.find(function (c) { return String(c.city_id) === String(cityId); });
            if (cb.checked) {
                workingCityIds.add(cityId);
            } else {
                workingCityIds.delete(cityId);
                if (city && workingStateFilterIds.has(String(city.state_id))) {
                    workingStateFilterIds.delete(String(city.state_id));
                }
            }
            renderStateOptions();
            renderCityOptions();
        });
    });
}

function commitCityModal() {
    selectedCityIds = new Set(workingCityIds || []);
    legacyCityEntries = (workingLegacyCityEntries || []).slice();
    stateFilterIds = new Set(workingStateFilterIds || []);
    renderCityTable();
    syncCityHidden();
    closeCityModal();
}

function selectAllCities() {
    const visibleCities = getVisibleCities();
    visibleCities.forEach(function (city) {
        workingCityIds.add(String(city.city_id));
    });
    renderStateOptions();
    renderCityOptions();
}

function deselectAllCities() {
    const visibleCities = getVisibleCities();
    visibleCities.forEach(function (city) {
        workingCityIds.delete(String(city.city_id));
    });
    if (workingStateFilterIds.size > 0) {
        workingStateFilterIds = new Set();
    }
    renderStateOptions();
    renderCityOptions();
}

function handleModalKeys(e) {
    const lineOpen = lineModal.style.display === "flex";
    const cityOpen = cityModal.style.display === "flex";
    if (!lineOpen && !cityOpen) {
        if (e.key === "F7") {
            e.preventDefault();
            e.stopImmediatePropagation();
            openLineModal();
            return;
        }
        if (e.key === "F8") {
            e.preventDefault();
            e.stopImmediatePropagation();
            openCityModal();
        }
        return;
    }

    if (lineOpen) {
        if (e.key === "Escape") { e.preventDefault(); e.stopImmediatePropagation(); closeLineModal(); return; }
        if (e.key === "F3") { e.preventDefault(); e.stopImmediatePropagation(); selectAllLines(); return; }
        if (e.key === "F4") { e.preventDefault(); e.stopImmediatePropagation(); deselectAllLines(); return; }
        if (e.key === "F6") { e.preventDefault(); e.stopImmediatePropagation(); commitLineModal(); return; }
    }

    if (cityOpen) {
        if (e.key === "Escape") { e.preventDefault(); e.stopImmediatePropagation(); closeCityModal(); return; }
        if (e.key === "F3") { e.preventDefault(); e.stopImmediatePropagation(); selectAllCities(); return; }
        if (e.key === "F4") { e.preventDefault(); e.stopImmediatePropagation(); deselectAllCities(); return; }
        if (e.key === "F6") { e.preventDefault(); e.stopImmediatePropagation(); commitCityModal(); return; }
    }
}

});

stationInput.addEventListener("keydown", function (e) {
    const items = Array.from(stationDropdown.children);
    if (stationDropdown.style.display !== "block" || !items.length) return;

    if (e.key === "ArrowDown") {
        e.preventDefault();
        e.stopPropagation();
        stationIndex = (stationIndex + 1) % items.length;
        renderStationDropdown(filterCities(stationFilter));
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        e.stopPropagation();
        stationIndex = (stationIndex - 1 + items.length) % items.length;
        renderStationDropdown(filterCities(stationFilter));
    } else if (e.key === "Enter") {
        e.preventDefault();
        e.stopPropagation();
        const filtered = filterCities(stationFilter);
        if (stationIndex < 0 && filtered.length === 1) stationIndex = 0;
        if (filtered[stationIndex]) {
            selectCityFromInput(filtered[stationIndex]);
        } else {
            stationDropdown.style.display = "none";
            stationIndex = -1;
        }
        if (pinCodeInput) {
            setTimeout(function () { pinCodeInput.focus(); }, 0);
        }
    } else if (e.key === "Escape") {
        stationDropdown.style.display = "none";
        stationIndex = -1;
    }
});

document.addEventListener("keydown", handleModalKeys, true);

document.addEventListener("keydown", function (e) {
    if (currentMode !== "display") return;
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    const rows = Array.from(transportList.querySelectorAll(".transport-row")).filter(function (r) { return r.dataset.id; });
    if (!rows.length) return;
    let currentIndex = rows.findIndex(function (row) { return Number(row.dataset.id) === Number(activeTransportId); });
    if (currentIndex === -1) currentIndex = 0;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        if (currentIndex < rows.length - 1) currentIndex += 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        selectTransportRow(rows[currentIndex]);
    }
    if (e.key === "ArrowUp") {
        e.preventDefault();
        if (currentIndex > 0) currentIndex -= 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        selectTransportRow(rows[currentIndex]);
    }
});

lineModal.addEventListener("click", function (e) {
    if (e.target === lineModal) closeLineModal();
});

cityModal.addEventListener("click", function (e) {
    if (e.target === cityModal) closeCityModal();
});

resetForm();
(async function init() {
    await loadDivisions();
    await loadLines();
    await loadStates();
    await loadCities();
    await loadTransports();
    if (allTransports.length) {
        const first = allTransports[0];
        if (first) fillForm(first);
    }
})();
</script>
</body>
</html>
