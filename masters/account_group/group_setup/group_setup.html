<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Group Setup | SoftBrokerage</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../../style.css?v=8">
<link rel="stylesheet" href="../../../selection-mode.css?v=1">
<link rel="stylesheet" href="../../../add-mode.css?v=1">

<script>
const appRoot = (function(){ const path = String(location.pathname || '').replace(/\\/g, '/'); const lower = path.toLowerCase(); const marker = '/brokerapp/'; const idx = lower.indexOf(marker); if (idx !== -1) { return location.origin + path.slice(0, idx + marker.length); } return location.origin + '/'; })();
(async function () {
    const res = await fetch(appRoot + "api/check_auth.php");
    const data = await res.json();
    if (!data.logged_in) window.location.replace(appRoot + "login.html");
})();
</script>
<script src="../../../global-nav.js" defer></script>
<script src="../../../global-keyboard.js" defer data-global-keyboard="1"></script>
<script src="../../../add-mode.js" defer></script>
<script src="../../../permissions-catalog.js"></script>
<script src="../../../selection-mode.js" defer></script>
<script src="../../../delete-mode.js" defer data-delete-mode="1"></script>
<script src="../../../edit-mode.js" defer data-edit-mode="1"></script>

<style>
* { box-sizing: border-box; }

html, body {
    max-width: 100%;
    overflow: hidden;
    height: 100%;
}

.content {
    padding: 8px 10px 10px;
    height: calc(100vh - 116px);
    overflow: hidden;
}

.feature-box {
    width: 100%;
    max-width: none;
    height: 100%;
    margin: 0 auto;
    padding: 8px;
    border: 1px solid #d8d8d8;
    background: #efefef;
    overflow: hidden;
}

.page-title {
    margin: 0 0 8px;
    text-align: center;
    font-size: 24px;
    font-family: "Times New Roman", serif;
    font-weight: 400;
    color: #0b8d2f;
    line-height: 1;
}

.master-layout {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    gap: 8px;
    align-items: start;
    height: calc(100% - 40px);
    min-height: 0;
}

.left-panel, .right-panel {
    background: #efefef;
    border: 1px solid #d0d0d0;
    padding: 8px;
    min-width: 0;
    height: 100%;
    overflow: hidden;
}

.right-panel {
    display: flex;
    flex-direction: column;
}

.left-panel .label {
    font-size: 16px;
    font-family: "Times New Roman", serif;
    color: #2f2f2f;
    margin-bottom: 4px;
}

#filterInput {
    width: 100%;
    max-width: 100%;
    height: 30px;
    padding: 4px 8px;
    border: 2px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    color: #000;
}

#filterInput:focus {
    outline: none;
    background: #1fdde0;
    border-color: #00cfd6;
}

.list-wrap {
    margin-top: 6px;
    border: 2px solid #18c7cf;
    background: #22e2e8;
    height: calc(100% - 56px);
    overflow-y: auto;
    overflow-x: hidden;
}

.list-head {
    position: sticky;
    top: 0;
    z-index: 1;
    padding: 4px 8px;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #000;
    border-bottom: 1px solid rgba(0, 0, 0, 0.2);
    background: #fff;
}

.group-row {
    padding: 3px 8px;
    font-size: 13px;
    line-height: 1.2;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    scroll-margin-top: 30px;
}

.group-row:hover { background: rgba(0, 0, 0, 0.08); }
.group-row.active { background: #0074d9; color: #fff; }

.mode-tag {
    display: inline-block;
    align-self: flex-start;
    margin-bottom: 6px;
    padding: 2px 6px;
    border: 1px solid #c5b800;
    background: #ffef1c;
    color: #000;
    font-size: 14px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
}

.setup-form {
    border: 1px solid #d7d7d7;
    background: #efefef;
    padding: 8px;
    flex: 1;
    min-height: 0;
    overflow: auto;
}

.form-grid {
    display: grid;
    grid-template-columns: 136px minmax(0, 1fr);
    gap: 6px 8px;
    align-items: center;
}

.form-grid label {
    font-size: 14px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #2d2d2d;
}

.form-grid input {
    width: 100%;
    height: 24px;
    padding: 2px 6px;
    border: 2px solid #969696;
    border-radius: 0;
    background: #fff;
    font-size: 13px;
    font-family: "Times New Roman", serif;
}

.panel-box {
    border: 1px solid #bcbcbc;
    background: #fff;
    padding: 6px;
    margin-top: 6px;
}

.panel-title {
    font-size: 14px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    color: #2d2d2d;
    margin-bottom: 4px;
}

.transfer-grid {
    display: grid;
    grid-template-columns: 1fr 60px 1fr;
    gap: 6px;
    align-items: center;
}

.list-box {
    border: 1px solid #c9c9c9;
    background: #fff;
    min-height: 300px;
    max-height: 300px;
    overflow: auto;
}

.list-head-row {
    background: #e3b07d;
    border-bottom: 1px solid #7b7b7b;
    padding: 3px 6px;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
}

.list-row {
    padding: 3px 6px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    cursor: pointer;
}

.list-row.active { background: #bffcff; }

.transfer-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    justify-content: center;
}

.transfer-btn {
    width: 40px;
    height: 30px;
    border: 1px solid #969696;
    background: #fff;
    cursor: pointer;
    font-weight: 700;
}

.list-footer {
    margin-top: 4px;
    display: flex;
    gap: 6px;
    justify-content: center;
}

.btn-xs {
    padding: 3px 8px;
    height: 24px;
    border-radius: 2px;
    border: 2px solid #efc9f0;
    background: #ea7ce8;
    color: #000;
    font-size: 12px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    cursor: pointer;
}

.action-row {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.btn {
    min-width: 96px;
    padding: 3px 8px;
    height: 28px;
    border-radius: 2px;
    border: 2px solid #efc9f0;
    background: #ea7ce8;
    color: #000;
    font-size: 13px;
    font-family: "Times New Roman", serif;
    font-weight: 700;
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
}

.btn.primary, .btn.danger {
    background: #ea7ce8;
    color: #000;
    border-color: #efc9f0;
}

.action-row.hidden { display: none; }

.right-panel.display-mode input,
.right-panel.display-mode select,
.right-panel.display-mode textarea {
    background: #e6e6e6;
    border-color: #c2c2c2;
    color: #444;
    pointer-events: none;
    user-select: none;
}

@media (max-width: 1220px) {
    html, body { overflow: auto; height: auto; }
    .content { padding: 10px 8px 16px; height: auto; overflow: visible; }
    .feature-box { height: auto; overflow: visible; }
    .master-layout { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 140px 1fr; }
    .transfer-grid { grid-template-columns: 1fr; }
    .transfer-actions { flex-direction: row; justify-content: center; }
}
</style>
</head>
<body>
<div class="content">
<div class="feature-box">
<h2 class="page-title">Group Setup</h2>

<div class="master-layout">
<div class="left-panel">
<div class="label">Selection Mode</div>
<input id="filterInput" type="text" autocomplete="off" placeholder="Search group...">
<div class="list-wrap">
<div class="list-head">Name</div>
<div id="groupList"></div>
</div>
</div>

<div class="right-panel">
<span id="modeTag" class="mode-tag">Display Mode</span>
<form id="setupForm" autocomplete="off" class="setup-form">
<div class="form-grid">
<label for="group_fix_name">Group Fix Name</label>
<input id="group_fix_name" type="text" readonly>
</div>

<div class="panel-box">
<div class="panel-title">Groups Alloted for Selected Group</div>
<div style="font-size:12px;margin:0 0 6px;font-family:'Times New Roman',serif;">All Groups</div>
<div class="transfer-grid">
<div>
<div class="list-box" id="allGroupList">
<div class="list-head-row">Group Name</div>
</div>
<div class="list-footer">
<button type="button" class="btn-xs" id="allSelectBtn">Select All</button>
<button type="button" class="btn-xs" id="allDeselectBtn">De-Select All</button>
</div>
</div>

<div class="transfer-actions">
<button type="button" class="transfer-btn" id="moveRightBtn">&gt;</button>
<button type="button" class="transfer-btn" id="moveLeftBtn">&lt;</button>
</div>

<div>
<div class="list-box" id="selectedGroupList">
<div class="list-head-row">Selection</div>
</div>
<div class="list-footer">
<button type="button" class="btn-xs" id="selSelectBtn">Select All</button>
<button type="button" class="btn-xs" id="selDeselectBtn">De-Select All</button>
</div>
</div>
</div>
</div>
</form>

<div id="displayButtons" class="action-row">
<button class="btn" type="button" id="modifyBtn">&#128221; F3-Modify</button>
<button class="btn" type="button" id="exitBtn">&#10060; Esc-Exit</button>
</div>

<div id="addModeButtons" class="action-row hidden">
<button class="btn danger" type="button" id="cancelBtn">&#10060; Esc-Cancel</button>
<button class="btn primary" type="button" id="saveBtn">&#128190; F6-Save</button>
</div>
</div>
</div>
</div>
</div>

<script>
let allGroups = [];
let fixedGroups = [];
let groupSetupMap = {};
let activeFixId = null;
let currentMode = "display";

const filterInput = document.getElementById("filterInput");
const groupList = document.getElementById("groupList");
const setupForm = document.getElementById("setupForm");
const modeTag = document.getElementById("modeTag");
const rightPanel = document.querySelector(".right-panel");
const displayButtons = document.getElementById("displayButtons");
const addModeButtons = document.getElementById("addModeButtons");
const groupFixName = document.getElementById("group_fix_name");
const allGroupList = document.getElementById("allGroupList");
const selectedGroupList = document.getElementById("selectedGroupList");

function esc(v) {
    return (v ?? "").toString().replace(/[&<>"']/g, function (m) {
        return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" })[m];
    });
}

function setMode(mode) {
    currentMode = mode;
    rightPanel.classList.remove("add-mode", "modify-mode", "display-mode");
    if (mode === "add") {
        modeTag.textContent = "Add Mode";
        rightPanel.classList.add("add-mode");
    } else if (mode === "modify") {
        modeTag.textContent = "Edit Mode";
        rightPanel.classList.add("modify-mode");
    } else {
        modeTag.textContent = "Display Mode";
        rightPanel.classList.add("display-mode");
    }
    const isDisplay = mode === "display";
    displayButtons.classList.toggle("hidden", !isDisplay);
    addModeButtons.classList.toggle("hidden", isDisplay);
}

function setFormEditable(editable) {
    const fields = setupForm.querySelectorAll("input, select, textarea, button");
    fields.forEach(function (field) {
        if (field.id === "moveRightBtn" || field.id === "moveLeftBtn") return;
        if (editable) {
            field.removeAttribute("tabindex");
        } else {
            field.setAttribute("tabindex", "-1");
        }
    });
}

function renderGroups() {
    const keyword = (filterInput.value || "").trim().toLowerCase();
    const rows = fixedGroups.filter(function (g) {
        const name = (g.name || "").toLowerCase();
        return !keyword || name.includes(keyword);
    });
    let selectedId = Number(activeFixId || 0);
    if (!selectedId || !rows.some(function (g) { return Number(g.id) === selectedId; })) {
        if (rows.length) {
            selectedId = Number(rows[0].id);
            activeFixId = selectedId;
            groupFixName.value = rows[0].name || "";
        }
    }
    groupList.innerHTML = rows.map(function (g) {
        const active = Number(g.id) === selectedId ? "active" : "";
        return "<div class='group-row " + active + "' data-id='" + esc(g.id) + "'>" + esc(g.name || "") + "</div>";
    }).join("");
    groupList.querySelectorAll(".group-row").forEach(function (row) {
        row.addEventListener("click", function () {
            const id = Number(this.dataset.id);
            const g = fixedGroups.find(function (x) { return Number(x.id) === id; });
            if (!g) return;
            activeFixId = id;
            groupFixName.value = g.name || "";
            renderGroups();
            renderGroupLists();
        });
    });
}

function renderGroupLists() {
    const selectedIds = Array.isArray(groupSetupMap[activeFixId]) ? groupSetupMap[activeFixId] : [];
    const selectedIdSet = new Set(selectedIds.map(function (v) { return Number(v); }));
    const selectedGroups = allGroups.filter(function (g) { return selectedIdSet.has(Number(g.group_id)); });
    const availableGroups = allGroups.filter(function (g) { return !selectedIdSet.has(Number(g.group_id)); });

    const allHtml = ["<div class='list-head-row'>Group Name</div>"];
    if (!availableGroups.length) allHtml.push("<div class='list-row'>No groups available</div>");
    availableGroups.forEach(function (r) { allHtml.push("<div class='list-row' data-id='" + esc(r.group_id) + "'>" + esc(r.group_name) + "</div>"); });
    allGroupList.innerHTML = allHtml.join("");
    const selHtml = ["<div class='list-head-row'>Selection</div>"];
    if (!selectedGroups.length) selHtml.push("<div class='list-row'>No groups selected</div>");
    selectedGroups.forEach(function (r) { selHtml.push("<div class='list-row' data-id='" + esc(r.group_id) + "'>" + esc(r.group_name) + "</div>"); });
    selectedGroupList.innerHTML = selHtml.join("");

    wireListClicks(allGroupList);
    wireListClicks(selectedGroupList);
}

function loadGroups() {
    return fetch(appRoot + "api/group/get_group.php")
        .then(res => res.json())
        .then(data => { allGroups = Array.isArray(data) ? data : []; });
}

function loadGroupSetup() {
    return fetch(appRoot + "api/group_setup/get_group_setup.php")
        .then(res => res.json())
        .then(data => {
            groupSetupMap = {};
            if (Array.isArray(data)) {
                data.forEach(function (row) {
                    const id = Number(row.group_fix_id || 0);
                    if (!id) return;
                    let list = [];
                    try {
                        list = JSON.parse(row.allowed_group_ids_json || "[]");
                    } catch (e) {
                        list = [];
                    }
                    if (!Array.isArray(list)) list = [];
                    groupSetupMap[id] = list.map(function (v) { return Number(v); }).filter(function (v) { return v > 0; });
                });
            }
        });
}

filterInput.addEventListener("input", renderGroups);

function handleModifyAction() {
    if (!activeFixId) {
        alert("Select a group fix name first");
        return;
    }
    setMode("modify");
    setFormEditable(true);
}

function cancelEditMode() {
    setMode("display");
    setFormEditable(false);
}

async function saveSetup() {
    if (!activeFixId) { alert("Select a group fix name"); return; }
    if (typeof window.confirmAdd === "function") {
        const ok = await window.confirmAdd("Are you sure you want to save this setup?");
        if (!ok) return;
    }
    const selectedIds = Array.from(selectedGroupList.querySelectorAll(".list-row[data-id]")).map(function (row) {
        return Number(row.dataset.id);
    }).filter(function (v) { return v > 0; });
    const payload = {
        group_fix_id: activeFixId,
        allowed_group_ids: selectedIds
    };
    const res = await fetch(appRoot + "api/group_setup/save_group_setup.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });
    const data = await res.json().catch(function () { return null; });
    if (!data || data.status !== "success") {
        alert((data && data.message) || "Save failed");
        return;
    }
    groupSetupMap[activeFixId] = selectedIds;
    setMode("display");
    setFormEditable(false);
}

const modifyBtn = document.getElementById("modifyBtn");
const exitBtn = document.getElementById("exitBtn");
const saveBtn = document.getElementById("saveBtn");
const cancelBtn = document.getElementById("cancelBtn");

if (modifyBtn) modifyBtn.addEventListener("click", handleModifyAction);
if (exitBtn) exitBtn.addEventListener("click", function () { window.location.href = appRoot + "index.html"; });
if (saveBtn) saveBtn.addEventListener("click", saveSetup);
if (cancelBtn) cancelBtn.addEventListener("click", cancelEditMode);

document.addEventListener("keydown", function (e) {
    if (!rightPanel.classList.contains("display-mode")) return;
    if (e.key !== "ArrowDown" && e.key !== "ArrowUp") return;
    const rows = Array.from(groupList.querySelectorAll(".group-row")).filter(function (r) {
        if (!r.dataset || !r.dataset.id) return false;
        if (r.offsetParent === null) return false;
        return true;
    });
    if (!rows.length) return;
    let currentIndex = rows.findIndex(function (row) {
        return Number(row.dataset.id) === Number(activeFixId);
    });
    if (currentIndex === -1) currentIndex = 0;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        if (currentIndex < rows.length - 1) currentIndex += 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
    if (e.key === "ArrowUp") {
        e.preventDefault();
        if (currentIndex > 0) currentIndex -= 1;
        rows[currentIndex].scrollIntoView({ block: "nearest" });
        rows[currentIndex].click();
    }
});

(async function init() {
    fixedGroups = [
        { id: 1, name: "Bank" },
        { id: 2, name: "Broker" },
        { id: 3, name: "Cash" },
        { id: 4, name: "Closing Stock" },
        { id: 5, name: "Customer" },
        { id: 6, name: "Direct Expenses" },
        { id: 7, name: "Employee" },
        { id: 8, name: "InDirect Expenses" },
        { id: 9, name: "InDirect Income" },
        { id: 10, name: "Job Worker" },
        { id: 11, name: "Opening Stock" },
        { id: 12, name: "Purchase" },
        { id: 13, name: "Purchase Return" },
        { id: 14, name: "Purchase Voucher" },
        { id: 15, name: "Salary Wages Accounts" },
        { id: 16, name: "Sales" },
        { id: 17, name: "Sales Return" },
        { id: 18, name: "Supplier" },
        { id: 19, name: "Tour Expenses" },
        { id: 20, name: "Transport" }
    ];
    await loadGroups();
    await loadGroupSetup();
    renderGroups();
    renderGroupLists();
    setMode("display");
    setFormEditable(false);
})();

function wireListClicks(container) {
    container.querySelectorAll(".list-row[data-id]").forEach(function (row) {
        row.addEventListener("click", function () {
            row.classList.toggle("active");
        });
    });
}

function moveItems(source, target, items) {
    const targetSet = new Set(target.map(function (v) { return Number(v); }));
    items.forEach(function (id) {
        if (!targetSet.has(id)) {
            target.push(id);
            targetSet.add(id);
        }
    });
    const removeSet = new Set(items);
    return source.filter(function (id) { return !removeSet.has(id); });
}

document.getElementById("moveRightBtn").addEventListener("click", function () {
    if (currentMode === "display") return;
    const selected = Array.from(allGroupList.querySelectorAll(".list-row.active[data-id]")).map(function (row) {
        return Number(row.dataset.id);
    });
    if (!selected.length) return;
    const selectedIds = Array.isArray(groupSetupMap[activeFixId]) ? groupSetupMap[activeFixId].slice() : [];
    const allIds = allGroups.map(function (g) { return Number(g.group_id); });
    const availableIds = allIds.filter(function (id) { return !selectedIds.includes(id); });
    const newAvailable = moveItems(availableIds, selectedIds, selected);
    groupSetupMap[activeFixId] = selectedIds;
    renderGroupLists();
    allGroupList.querySelectorAll(".list-row.active").forEach(function (r) { r.classList.remove("active"); });
});

document.getElementById("moveLeftBtn").addEventListener("click", function () {
    if (currentMode === "display") return;
    const selected = Array.from(selectedGroupList.querySelectorAll(".list-row.active[data-id]")).map(function (row) {
        return Number(row.dataset.id);
    });
    if (!selected.length) return;
    const selectedIds = Array.isArray(groupSetupMap[activeFixId]) ? groupSetupMap[activeFixId].slice() : [];
    const allIds = allGroups.map(function (g) { return Number(g.group_id); });
    const availableIds = allIds.filter(function (id) { return !selectedIds.includes(id); });
    const newSelected = moveItems(selectedIds, availableIds, selected);
    groupSetupMap[activeFixId] = newSelected;
    renderGroupLists();
    selectedGroupList.querySelectorAll(".list-row.active").forEach(function (r) { r.classList.remove("active"); });
});

document.getElementById("allSelectBtn").addEventListener("click", function () {
    allGroupList.querySelectorAll(".list-row[data-id]").forEach(function (r) { r.classList.add("active"); });
});
document.getElementById("allDeselectBtn").addEventListener("click", function () {
    allGroupList.querySelectorAll(".list-row.active").forEach(function (r) { r.classList.remove("active"); });
});
document.getElementById("selSelectBtn").addEventListener("click", function () {
    selectedGroupList.querySelectorAll(".list-row[data-id]").forEach(function (r) { r.classList.add("active"); });
});
document.getElementById("selDeselectBtn").addEventListener("click", function () {
    selectedGroupList.querySelectorAll(".list-row.active").forEach(function (r) { r.classList.remove("active"); });
});
</script>
</body>
</html>
